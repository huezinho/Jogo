<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RPG por Turnos</title>
<style>
body{font-family:Arial,sans-serif;background:#1e1e1e;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.container{width:1180px;max-width:calc(100vw - 24px);background:#2b2b2b;padding:20px;border-radius:16px;box-shadow:0 0 20px rgba(0,0,0,.4)}
button{padding:10px 16px;margin:6px;border:none;border-radius:10px;cursor:pointer}
button:disabled{cursor:not-allowed;opacity:.6}
.button-row{display:flex;gap:10px;flex-wrap:wrap}
.panel{margin:15px 0;padding:15px;background:#3a3a3a;border-radius:12px}
.game-layout{display:grid;grid-template-columns:220px minmax(0,1fr) 260px;gap:18px;align-items:start}
.side-column .panel,.main-column .panel{margin-top:0}
.main-column{display:flex;flex-direction:column;gap:15px}
.player-header{display:flex;justify-content:space-between;align-items:center;gap:12px}
.coin-badge{padding:8px 14px;border-radius:999px;background:#f6c445;color:#2b2100;font-weight:700;box-shadow:0 4px 12px rgba(0,0,0,.22)}
.class-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.class-card{padding:18px;border:none;border-radius:16px;background:linear-gradient(160deg,#4d4d4d,#2f2f2f);color:#fff;text-align:left;box-shadow:0 10px 20px rgba(0,0,0,.18);transition:transform .18s ease,box-shadow .18s ease}
.class-card:hover{transform:translateY(-3px);box-shadow:0 14px 24px rgba(0,0,0,.24)}
.class-card .class-icon{font-size:38px;display:block;margin-bottom:8px}
.class-card h4{margin:0 0 10px 0;font-size:20px}
.class-card p{margin:6px 0;font-size:14px}
.class-card small{display:block;margin-top:10px;color:#d6d6d6;line-height:1.45}
.stat-hp{color:#89f07d}
.stat-mp{color:#7bc9ff}
.stat-atk{color:#ffd36a}
.class-warrior{background:linear-gradient(160deg,#68533a,#32261b)}
.class-archer{background:linear-gradient(160deg,#45644b,#1e3022)}
.class-mage{background:linear-gradient(160deg,#35506c,#1d263b)}
.saved-campaign{margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12)}
.death-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.panel-header{display:flex;justify-content:space-between;align-items:center;gap:10px}
.inventory-list,.trophy-list{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.inventory-item,.trophy-item{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.06)}
.trophy-item.locked{opacity:.55}
.status-on{color:#89f07d;font-weight:700}
.status-off{color:#ffd36a;font-weight:700}
.camp-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:12px 0}
.camp-stat{padding:12px;border-radius:12px;background:linear-gradient(160deg,rgba(255,255,255,.09),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08)}
.camp-stat strong{display:block;font-size:12px;color:#d7d7d7;text-transform:uppercase;letter-spacing:.04em}
.camp-stat span{display:block;margin-top:6px;font-size:22px;font-weight:700}
.equipment-layout{display:grid;grid-template-columns:126px minmax(0,1fr);gap:12px;align-items:center;margin-top:12px}
.equipment-body{position:relative;min-height:320px;padding:18px 14px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03))}
.equipment-stack{position:relative;display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;min-height:320px}
.hero-silhouette{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:78px;opacity:.18}
.equip-slot{width:126px;min-height:74px;padding:8px 10px;border-radius:12px;font-size:12px;line-height:1.35;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;box-sizing:border-box;transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}
.equip-slot strong{display:block;color:#d7d7d7;font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.equip-slot.empty{background:rgba(17,17,17,.42);border:1px dashed rgba(255,255,255,.14);box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}
.equip-slot.filled{background:rgba(17,17,17,.86);border:1px solid rgba(255,255,255,.14);box-shadow:0 8px 18px rgba(0,0,0,.18)}
.slot-empty{color:#909090;font-style:italic}
.equip-weapon{align-self:center}
.rarity-comum{color:#f0f0f0}
.rarity-incomum{color:#7ee787}
.rarity-rara{color:#62b0ff}
.rarity-ultra-rara{color:#d394ff}
.rarity-lendaria{color:#ffbf47}
.boss-btn{background:#8b2f2f;color:#fff}
.lock-note{font-size:13px;color:#d1d1d1}
.bar{height:20px;background:#555;border-radius:10px;overflow:hidden;margin:5px 0;position:relative}
.bar.small{height:9px;background:#494949}
.fill{height:100%;transition:width .32s linear;position:relative;z-index:2}
.shield-fill{height:100%;background:#aeb5bd;transition:width .32s linear}
.shield-row{margin-bottom:6px}
.shield-label{font-size:12px;color:#d9d9d9}
.buff-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.buff-pill{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px;color:#f3f3f3}
.hp{background:#4caf50}.mp{background:#2196f3}.xp{background:#ffc107}
#log{height:180px;overflow-y:auto;background:#111;padding:10px;border-radius:10px}
.action-btn{position:relative}
.action-btn[data-tooltip]:hover::after{
  content:attr(data-tooltip);
  position:absolute;
  left:50%;
  bottom:calc(100% + 8px);
  transform:translateX(-50%);
  min-width:220px;
  max-width:280px;
  padding:10px 12px;
  border-radius:10px;
  background:#101010;
  color:#fff;
  box-shadow:0 8px 18px rgba(0,0,0,.35);
  font-size:13px;
  line-height:1.4;
  white-space:normal;
  z-index:10
}
.action-btn[data-tooltip]:hover::before{
  content:"";
  position:absolute;
  left:50%;
  bottom:100%;
  transform:translateX(-50%);
  border:6px solid transparent;
  border-top:none;
  border-bottom-color:#101010;
  z-index:11
}
.levelup-panel{border:1px solid #ffc107;background:#4a3c10}
.attribute-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:10px 0;padding:10px;border-radius:10px;background:rgba(255,255,255,.06)}
.attribute-controls{display:flex;align-items:center;gap:8px}
.attribute-controls button{padding:6px 12px;margin:0}
.attribute-value{min-width:32px;text-align:center;font-weight:700}
.tabs{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap}
.tab-btn{background:#505050;color:#fff}
.tab-btn.active{background:#1565c0}
.region-chip{padding:8px 14px;border-radius:999px;background:#505050;color:#fff}
.region-chip.active{background:#2e7d32}
.sprite-box{display:flex;justify-content:center;align-items:center;min-height:140px;font-size:76px;background:rgba(255,255,255,.05);border-radius:14px;margin-top:10px}
.enemy-card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08)}
.enemy-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.enemy-title h3{margin:0 0 6px 0}
.enemy-subtitle{margin:0;color:#d0d0d0;font-size:13px}
.enemy-badges{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.enemy-badge{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px;font-weight:700}
.enemy-drop-box{margin-top:12px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
.enemy-drop-box strong{display:block;margin-bottom:4px}
.enemy-drop-box span{color:#d7d7d7}
.text-input{width:100%;padding:10px 12px;border:none;border-radius:10px;background:#1b1b1b;color:#fff;box-sizing:border-box}
.party-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.party-entry{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.06)}
.room-pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#1565c0;color:#fff;font-weight:700}
@media (max-width:640px){
  .attribute-row{flex-direction:column;align-items:flex-start}
  .action-btn[data-tooltip]:hover::after{left:0;transform:none}
  .action-btn[data-tooltip]:hover::before{left:18px;transform:none}
  .enemy-top{flex-direction:column}
}
@media (max-width:980px){
  .game-layout{grid-template-columns:1fr}
  .class-grid{grid-template-columns:1fr}
}
</style>
</head>

<div class="container">

<p><span class="stat-hp">Vida 140</span></p>
<p><span class="stat-mp">Mana 60</span></p>
<p><span class="stat-atk">Dano basico 20</span></p>
<small>Alta resistencia, pouca mana e o ataque basico mais forte entre as tres classes.</small>
</button>
<button class="class-card class-archer" onclick="selectClass('Arqueiro')">
<span class="class-icon">&#x1F3F9;</span>

<p><span class="stat-hp">Vida 120</span></p>
<p><span class="stat-mp">Mana 80</span></p>
<p><span class="stat-atk">Dano basico 19</span></p>

</button>
<button class="class-card class-mage" onclick="selectClass('Mago')">

</button>
</div>
<div id="savedCampaign" class="saved-campaign" style="display:none;"></div>
</div>
<div id="game" style="display:none;">
<div class="game-layout">
<div class="side-column">
<div class="panel">

<div class="tabs" id="modeTabs"></div>
</div>
</div>
<div class="main-column">
<div class="panel" id="playerInfo"></div>
<div class="button-row" id="actions"></div>
<div class="panel" id="enemyInfo"></div>
<div id="levelUpPanel" class="panel levelup-panel" style="display:none;"></div>
<div class="panel" id="logPanel">
<div class="panel-header">
<strong>Log de batalha</strong>
<button onclick="toggleLog()">Ocultar</button>
</div>
<div id="log"></div>
</div>
</div>
<div class="side-column">
<div class="panel" id="regionInfo"></div>
<div class="panel" id="inventoryInfo"></div>
</div>
</div>
</div>
</div>

function getPlayerSubclassState(targetPlayer = player){
  if(!targetPlayer.subclassChoices){
    targetPlayer.subclassChoices = { tier30: null, tier60: null };
  }
  return targetPlayer.subclassChoices;
}

function getTier30ChoiceDef(className, choiceId){
  return (subclassChoicesByClass[className]?.tier30 || []).find(option => option.id === choiceId) || null;
}

function getTier60ChoiceDef(className, tier30Id, choiceId){
  return (subclassChoicesByClass[className]?.tier60?.[tier30Id] || []).find(option => option.id === choiceId) || null;
}

function getChosenSubclassDefs(targetPlayer = player){
  const subclassState = getPlayerSubclassState(targetPlayer);
  const tier30 = subclassState.tier30 ? getTier30ChoiceDef(targetPlayer.class, subclassState.tier30) : null;
  const tier60 = tier30 && subclassState.tier60 ? getTier60ChoiceDef(targetPlayer.class, tier30.id, subclassState.tier60) : null;
  return [tier30, tier60].filter(Boolean);
}

function chooseWeightedEnemy(enemyList){
  const totalWeight = enemyList.reduce((sum, enemyData) => sum + enemyData.weight, 0);
  let roll = Math.random() * totalWeight;
  for(const enemyData of enemyList){
    roll -= enemyData.weight;
    if(roll <= 0){
      return enemyData;
    }
  }
  return enemyList[enemyList.length - 1];
}

function getEnemyStats(template, regionOverride = null){
  const regionName = regionOverride || currentRegion;
  const regionHasArmor = ["Ruinas", "Pantano", "Vulcao", "Abismo", "Fortaleza"].includes(regionName);
  return {
    maxHp: template.hp + template.level * 18,
    attack: template.attack + template.level * 2,
    armor: regionHasArmor ? Math.max(1, Math.floor(template.level / 10)) : 0
  };
}

function slugify(value){
  return String(value || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_+|_+$/g, "");
}

function getEnemyTemplateByName(enemyName){
  for(const [regionName, regionData] of Object.entries(regions)){
    const regularEnemy = regionData.enemies.find(template => template.name === enemyName);
    if(regularEnemy){
      return { ...regularEnemy, region: regionName, isBoss: false };
    }
    if(regionData.boss?.name === enemyName){
      return { ...regionData.boss, region: regionName, isBoss: true };
    }
  }
  const dungeonEnemy = dungeonData.enemies.find(template => template.name === enemyName);
  if(dungeonEnemy){
    return { ...dungeonEnemy, region: "Dungeon", isBoss: false };
  }
  return null;
}

function getEnemySetLabel(enemyName){

}

function formatStatBonusList(source){
  const parts = [];
  if(source?.bonusHp){ parts.push(`+${source.bonusHp} vida maxima`); }
  if(source?.bonusMp){ parts.push(`+${source.bonusMp} mana maxima`); }
  if(source?.bonusAttack){ parts.push(`+${source.bonusAttack} dano de ataque`); }
  if(source?.skillPower){ parts.push(`+${source.skillPower} dano de habilidade`); }
  return parts.join(", ");
}

function getSetBonusValues(enemyLevel, className){
  const profile = setBonusProfiles[className] || {};
  const bonus = {};
  for(const [bonusKey, factor] of Object.entries(profile)){
    bonus[bonusKey] = Math.floor(enemyLevel * factor);
  }
  return bonus;
}

function getEnemySetTemplate(enemyName, className = player?.class || "Guerreiro", slot = null){
  const enemyTemplate = getEnemyTemplateByName(enemyName);
  if(!enemyTemplate){ return null; }
  const chosenSlot = slot || equipmentSlots[Math.floor(Math.random() * equipmentSlots.length)];
  const pieceName = equipmentPieceNames[className]?.[chosenSlot] || slotLabels[chosenSlot] || "Peca";
  return {
    id: `${slugify(enemyName)}_${slugify(className)}_${chosenSlot}`,
    name: `${pieceName} do ${enemyName}`,
    slot: chosenSlot,
    classRestriction: className,
    enemyName,
    enemyLevel: enemyTemplate.level,
    setId: `${slugify(enemyName)}_${slugify(className)}_set`,
    setName: getEnemySetLabel(enemyName),
    statProfile: equipmentStatProfiles[className]?.[chosenSlot] || {}
  };
}

function getEquippedSetCount(setId){
  if(!player?.equipment || !setId){ return 0; }
  return equipmentSlots.reduce((total, slot) => total + (player.equipment?.[slot]?.setId === setId ? 1 : 0), 0);
}

function getActiveSetBonuses(){
  const total = { bonusHp: 0, bonusMp: 0, bonusAttack: 0, skillPower: 0 };
  const activeSets = [];
  if(!player?.equipment){ return { bonuses: total, activeSets }; }

  const sets = {};
  for(const slot of equipmentSlots){
    const item = normalizeEquipmentMetadata(player.equipment?.[slot]);
    if(!item?.setId){ continue; }
    if(!sets[item.setId]){
      sets[item.setId] = { slots: new Set(), item };
    }
    sets[item.setId].slots.add(slot);
  }

  for(const entry of Object.values(sets)){
    if(entry.slots.size !== equipmentSlots.length){ continue; }
    const item = entry.item;
    const setBonus = getSetBonusValues(item.enemyLevel || 1, item.classRestriction || player.class);
    total.bonusHp += setBonus.bonusHp || 0;
    total.bonusMp += setBonus.bonusMp || 0;
    total.bonusAttack += setBonus.bonusAttack || 0;
    total.skillPower += setBonus.skillPower || 0;
    activeSets.push({
      setName: item.setName || getEnemySetLabel(item.enemyName || "desconhecido"),
      text: formatStatBonusList(setBonus)
    });
  }

  return { bonuses: total, activeSets };
}

function getRegionAverageLevel(region){
  const regionData = regions[region];
  const totalWeight = regionData.enemies.reduce((sum, enemyData) => sum + enemyData.weight, 0);
  const weightedLevels = regionData.enemies.reduce((sum, enemyData) => sum + enemyData.level * enemyData.weight, 0);
  return Math.ceil(weightedLevels / totalWeight);
}

function normalizePlayerState(){
  function normalizeInventoryItem(item, index){
    const normalized = {
      ...item,
      uid: item.uid || `${item.id || "item"}_${Date.now()}_${index}`
    };
    if(item.type === "consumable" && consumableCatalog[item.id]){
      normalized.name = consumableCatalog[item.id].name;
      normalized.description = consumableCatalog[item.id].description;
    }
    return normalizeEquipmentMetadata(normalized);
  }
  player.inventory = (Array.isArray(player.inventory) ? player.inventory : []).map((item, index) => ({
    ...normalizeInventoryItem(item, index)
  }));
  const oldEquipment = player.equipment || {};
  player.equipment = {
    head: normalizeEquipmentMetadata(oldEquipment.head || null),
    chest: normalizeEquipmentMetadata(oldEquipment.chest || null),
    weapon: normalizeEquipmentMetadata(oldEquipment.weapon || null),
    legs: normalizeEquipmentMetadata(oldEquipment.legs || null),
    feet: normalizeEquipmentMetadata(oldEquipment.feet || oldEquipment.boots || null)
  };
  player.stats = player.stats || {
    enemiesDefeated: 0,
    bossesDefeated: 0,
    coinsEarned: 0,
    deaths: 0
  };
  player.stats.invested = player.stats.invested || { hp: 0, mp: 0, attack: 0 };
  const legacySubclass = player.subclass?.id || player.subclass || null;
  player.subclass = null;
  const subclassState = getPlayerSubclassState(player);
  if(legacySubclass && !subclassState.tier30){
    if(getTier30ChoiceDef(player.class, legacySubclass)){
      subclassState.tier30 = legacySubclass;
    }
  }
  player.activeSkills = getClassTrees().activeSkills;
  player.passiveSkills = getClassTrees().passiveSkills;
  playerEffects = { ...createDefaultPlayerEffects(), ...(playerEffects || {}) };
}

    maxMp: player.maxMp + passives.bonusMp + allocation.mp * player.growth.mp,
    attack: player.attack + passives.bonusAttack + allocation.attack * player.growth.attack
  };
}

    return subclassChoicesByClass[player.class]?.tier30 || [];
  }
  if(player.level >= 60 && subclassState.tier30 && !subclassState.tier60){
    return subclassChoicesByClass[player.class]?.tier60?.[subclassState.tier30] || [];
  }
  return [];
}

function getUnlockedActiveSkills(){
  return getClassTrees().activeSkills.filter(skill => player.level >= skill.level);
}

function getUnlockedPassiveSkills(){
  return getClassTrees().passiveSkills.filter(skill => player.level >= skill.level);
}

function getPassiveModifiers(){
  const base = {
    bonusHp: 0,
    bonusMp: 0,
    bonusAttack: 0,
    manaRegen: 0,
    manaRegenPercent: 0,
    manaRegenPercentSet: null,
    damageReduction: 0,
    coinBonus: 0,
    skillPower: 0,
    flatReduction: 0,
    reflectPercent: 0,
    turnHealPercent: 0,
    skillCostIncrease: 0,
    enemyMissChance: 0,
    xpBonus: 0,
    preciousMana: false,
    manaToLifePercent: 0
  };
  const subclassState = getPlayerSubclassState();
  const tier30 = subclassState.tier30;
  for(const passive of getUnlockedPassiveSkills()){
    if(passive.type === "warrior_flat_reduction"){
      base.flatReduction += Math.floor(1 * player.level);
    }
    if(passive.type === "warrior_enemy_miss"){
      base.enemyMissChance += 0.05;
    }
    if(passive.type === "bonus_xp"){
      base.xpBonus += 0.1;
    }
    if(passive.type === "mage_skill_level_bonus"){
      const factor = tier30 === "elementalista" && player.level >= 42 ? 2.4 : 2;
      base.skillPower += Math.floor(factor * player.level);
    }
    if(passive.type === "mage_precious_mana"){
      base.preciousMana = true;
    }
    if(passive.type === "archer_enemy_miss"){
      base.enemyMissChance += tier30 === "cacador" && player.level >= 54 ? 0.1 : 0.05;
    }
    if(passive.type === "archer_mana_regen_set"){
      base.manaRegenPercentSet = 0.16;
    }
    if(passive.type === "archer_attack_level_bonus"){
      base.bonusAttack += Math.floor(0.4 * player.level);
    }
    if(passive.type === "coin_bonus"){
      base.coinBonus += tier30 === "cacador" && player.level >= 42 ? 0.15 : 0;
    }
    if(passive.id === "mana_e_vida"){
      base.manaToLifePercent += 0.1;
    }
  }
  for(const subclass of getChosenSubclassDefs()){
    base.bonusHp += subclass.bonusHp || 0;
    base.bonusMp += subclass.bonusMp || 0;
    base.bonusAttack += subclass.bonusAttack || 0;
    base.skillPower += subclass.skillPower || 0;
  }
  for(const slot of equipmentSlots){
    const item = player.equipment?.[slot];
    if(!item){ continue; }
    base.bonusHp += item.bonusHp || 0;
    base.bonusMp += item.bonusMp || 0;
    base.bonusAttack += item.bonusAttack || 0;
    base.skillPower += item.skillPower || 0;
  }
  const activeSetBonuses = getActiveSetBonuses().bonuses;
  base.bonusHp += activeSetBonuses.bonusHp || 0;
  base.bonusMp += activeSetBonuses.bonusMp || 0;
  base.bonusAttack += activeSetBonuses.bonusAttack || 0;
  base.skillPower += activeSetBonuses.skillPower || 0;
  if(player.class === "Mago" && player.level >= 25){
    base.manaToLifePercent = 0.1;
  }
  if(base.manaToLifePercent > 0){
    base.bonusHp += Math.floor((player.maxMp + base.bonusMp + allocation.mp * player.growth.mp) * base.manaToLifePercent);
  }
  return base;
}

function needsSubclassChoice(){
  if(!player){ return false; }
  const subclassState = getPlayerSubclassState();
  return (player.level >= 30 && !subclassState.tier30) || (player.level >= 60 && !!subclassState.tier30 && !subclassState.tier60);
}

function getTrophyCompletion(){
  const trophies = getTrophies();
  const done = trophies.filter(trophy => trophy.done).length;
  return Math.floor(done / trophies.length * 100);
}

function isDungeonMode(){
  return currentMode === "dungeon";
}

function getDungeonRequirement(){
  return dungeonData.minLevel;
}

function isDungeonConnected(){
  return !!(dungeonMultiplayer.peer && (dungeonMultiplayer.isHost || dungeonMultiplayer.hostConnection?.open));
}

function isDungeonHost(){
  return !!(dungeonMultiplayer.peer && dungeonMultiplayer.isHost);
}

function clearDungeonEnemyTimer(){
  if(dungeonMultiplayer.enemyAttackTimer){
    clearInterval(dungeonMultiplayer.enemyAttackTimer);
    dungeonMultiplayer.enemyAttackTimer = null;
  }
}

function getDungeonRoomMembers(){
  return Object.values(dungeonMultiplayer.party);
}

function getDungeonPlayerProfile(){
  return {
    id: dungeonMultiplayer.peer?.id || "local",
    name: `${player.class} Lv.${player.level}`,
    class: player.class,
    level: player.level,
    icon: classIcons[player.class] || "&#x2694;&#xFE0F;"
  };
}

function getDungeonCurrentTurnId(){
  return dungeonMultiplayer.turnOrder[dungeonMultiplayer.turnIndex] || null;
}

function isMyDungeonTurn(){
  return isDungeonConnected() && dungeonMultiplayer.battleActive && getDungeonCurrentTurnId() === dungeonMultiplayer.peer?.id;
}

function syncDungeonEnemyState(sharedEnemy){
  if(currentMode !== "dungeon"){ return; }
  enemy = sharedEnemy ? { ...sharedEnemy } : null;
  displayState.enemyHp = enemy ? enemy.hp : null;
  needsNewEnemy = !enemy;
}

function broadcastToDungeonPeers(payload){
  Object.values(dungeonMultiplayer.connections).forEach(connection => {
    if(connection?.open){
      connection.send(payload);
    }
  });
}

function broadcastDungeonState(){
  if(!isDungeonHost()){ return; }
  dungeonMultiplayer.party[dungeonMultiplayer.peer.id] = getDungeonPlayerProfile();
  broadcastToDungeonPeers({
    type: "state",
    roomCode: dungeonMultiplayer.roomCode,
    party: dungeonMultiplayer.party,
    enemy: enemy ? { ...enemy } : null,
    turnOrder: [...dungeonMultiplayer.turnOrder],
    turnIndex: dungeonMultiplayer.turnIndex,
    round: dungeonMultiplayer.round,
    enemySkipTurn: !!dungeonMultiplayer.enemySkipTurn,
    battleActive: !!dungeonMultiplayer.battleActive
  });
}

function syncDungeonProfile(){
  if(!isDungeonConnected()){ return; }
  const profile = getDungeonPlayerProfile();
  if(isDungeonHost()){
    dungeonMultiplayer.party[dungeonMultiplayer.peer.id] = profile;
    broadcastDungeonState();
  }else if(dungeonMultiplayer.hostConnection?.open){
    dungeonMultiplayer.hostConnection.send({ type: "profile_update", player: profile });
  }
}

function handleDungeonPeerDisconnect(peerId){
  delete dungeonMultiplayer.connections[peerId];
  if(dungeonMultiplayer.party[peerId]){
    log(`${dungeonMultiplayer.party[peerId].name} saiu da sala da dungeon.`);
    delete dungeonMultiplayer.party[peerId];
    dungeonMultiplayer.turnOrder = dungeonMultiplayer.turnOrder.filter(id => id !== peerId);
    if(dungeonMultiplayer.turnIndex >= dungeonMultiplayer.turnOrder.length){
      dungeonMultiplayer.turnIndex = 0;
    }
    if(dungeonMultiplayer.battleActive && dungeonMultiplayer.turnOrder.length < 2){
      handleDungeonRaidDefeat("A incursao terminou porque o grupo se desfez.");
      return;
    }
    broadcastDungeonState();
    updateUI();
  }
}

function leaveDungeonRoom(silent = false){
  clearDungeonEnemyTimer();
  Object.values(dungeonMultiplayer.connections).forEach(connection => {
    try { connection.close(); } catch {}
  });
  if(dungeonMultiplayer.hostConnection){
    try { dungeonMultiplayer.hostConnection.close(); } catch {}
  }
  if(dungeonMultiplayer.peer){
    try { dungeonMultiplayer.peer.destroy(); } catch {}
  }
  dungeonMultiplayer = createDungeonMultiplayerState();
  if(currentMode === "dungeon"){
    enemy = null;
    displayState.enemyHp = null;
    needsNewEnemy = true;
  }
  if(!silent){
    log("Voce saiu da sala da dungeon.");
  }
  updateUI();
}

function renderDungeonPartyList(){
  const members = getDungeonRoomMembers();
  if(!members.length){
    return `<p class="lock-note">Nenhum aventureiro conectado ainda.</p>`;
  }
  return `<div class="party-list">${members.map(member => `<div class="party-entry"><strong>${member.icon} ${member.name}</strong><br><span class="lock-note">${member.class} | Nivel ${member.level}</span></div>`).join("")}</div>`;
}

function getDungeonStatusText(){
  if(isDungeonHost()){
    if(dungeonMultiplayer.battleActive && enemy){
      return `Rodada ${dungeonMultiplayer.round}. Turno atual: ${(dungeonMultiplayer.party[getDungeonCurrentTurnId()] || {}).name || "..."}.`;
    }
    return `Sala criada. Compartilhe o codigo ${dungeonMultiplayer.roomCode} com seus amigos.`;
  }
  if(isDungeonConnected()){
    if(dungeonMultiplayer.battleActive && enemy){
      return `Conectado a sala ${dungeonMultiplayer.roomCode}. Turno atual: ${(dungeonMultiplayer.party[getDungeonCurrentTurnId()] || {}).name || "..."}.`;
    }
    return `Conectado a sala ${dungeonMultiplayer.roomCode}. Aguarde o host iniciar a incursao.`;
  }
  return "Crie uma sala ou entre com um codigo para jogar online com ate 2 amigos.";
}

function renderDungeonRoomControls(){
  const canStart = isDungeonHost() && getDungeonRoomMembers().length >= 2 && !enemy;
  return `
    <div class="inventory-list">
      <div class="inventory-item">
        <strong>Sala online</strong><br>
        <span class="lock-note">${getDungeonStatusText()}</span>
        ${dungeonMultiplayer.roomCode ? `<div style="margin-top:10px;"><span class="room-pill">${dungeonMultiplayer.roomCode}</span></div>` : ""}
        ${!isDungeonConnected() ? `<div style="margin-top:10px;"><input id="dungeonJoinCode" class="text-input" placeholder="Codigo da sala" maxlength="12" /></div>` : ""}
        <div class="button-row">
          <button onclick="hostDungeonRoom()" ${isDungeonConnected() ? "disabled" : ""}>Criar sala</button>
          <button onclick="joinDungeonRoom()" ${isDungeonConnected() ? "disabled" : ""}>Entrar</button>
          ${isDungeonConnected() ? `<button onclick="leaveDungeonRoom()">Sair da sala</button>` : ""}
        </div>
        ${isDungeonHost() ? `<div class="button-row"><button onclick="startDungeonRaid()" ${canStart ? "" : "disabled"}>Iniciar dungeon</button></div><span class="lock-note">${getDungeonRoomMembers().length < 2 ? "Conecte pelo menos mais 1 jogador para comecar." : "Sala pronta para a batalha."}</span>` : ""}
      </div>
      <div class="inventory-item">
        <strong>Equipe</strong>
        ${renderDungeonPartyList()}
      </div>
    </div>`;
}

function hostDungeonRoom(){
  if(currentMode !== "dungeon" || !player){ return; }
  if(typeof Peer === "undefined"){
    log("Nao foi possivel carregar o sistema online da dungeon.");
    return;
  }
  leaveDungeonRoom(true);
  const roomCode = `DNG${Math.random().toString(36).slice(2, 7).toUpperCase()}`;
  dungeonMultiplayer = createDungeonMultiplayerState();
  dungeonMultiplayer.isHost = true;
  dungeonMultiplayer.roomCode = roomCode;
  dungeonMultiplayer.peer = new Peer(roomCode);
  dungeonMultiplayer.peer.on("open", id => {
    dungeonMultiplayer.roomCode = id;
    dungeonMultiplayer.party[id] = getDungeonPlayerProfile();
    log(`Sala da dungeon criada: ${id}.`);
    updateUI();
  });
  dungeonMultiplayer.peer.on("connection", connection => {
    if(getDungeonRoomMembers().length >= 3){
      connection.on("open", () => {
        connection.send({ type: "reject", reason: "A sala da dungeon ja esta cheia." });
        connection.close();
      });
      return;
    }
    dungeonMultiplayer.connections[connection.peer] = connection;
    connection.on("data", data => handleDungeonHostMessage(connection, data));
    connection.on("close", () => handleDungeonPeerDisconnect(connection.peer));
  });
  dungeonMultiplayer.peer.on("error", error => {
    log(`Erro na dungeon online: ${error.type || error.message}.`);
    updateUI();
  });
}

function joinDungeonRoom(){
  if(currentMode !== "dungeon" || !player){ return; }
  if(typeof Peer === "undefined"){
    log("Nao foi possivel carregar o sistema online da dungeon.");
    return;
  }
  const input = document.getElementById("dungeonJoinCode");
  const roomCode = (input?.value || "").trim().toUpperCase();
  if(!roomCode){
    log("Informe o codigo da sala para entrar na dungeon.");
    return;
  }
  leaveDungeonRoom(true);
  dungeonMultiplayer = createDungeonMultiplayerState();
  dungeonMultiplayer.isHost = false;
  dungeonMultiplayer.roomCode = roomCode;
  dungeonMultiplayer.peer = new Peer();
  dungeonMultiplayer.peer.on("open", () => {
    const connection = dungeonMultiplayer.peer.connect(roomCode, { reliable: true });
    dungeonMultiplayer.hostConnection = connection;
    connection.on("open", () => {
      connection.send({ type: "join", player: getDungeonPlayerProfile() });
      log(`Conectando a sala ${roomCode}...`);
      updateUI();
    });
    connection.on("data", handleDungeonGuestMessage);
    connection.on("close", () => {
      log("A conexao com a dungeon foi encerrada.");
      leaveDungeonRoom(true);
    });
  });
  dungeonMultiplayer.peer.on("error", error => {
    log(`Erro na conexao da dungeon: ${error.type || error.message}.`);
    updateUI();
  });
}

function handleDungeonHostMessage(connection, data){
  if(!data || !isDungeonHost()){ return; }
  if(data.type === "join"){
    dungeonMultiplayer.party[connection.peer] = data.player;
    connection.send({ type: "joined", roomCode: dungeonMultiplayer.roomCode });
    log(`${data.player.name} entrou na sala da dungeon.`);
    broadcastDungeonState();
    updateUI();
    return;
  }
  if(data.type === "profile_update"){
    dungeonMultiplayer.party[connection.peer] = data.player;
    broadcastDungeonState();
    updateUI();
    return;
  }
  if(data.type === "player_defeated"){
    handleDungeonRaidDefeat(`${dungeonMultiplayer.party[connection.peer]?.name || "Um jogador"} caiu na dungeon. A incursao foi perdida.`);
    return;
  }
  if(data.type === "action"){
    if(data.player){
      dungeonMultiplayer.party[connection.peer] = data.player;
    }
    if(getDungeonCurrentTurnId() !== connection.peer || !dungeonMultiplayer.battleActive || !enemy){
      return;
    }
    if(data.message){
      log(data.message);
      broadcastToDungeonPeers({ type: "log", message: data.message });
    }
    if(enemy && data.damage){
      applyDamageToEnemy(data.damage, { ignoreArmor: !!data.ignoreArmor });
      displayState.enemyHp = enemy.hp;
    }
    if(enemy && data.freezeNext){
      enemy.skipNextAttack = true;
    }
    if(enemy && enemy.hp <= 0){
      handleDungeonRaidVictory();
      return;
    }
    advanceDungeonTurn();
    broadcastDungeonState();
    updateUI();
  }
}

function handleDungeonGuestMessage(data){
  if(!data){ return; }
  if(data.type === "reject"){
    log(data.reason);
    leaveDungeonRoom(true);
    return;
  }
  if(data.type === "joined"){
    dungeonMultiplayer.roomCode = data.roomCode;
    updateUI();
    return;
  }
  if(data.type === "state"){
    const wasBattleActive = dungeonMultiplayer.battleActive;
    dungeonMultiplayer.roomCode = data.roomCode || dungeonMultiplayer.roomCode;
    dungeonMultiplayer.party = data.party || {};
    dungeonMultiplayer.turnOrder = data.turnOrder || [];
    dungeonMultiplayer.turnIndex = data.turnIndex || 0;
    dungeonMultiplayer.round = data.round || 1;
    dungeonMultiplayer.enemySkipTurn = !!data.enemySkipTurn;
    dungeonMultiplayer.battleActive = !!data.battleActive;
    if(dungeonMultiplayer.battleActive && !wasBattleActive){
      resetCombatEffects();
    }
    syncDungeonEnemyState(data.enemy || null);
    updateUI();
    return;
  }
  if(data.type === "log"){
    log(data.message);
    return;
  }
  if(data.type === "enemy_attack"){
    processDungeonIncomingDamage(data.damage, data.message);
    return;
  }
  if(data.type === "victory"){
    syncDungeonEnemyState(null);
    dungeonMultiplayer.battleActive = false;
    dungeonMultiplayer.turnOrder = [];
    dungeonMultiplayer.turnIndex = 0;
    grantDungeonRaidRewards(data.rewards);
    log(data.message);
    updateUI();
    return;
  }
  if(data.type === "defeat"){
    dungeonMultiplayer.battleActive = false;
    dungeonMultiplayer.turnOrder = [];
    dungeonMultiplayer.turnIndex = 0;
    syncDungeonEnemyState(null);
    log(data.message);
    updateUI();
    return;
  }
  if(data.type === "room_closed"){
    log("O host encerrou a sala da dungeon.");
    leaveDungeonRoom(true);
  }
}

function startDungeonRaid(){
  if(!isDungeonHost() || getDungeonRoomMembers().length < 2 || enemy){ return; }
  const template = chooseWeightedEnemy(dungeonData.enemies);
  enemy = createEnemyFromTemplate(template, false);
  resetCombatEffects();
  displayState.enemyHp = enemy.hp;
  needsNewEnemy = false;
  dungeonMultiplayer.turnOrder = Object.keys(dungeonMultiplayer.party);
  dungeonMultiplayer.turnIndex = 0;
  dungeonMultiplayer.round = 1;
  dungeonMultiplayer.enemySkipTurn = false;
  dungeonMultiplayer.battleActive = true;
  log(`A dungeon comecou contra ${enemy.name}!`);
  broadcastToDungeonPeers({ type: "log", message: `A dungeon comecou contra ${enemy.name}!` });
  broadcastDungeonState();
  updateUI();
}

function grantDungeonRaidRewards(rewards){
  if(!rewards){ return; }
  player.coins += rewards.coins;
  player.stats.coinsEarned += rewards.coins;
  player.stats.enemiesDefeated++;
  gainXP(rewards.xp);
}

function handleDungeonRaidVictory(){
  if(!enemy){ return; }
  const rewards = {
    xp: 40 + enemy.level * 9,
    coins: 14 + enemy.level * 4
  };
  const enemyName = enemy.name;
  enemy = null;
  dungeonMultiplayer.battleActive = false;
  dungeonMultiplayer.turnOrder = [];
  dungeonMultiplayer.turnIndex = 0;
  displayState.enemyHp = null;
  needsNewEnemy = true;
  grantDungeonRaidRewards(rewards);
  const message = `${enemyName} foi derrotado! Cada jogador recebeu ${rewards.xp} XP e ${rewards.coins} moedas.`;
  log(message);
  broadcastToDungeonPeers({ type: "victory", rewards, message });
  broadcastDungeonState();
  updateUI();
}

function handleDungeonRaidDefeat(message){
  enemy = null;
  dungeonMultiplayer.battleActive = false;
  dungeonMultiplayer.turnOrder = [];
  dungeonMultiplayer.turnIndex = 0;
  displayState.enemyHp = null;
  needsNewEnemy = true;
  if(isDungeonHost()){
    broadcastToDungeonPeers({ type: "defeat", message });
    broadcastDungeonState();
  }
  log(message);
  updateUI();
}

function advanceDungeonTurn(){
  if(!isDungeonHost() || !dungeonMultiplayer.battleActive || !enemy){ return; }
  if(dungeonMultiplayer.turnIndex < dungeonMultiplayer.turnOrder.length - 1){
    dungeonMultiplayer.turnIndex++;
    return;
  }
  if(enemy.skipNextAttack){
    enemy.skipNextAttack = false;
    dungeonMultiplayer.turnIndex = 0;
    dungeonMultiplayer.round++;
    log(`${enemy.name} perdeu o turno.`);
    broadcastToDungeonPeers({ type: "log", message: `${enemy.name} perdeu o turno.` });
    return;
  }
  const damage = enemy.attack + Math.floor(Math.random() * 5);
  const message = `${enemy.name} atacou o grupo e causou ${damage} de dano.`;
  processDungeonIncomingDamage(damage, message);
  broadcastToDungeonPeers({ type: "enemy_attack", damage, message });
  if(player.hp <= 0){
    handleDungeonRaidDefeat("O grupo foi derrotado na dungeon.");
    return;
  }
  dungeonMultiplayer.turnIndex = 0;
  dungeonMultiplayer.round++;
}

function processDungeonIncomingDamage(baseDamage, message){
  if(message){
    log(message);
  }
  const result = applyIncomingDamage(baseDamage);
  if(result.missed){
    log("O inimigo errou o golpe contra voce.");
  }
  if(result.absorbed > 0){
    log(`Seu escudo absorveu ${result.absorbed} de dano.`);
  }
  if(result.manaAbsorbed > 0){
    log(`Preciosa Mana converteu ${result.manaAbsorbed} de dano em gasto de mana.`);
  }
  if(playerEffects.shieldValue <= 0){
    playerEffects.shieldTurns = 0;
  }else if(playerEffects.shieldTurns > 0){
    playerEffects.shieldTurns--;
    if(playerEffects.shieldTurns <= 0){
      playerEffects.shieldValue = 0;
      log("Seu escudo se desfez.");
    }
  }
  if(player.hp <= 0){
    if(isDungeonHost()){
      handleDungeonRaidDefeat("O grupo foi derrotado na dungeon.");
    }else if(dungeonMultiplayer.hostConnection?.open){
      dungeonMultiplayer.hostConnection.send({ type: "player_defeated" });
    }
  }
  displayState.playerHp = player.hp;
  displayState.playerMp = player.mp;
  updateUI();
}

function sendDungeonActionPayload(payload){
  if(!isDungeonConnected() || !enemy){ return; }
  const actionPayload = { ...payload, player: getDungeonPlayerProfile() };
  if(isDungeonHost()){
    handleDungeonHostMessage({ peer: dungeonMultiplayer.peer.id }, { type: "action", ...actionPayload });
  }else if(dungeonMultiplayer.hostConnection?.open){
    dungeonMultiplayer.hostConnection.send({ type: "action", ...actionPayload });
  }
}

function dungeonAttack(){
  if(currentMode !== "dungeon" || !isDungeonConnected() || !enemy || isDead || !isMyDungeonTurn()){ return; }
  const result = getBasicAttackResult(getDungeonPlayerProfile().name, false);
  if(result.blocked){
    log(result.message);
    updateUI();
    return;
  }
  decayPlayerBuffs();
  const healed = getTurnHealing();
  if(healed > 0){
    player.hp = Math.min(getCurrentCaps().maxHp, player.hp + healed);
    log(`Voce recuperou ${healed} de vida.`);
  }
  const manaRecovered = regenMana();
  if(manaRecovered > 0){
    log(`Voce recuperou ${manaRecovered} de mana.`);
  }
  updateUI();
  sendDungeonActionPayload({ damage: result.damage, message: result.message });
}

function dungeonUseSkill(index){
  if(currentMode !== "dungeon" || !isDungeonConnected() || !enemy || isDead || !isMyDungeonTurn()){ return; }
  const skillInfo = getSkillInfo()[index];
  if(!skillInfo){
    log("Voce ainda nao desbloqueou essa habilidade.");
    return;
  }
  const result = applySkillLocally(skillInfo, getDungeonPlayerProfile().name, false);
  if(result.blocked){
    log(result.message);
    updateUI();
    return;
  }
  decayPlayerBuffs();
  const healed = getTurnHealing();
  if(healed > 0){
    player.hp = Math.min(getCurrentCaps().maxHp, player.hp + healed);
    log(`Voce recuperou ${healed} de vida.`);
  }
  const manaRecovered = regenMana();
  if(manaRecovered > 0){
    log(`Voce recuperou ${manaRecovered} de mana.`);
  }
  updateUI();
  sendDungeonActionPayload({ damage: result.damage, message: result.message, ignoreArmor: !!skillInfo.ignoreArmor, freezeNext: !!result.freezeApplied });
}

function getRegionRequirement(region){
  return regions[region].minLevel || 1;
}

function getActiveAttack(){
  const baseAttack = getPreviewStats().attack + (playerEffects.attackBuffTurns > 0 ? playerEffects.attackBuffAmount : 0);
  const percent = playerEffects.attackBuffTurns > 0 ? playerEffects.attackBuffPercent : 0;
  return Math.floor(baseAttack * (1 + percent));
}

function getAttackSkillBonus(){
  const confirmedAttackGain = (player.stats?.invested?.attack || 0) * player.growth.attack;
  const previewAttackGain = (allocation.attack || 0) * player.growth.attack;
  return confirmedAttackGain + previewAttackGain;
}

function getSkillPowerBonus(){
  const baseSkill = getPassiveModifiers().skillPower + getAttackSkillBonus() + (playerEffects.skillBuffTurns > 0 ? playerEffects.skillBuffAmount : 0);
  const percent = playerEffects.skillBuffTurns > 0 ? playerEffects.skillBuffPercent : 0;
  return Math.floor(baseSkill * (1 + percent));
}

function getAccuracyBonus(){
  return playerEffects.precisionTurns > 0 ? playerEffects.precisionBonus : 0;
}

function getHitChance(mode = "basic"){
  if(playerEffects.guaranteedHitTurns > 0){ return 1; }
  if(player.class !== "Arqueiro"){ return 1; }
  const baseChance = mode === "precise" ? 0.9 : 0.84;
  return Math.min(1, baseChance + getAccuracyBonus());
}

function rollHit(mode = "basic"){
  return Math.random() < getHitChance(mode);
}

function getArcherDoubleChance(){
  const subclassState = getPlayerSubclassState();
  let chance = playerEffects.damageDoubleTurns > 0 ? playerEffects.damageDoubleChanceBonus : 0;
  if(subclassState.tier30 === "atirador" && player.level >= 54){
    chance += 0.1;
  }
  return chance;
}

function shouldDoubleDamage(baseChance = 0){
  const totalChance = Math.min(0.95, baseChance + (player.class === "Arqueiro" ? getArcherDoubleChance() : 0));
  return Math.random() < totalChance;
}

function getEnemyMissChance(){
  const passiveChance = getPassiveModifiers().enemyMissChance;
  const effectChance = playerEffects.enemyMissBonusTurns > 0 ? playerEffects.enemyMissBonus : 0;
  return Math.min(0.95, passiveChance + effectChance);
}

function decayPlayerBuffs(){
  for(const buffName of ["attackBuffTurns", "skillBuffTurns", "precisionTurns", "guaranteedHitTurns", "enemyMissBonusTurns", "regenTurns", "damageDoubleTurns"]){
    if(playerEffects[buffName] > 0){
      playerEffects[buffName]--;
    }
  }
  if(playerEffects.attackBuffTurns <= 0){ playerEffects.attackBuffAmount = 0; }
  if(playerEffects.attackBuffTurns <= 0){ playerEffects.attackBuffPercent = 0; }
  if(playerEffects.skillBuffTurns <= 0){ playerEffects.skillBuffAmount = 0; }
  if(playerEffects.skillBuffTurns <= 0){ playerEffects.skillBuffPercent = 0; }
  if(playerEffects.precisionTurns <= 0){ playerEffects.precisionBonus = 0; }
  if(playerEffects.guaranteedHitTurns <= 0){ playerEffects.guaranteedHitTurns = 0; }
  if(playerEffects.enemyMissBonusTurns <= 0){ playerEffects.enemyMissBonus = 0; }
  if(playerEffects.regenTurns <= 0){ playerEffects.regenPercent = 0; }
  if(playerEffects.damageDoubleTurns <= 0){ playerEffects.damageDoubleChanceBonus = 0; }
}

function getTurnHealing(){
  return playerEffects.regenTurns > 0 ? Math.floor(getCurrentCaps().maxHp * playerEffects.regenPercent) : 0;
}

function getSkillInfo(){
  const subclassState = getPlayerSubclassState();
  const passiveModifiers = getPassiveModifiers();
  const maxHp = getPreviewStats().maxHp;
  const maxMp = getPreviewStats().maxMp;
  const attack = getActiveAttack();
  const skillPower = getSkillPowerBonus();
  const arcanistExtraCost = player.class === "Mago" && subclassState.tier30 === "arcanista" && player.level >= 42 ? Math.floor(maxMp * 0.05) : 0;
  return getUnlockedActiveSkills().map(skill => {
    if(skill.type === "warrior_brandish"){
      const damage = Math.floor(attack * 1.5);
      return { ...skill, cost: 12, damage, description: `${skill.name}: consome 12 MP e causa ${damage} de dano.` };
    }
    if(skill.type === "warrior_smash"){
      const damage = Math.floor(maxHp * 0.1) + attack + skillPower;
      return { ...skill, cost: 12, damage, description: `${skill.name}: consome 12 MP e causa ${damage} de dano usando sua vida maxima.` };
    }
    if(skill.type === "warrior_swift_strikes"){
      const damage = attack * 2 + skillPower;
      return { ...skill, cost: 12, damage, description: `${skill.name}: consome 12 MP e causa ${damage} de dano em cortes sucessivos.` };
    }
    if(skill.type === "warrior_regen"){
      const turns = subclassState.tier30 === "brutamontes" && player.level >= 48 ? 5 : 3;
      const heal = Math.floor(maxHp * 0.05);
      const attackPercent = subclassState.tier30 === "espadachim" && player.level >= 48 ? 0.1 : 0;
      return { ...skill, cost: 16, turns, heal, attackPercent, description: `${skill.name}: consome 16 MP e recupera ${heal} de vida por turno durante ${turns} turnos${attackPercent ? ", alem de aumentar o dano basico em 10%" : ""}.` };
    }
    if(skill.type === "warrior_shield"){
      const shield = Math.floor(maxHp * 0.15);
      return { ...skill, cost: 20, shield, description: `${skill.name}: consome 20 MP e concede ${shield} de escudo.` };
    }
    if(skill.type === "warrior_titan_break"){
      const damage = Math.floor(maxHp * 0.15);
      return { ...skill, cost: 28, damage, ignoreArmor: true, description: `${skill.name}: consome 28 MP e causa ${damage} de dano ignorando a armadura.` };
    }
    if(skill.type === "warrior_armor_break"){
      const damage = 5 * skillPower;
      return { ...skill, cost: 28, damage, ignoreArmor: true, description: `${skill.name}: consome 28 MP e causa ${damage} de dano ignorando a armadura.` };
    }
    if(skill.type === "mage_mana_burst"){
      const damage = player.class === "Mago" && subclassState.tier30 === "arcanista" && player.level >= 54
        ? 30 + Math.floor(0.4 * (skillPower + attack))
        : 30 + Math.floor(0.4 * skillPower);
      return { ...skill, cost: 30 + arcanistExtraCost, damage, description: `${skill.name}: consome ${30 + arcanistExtraCost} MP e causa ${damage} de dano.` };
    }
    if(skill.type === "mage_fireball"){
      const damage = 30 + Math.floor(0.6 * skillPower);
      return { ...skill, cost: 40, damage, description: `${skill.name}: consome 40 MP e causa ${damage} de dano de fogo.` };
    }
    if(skill.type === "mage_concentration"){
      return { ...skill, cost: 40 + arcanistExtraCost, turns: 3, percent: 0.1, description: `${skill.name}: consome ${40 + arcanistExtraCost} MP e aumenta o dano de habilidade em 10% por 3 turnos.` };
    }
    if(skill.type === "mage_mana_shield"){
      const improvedShield = player.class === "Mago" && subclassState.tier30 === "arcanista" && player.level >= 48;
      const manaPercentCost = improvedShield ? 0.05 : 0.15;
      const cost = Math.floor(maxMp * manaPercentCost) + (improvedShield ? 0 : arcanistExtraCost);
      const shield = 20 + Math.floor(0.4 * maxMp);
      return { ...skill, cost, shield, turns: 2, description: `${skill.name}: consome ${cost} MP e concede ${shield} de escudo por 2 turnos.` };
    }
    if(skill.type === "mage_freeze"){
      const damage = 20 + Math.floor(0.4 * skillPower);
      return { ...skill, cost: 26, damage, freezeChance: 0.15, description: `${skill.name}: consome 26 MP, causa ${damage} de dano e tem 15% de chance de impedir o proximo ataque do inimigo.` };
    }
    if(skill.type === "archer_focus"){
      const bonus = player.level >= 48 && subclassState.tier30 === "atirador" ? 0.1 : 0.05;
      const doubleChance = player.level >= 48 && subclassState.tier30 === "atirador" ? 0.1 : 0;
      return { ...skill, cost: 20, turns: 4, bonus, doubleChance, description: `${skill.name}: consome 20 MP, garante acerto por 4 turnos e aumenta o dano basico em ${Math.floor(bonus * 100)}%${doubleChance ? ", com 10% de chance extra de dano dobrado" : ""}.` };
    }
    if(skill.type === "archer_headshot"){
      const damage = 30 + Math.floor((subclassState.tier30 === "atirador" && player.level >= 36 ? 0.5 : 0.3) * skillPower);
      const cost = subclassState.tier30 === "atirador" && player.level >= 36 ? 20 : 16;
      const critChance = subclassState.tier30 === "atirador" && player.level >= 36 ? 0.15 : 0.1;
      return { ...skill, cost, damage, critChance, description: `${skill.name}: consome ${cost} MP e causa ${damage} de dano, com ${Math.floor(critChance * 100)}% de chance de dano dobrado.` };
    }
    if(skill.type === "archer_hide"){
      const chance = subclassState.tier30 === "cacador" && player.level >= 48 ? 0.25 : 0.15;
      return { ...skill, cost: 18, turns: 3, dodge: chance, description: `${skill.name}: consome 18 MP e aumenta sua chance de esquiva em ${Math.floor(chance * 100)}% por 3 turnos.` };
    }
    if(skill.type === "archer_barrage"){
      return { ...skill, cost: 30, hits: 2, description: `${skill.name}: consome 30 MP e realiza 2 ataques basicos no mesmo turno.` };
    }
    return { ...skill, cost: 0, description: skill.name };
  });
}

function getCampEntries(){
  const classTrees = getClassTrees();
  const unlockedActiveNames = new Set(getUnlockedActiveSkills().map(skill => skill.name));
  const activeDetails = new Map(getSkillInfo().map(skill => [skill.name, skill]));
  const activeEntries = (classTrees.activeSkills || []).map(skill => {
    const activeDetail = activeDetails.get(skill.name);
    const unlocked = unlockedActiveNames.has(skill.name);
    return {
      name: skill.name,
      status: unlocked ? "Disponivel" : `Desbloqueia no nivel ${skill.level}`,
      statusClass: unlocked ? "status-on" : "status-off",
      description: activeDetail?.description || "Habilidade ainda bloqueada."
    };
  });
  const passiveEntries = (classTrees.passiveSkills || []).map(skill => {
    const unlocked = player.level >= skill.level;
    return {
      name: skill.name,
      status: unlocked ? "Sempre ativa" : `Desbloqueia no nivel ${skill.level}`,
      statusClass: unlocked ? "status-on" : "status-off",
      description: unlocked ? getPassiveStatusDescription(skill) : skill.description
    };
  });
  return { activeEntries, passiveEntries };
}

function getPassiveStatusDescription(skill){
  const subclassState = getPlayerSubclassState();
  if(skill.type === "warrior_flat_reduction"){
    return `${skill.name}: reduz ${Math.floor(1 * player.level)} de dano por ataque recebido.`;
  }
  if(skill.type === "warrior_enemy_miss"){
    return `${skill.name}: concede 5% de chance do inimigo errar ao atacar voce.`;
  }
  if(skill.type === "warrior_first_skill_free"){
    return `${skill.name}: a primeira habilidade usada em cada combate nao custa mana.`;
  }
  if(skill.type === "bonus_xp"){
    return `${skill.name}: aumenta toda XP ganha em 10%.`;
  }
  if(skill.type === "mage_skill_level_bonus"){
    const factor = subclassState.tier30 === "elementalista" && player.level >= 42 ? 2.4 : 2;
    return `${skill.name}: concede ${Math.floor(factor * player.level)} de dano de habilidade no nivel atual.`;
  }
  if(skill.type === "mage_precious_mana"){
    return `${skill.name}: abaixo de 10% de vida, o dano sofrido tenta ser pago com mana antes da vida.`;
  }
  if(skill.type === "mage_first_damage_skill_boost"){
    return `${skill.name}: a primeira habilidade de dano do combate causa 50% de dano final extra.`;
  }
  if(skill.id === "mana_e_vida"){
    return `${skill.name}: converte ${Math.floor(getPreviewStats().maxMp * 0.1)} de mana maxima em vida maxima.`;
  }
  if(skill.type === "archer_enemy_miss"){
    const chance = subclassState.tier30 === "cacador" && player.level >= 54 ? 10 : 5;
    return `${skill.name}: concede ${chance}% de chance do inimigo errar o ataque contra voce.`;
  }
  if(skill.type === "archer_mana_regen_set"){
    return `${skill.name}: sua regeneracao total de mana por turno passa a ser 16% da mana maxima.`;
  }
  if(skill.type === "archer_attack_level_bonus"){
    let description = `${skill.name}: concede ${Math.floor(0.4 * player.level)} de dano de ataque basico no nivel atual.`;
    if(subclassState.tier30 === "atirador" && player.level >= 54){
      description += " Alem disso, ataques e habilidades ganham 10% de chance de dano dobrado.";
    }
    return description;
  }
  if(skill.type === "coin_bonus"){
    return `${skill.name}: aumenta as moedas obtidas em 15%.`;
  }
  return skill.description;
}

function getActiveBuffs(){
  const buffs = [];
  if(playerEffects.shieldValue > 0){
    buffs.push(`Escudo ${playerEffects.shieldValue}${playerEffects.shieldTurns > 0 ? ` | ${playerEffects.shieldTurns} turno(s)` : ""}`);
  }
  if(playerEffects.attackBuffTurns > 0){
    if(playerEffects.attackBuffAmount > 0){
      buffs.push(`Ataque +${playerEffects.attackBuffAmount} | ${playerEffects.attackBuffTurns} turno(s)`);
    }
    if(playerEffects.attackBuffPercent > 0){
      buffs.push(`Ataque +${Math.floor(playerEffects.attackBuffPercent * 100)}% | ${playerEffects.attackBuffTurns} turno(s)`);
    }
  }
  if(playerEffects.skillBuffTurns > 0){
    if(playerEffects.skillBuffAmount > 0){
      buffs.push(`Habilidade +${playerEffects.skillBuffAmount} | ${playerEffects.skillBuffTurns} turno(s)`);
    }
    if(playerEffects.skillBuffPercent > 0){
      buffs.push(`Habilidade +${Math.floor(playerEffects.skillBuffPercent * 100)}% | ${playerEffects.skillBuffTurns} turno(s)`);
    }
  }
  if(playerEffects.guaranteedHitTurns > 0){
    buffs.push(`Acerto garantido | ${playerEffects.guaranteedHitTurns} turno(s)`);
  }
  if(playerEffects.enemyMissBonusTurns > 0 && playerEffects.enemyMissBonus > 0){
    buffs.push(`Esquiva +${Math.floor(playerEffects.enemyMissBonus * 100)}% | ${playerEffects.enemyMissBonusTurns} turno(s)`);
  }
  if(playerEffects.regenTurns > 0 && playerEffects.regenPercent > 0){
    buffs.push(`Regeneracao ${Math.floor(playerEffects.regenPercent * 100)}% | ${playerEffects.regenTurns} turno(s)`);
  }
  if(playerEffects.damageDoubleTurns > 0 && playerEffects.damageDoubleChanceBonus > 0){
    buffs.push(`Dano dobrado +${Math.floor(playerEffects.damageDoubleChanceBonus * 100)}% | ${playerEffects.damageDoubleTurns} turno(s)`);
  }
  return buffs;
}

function getBasicAttackLabel(){
  return player.class === "Mago" ? "Missel Magico" : "Atacar";
}

function getBasicAttackTooltip(){
  if(player.class === "Mago"){
    const missiles = Math.floor(3 + 0.2 * player.level);
    const minPerMissile = Math.floor(getActiveAttack() * 0.3);
    const maxPerMissile = Math.floor(getActiveAttack() * 0.5);
    return `Missel Magico: consome 10 MP, dispara ${missiles} misseis e cada um causa entre ${minPerMissile} e ${maxPerMissile} de dano.`;
  }
  const attackMin = getActiveAttack();
  const attackMax = getActiveAttack() + 5;
  if(player.class === "Arqueiro"){
    return `Ataque basico. Dano entre ${attackMin} e ${attackMax}. Chance de acerto: ${Math.floor(getHitChance("basic") * 100)}%.`;
  }
  return `Ataque basico. Dano entre ${attackMin} e ${attackMax}.`;
}

function resetCombatEffects(){
  const subclassState = getPlayerSubclassState();
  playerEffects = createDefaultPlayerEffects();
  playerEffects.firstSkillFreeAvailable = player.class === "Guerreiro" && player.level >= 18;
  playerEffects.firstDamageSkillBoostAvailable = player.class === "Mago" && subclassState.tier30 === "elementalista" && player.level >= 54;
}

function applyEnemyArmor(rawDamage, ignoreArmor = false){
  let damage = Math.max(0, Math.floor(rawDamage));
  if(!enemy || ignoreArmor){ return damage; }
  const armor = enemy.armor || 0;
  if(armor > 0 && damage > 0){
    const absorbed = Math.min(armor, damage);
    damage = Math.max(0, damage - armor);
    log(`${enemy.baseName} absorveu ${absorbed} de dano com a armadura.`);
  }
  return damage;
}

function applyDamageToEnemy(rawDamage, options = {}){
  if(!enemy){ return 0; }
  const damage = applyEnemyArmor(rawDamage, !!options.ignoreArmor);
  enemy.hp -= damage;
  return damage;
}

function applyIncomingDamage(baseDamage){
  let damage = Math.max(0, Math.floor(baseDamage));
  const missChance = getEnemyMissChance();
  if(missChance > 0 && Math.random() < missChance){
    return { damage: 0, missed: true, absorbed: 0, manaAbsorbed: 0 };
  }
  const flatReduction = getPassiveModifiers().flatReduction;
  if(flatReduction > 0){
    damage = Math.max(0, damage - flatReduction);
  }
  let absorbed = 0;
  if(playerEffects.shieldValue > 0 && damage > 0){
    absorbed = Math.min(damage, playerEffects.shieldValue);
    playerEffects.shieldValue -= absorbed;
    damage -= absorbed;
  }
  let manaAbsorbed = 0;
  const passiveModifiers = getPassiveModifiers();
  if(passiveModifiers.preciousMana && player.hp <= Math.max(1, Math.floor(getCurrentCaps().maxHp * 0.1)) && damage > 0 && player.mp >= damage){
    manaAbsorbed = damage;
    player.mp = Math.max(0, player.mp - damage);
    damage = 0;
  }
  if(damage > 0){
    player.hp -= damage;
  }
  return { damage, missed: false, absorbed, manaAbsorbed };
}

function getBasicAttackResult(namePrefix = "Voce", applyToTarget = true){
  if(player.class === "Mago"){
    if(player.mp < 10){
      return { blocked: true, message: "Mana insuficiente para usar Missel Magico." };
    }
    player.mp -= 10;
    const missiles = Math.floor(3 + 0.2 * player.level);
    const minPerMissile = Math.floor(getActiveAttack() * 0.3);
    const maxPerMissile = Math.floor(getActiveAttack() * 0.5);
    const hitDamages = [];
    if(applyToTarget){
      for(let missile = 0; missile < missiles; missile++){
        const rolledDamage = minPerMissile + Math.floor(Math.random() * (Math.max(1, maxPerMissile - minPerMissile + 1)));
        hitDamages.push(applyDamageToEnemy(rolledDamage));
      }
    }else{
      for(let missile = 0; missile < missiles; missile++){
        const rolledDamage = minPerMissile + Math.floor(Math.random() * (Math.max(1, maxPerMissile - minPerMissile + 1)));
        hitDamages.push(rolledDamage);
      }
    }
    const finalDamage = hitDamages.reduce((sum, damage) => sum + damage, 0);
    return { damage: finalDamage, missiles, hitDamages, message: `${namePrefix} lançou ${missiles} misseis magicos e causou ${finalDamage} de dano.` };
  }
  if(player.class === "Arqueiro" && !rollHit("basic")){
    return { damage: 0, message: `${namePrefix} errou o ataque.` };
  }
  let damage = getActiveAttack() + Math.floor(Math.random() * 6);
  if(player.class === "Arqueiro" && shouldDoubleDamage()){
    damage *= 2;
  }
  const finalDamage = applyToTarget ? applyDamageToEnemy(damage) : damage;
  return { damage: finalDamage, message: `${namePrefix} causou ${finalDamage} de dano.` };
}

function applyFirstDamageSkillBonus(damage, isDamageSkill){
  if(isDamageSkill && playerEffects.firstDamageSkillBoostAvailable){
    playerEffects.firstDamageSkillBoostAvailable = false;
    return Math.floor(damage * 1.5);
  }
  return damage;
}

function useSkillCost(skillInfo){
  if(playerEffects.firstSkillFreeAvailable){
    playerEffects.firstSkillFreeAvailable = false;
    return 0;
  }
  return skillInfo.cost;
}

function applySkillLocally(skillInfo, actorName = "Voce", applyToTarget = true){
  const cost = useSkillCost(skillInfo);
  if(player.mp < cost){
    return { blocked: true, message: "Mana insuficiente!" };
  }
  player.mp -= cost;
  let damage = 0;
  let message = `${actorName} usou ${skillInfo.name}.`;
  let freeTurn = false;
  let freezeApplied = false;
  if(["warrior_brandish", "warrior_smash", "warrior_swift_strikes", "warrior_titan_break", "warrior_armor_break", "mage_mana_burst", "mage_fireball", "mage_freeze"].includes(skillInfo.type)){
    damage = applyFirstDamageSkillBonus(skillInfo.damage, true);
    damage = applyToTarget ? applyDamageToEnemy(damage, { ignoreArmor: skillInfo.ignoreArmor }) : damage;
    message = `${actorName} usou ${skillInfo.name} e causou ${damage} de dano.`;
    if(skillInfo.type === "mage_freeze" && Math.random() < skillInfo.freezeChance){
      if(applyToTarget && enemy){
        enemy.skipNextAttack = true;
      }
      freezeApplied = true;
      message += " O inimigo foi congelado e pode perder o proximo ataque.";
    }
  }
  if(skillInfo.type === "archer_headshot"){
    damage = skillInfo.damage;
    if(shouldDoubleDamage(skillInfo.critChance)){
      damage *= 2;
    }
    damage = applyToTarget ? applyDamageToEnemy(damage) : damage;
    message = `${actorName} usou ${skillInfo.name} e causou ${damage} de dano.`;
  }
  if(skillInfo.type === "archer_barrage"){
    let totalDamage = 0;
    let hits = 0;
    for(let i = 0; i < skillInfo.hits; i++){
      if(rollHit("basic")){
        let hitDamage = getActiveAttack() + Math.floor(Math.random() * 6);
        if(shouldDoubleDamage()){
          hitDamage *= 2;
        }
        totalDamage += applyToTarget ? applyDamageToEnemy(hitDamage) : hitDamage;
        hits++;
      }
    }
    damage = totalDamage;
    message = hits ? `${actorName} usou ${skillInfo.name} e acertou ${hits} disparo(s), causando ${damage} de dano.` : `${actorName} usou ${skillInfo.name}, mas nao acertou nenhum disparo.`;
  }
  if(skillInfo.type === "warrior_regen"){
    playerEffects.regenTurns = skillInfo.turns;
    playerEffects.regenPercent = 0.05;
    if(skillInfo.attackPercent){
      playerEffects.attackBuffTurns = skillInfo.turns;
      playerEffects.attackBuffPercent = skillInfo.attackPercent;
    }
    message = `${actorName} usou ${skillInfo.name} e vai recuperar ${skillInfo.heal} de vida por turno durante ${skillInfo.turns} turnos.`;
  }
  if(skillInfo.type === "warrior_shield" || skillInfo.type === "mage_mana_shield"){
    playerEffects.shieldValue = skillInfo.shield;
    playerEffects.shieldTurns = skillInfo.turns || 0;
    message = `${actorName} usou ${skillInfo.name} e ganhou ${skillInfo.shield} de escudo.`;
  }
  if(skillInfo.type === "mage_concentration"){
    playerEffects.skillBuffTurns = skillInfo.turns;
    playerEffects.skillBuffPercent = skillInfo.percent;
    message = `${actorName} usou ${skillInfo.name} e aumentou o dano de habilidade por ${skillInfo.turns} turnos.`;
  }
  if(skillInfo.type === "archer_focus"){
    playerEffects.attackBuffTurns = skillInfo.turns;
    playerEffects.attackBuffPercent = skillInfo.bonus;
    playerEffects.guaranteedHitTurns = skillInfo.turns;
    playerEffects.damageDoubleTurns = skillInfo.turns;
    playerEffects.damageDoubleChanceBonus = skillInfo.doubleChance;
    message = `${actorName} usou ${skillInfo.name} e ficou com acerto garantido por ${skillInfo.turns} turnos.`;
  }
  if(skillInfo.type === "archer_hide"){
    playerEffects.enemyMissBonusTurns = skillInfo.turns;
    playerEffects.enemyMissBonus = skillInfo.dodge;
    message = `${actorName} usou ${skillInfo.name} e ganhou ${Math.floor(skillInfo.dodge * 100)}% de esquiva adicional por ${skillInfo.turns} turnos.`;
  }
  return { blocked: false, message, damage, freeTurn, freezeApplied };
}

function getRarityStat(statKey, rarity){
  return rarityStats[statKey]?.[rarity] || 0;
}

function normalizeEquipmentMetadata(item){
  if(!item || item.type !== "equipment"){ return item; }
  if(!item.baseItemId){
    const raritySuffix = item.rarity ? `_${item.rarity}` : "";
    item.baseItemId = item.id?.endsWith(raritySuffix) ? item.id.slice(0, -raritySuffix.length) : item.id;
  }
  const legacyDrop = legacyDropByBaseId[item.baseItemId];
  if(legacyDrop){
    item.enemyName = item.enemyName || legacyDrop.enemyName;
    item.enemyLevel = item.enemyLevel || getEnemyTemplateByName(legacyDrop.enemyName)?.level || 1;
    item.slot = item.slot || legacyDrop.slot;
    item.classRestriction = item.classRestriction || legacyDrop.classRestriction;
  }
  if(item.enemyName && !item.setId){
    item.setId = `${slugify(item.enemyName)}_${slugify(item.classRestriction || "classe")}_set`;
  }
  if(item.enemyName && !item.setName){
    item.setName = getEnemySetLabel(item.enemyName);
  }
  return item;
}

function buildEquipmentDescription(item){
  item = normalizeEquipmentMetadata(item);
  const lines = [];
  const statText = formatStatBonusList(item);
  if(statText){ lines.push(statText); }
  if(item.setId && item.setName){
    const setPieces = getEquippedSetCount(item.setId);
    const setBonus = getSetBonusValues(item.enemyLevel || 1, item.classRestriction || player?.class || "Guerreiro");
    lines.push(`${item.setName} (${setPieces}/5)`);
    lines.push(`Bonus do set completo: ${formatStatBonusList(setBonus)}`);
  }
  lines.push(`Equipavel apenas por ${item.classRestriction}.`);
  return lines.join(". ");
}

function getEquipmentTooltip(item){
  if(!item){
    return "Espaco vazio.";
  }
  return `${buildEquipmentDescription(item)} Clique com o botao direito para desequipar.`;
}

function createEquipmentItem(dropTemplate, rarity){
  const rarityInfo = getRarityInfo(rarity);
  const statProfile = dropTemplate.statProfile || dropTemplate.stats || {};
  const item = {
    id: `${dropTemplate.id}_${rarity}`,
    baseItemId: dropTemplate.id,
    name: `${dropTemplate.name} ${rarityInfo.label}`,
    type: "equipment",
    slot: dropTemplate.slot,
    classRestriction: dropTemplate.classRestriction,
    rarity,
    rarityLabel: rarityInfo.label,
    enemyName: dropTemplate.enemyName || null,
    enemyLevel: dropTemplate.enemyLevel || 1,
    setId: dropTemplate.setId || null,
    setName: dropTemplate.setName || null
  };
  if(dropTemplate.enemyLevel){
    const rarityMultiplier = rarityMultipliers[rarity] || 1;
    for(const [bonusKey, weight] of Object.entries(statProfile)){
      const baseScale = equipmentBaseScaling[bonusKey] || 0;
      const value = Math.floor(dropTemplate.enemyLevel * baseScale * weight * rarityMultiplier);
      if(value > 0){
        item[bonusKey] = value;
      }
    }
  }else{
    for(const [bonusKey, statScale] of Object.entries(statProfile)){
      item[bonusKey] = getRarityStat(statScale, rarity);
    }
  }
  item.description = buildEquipmentDescription(item);
  return item;
}

function getDropTemplateFromItem(item){
  item = normalizeEquipmentMetadata(item);
  if(item?.enemyName){
    return getEnemySetTemplate(item.enemyName, item.classRestriction, item.slot);
  }
  const legacyDrop = legacyDropByBaseId[item?.baseItemId];
  if(legacyDrop){
    return getEnemySetTemplate(legacyDrop.enemyName, item.classRestriction || legacyDrop.classRestriction, item.slot || legacyDrop.slot);
  }
  return null;
}

function getSellPrice(item){
  if(item.type === "consumable"){
    const price = consumableCatalog[item.id]?.price || 20;
    return Math.max(8, Math.floor(price * 0.5));
  }
  if(item.type === "chest"){
    return 35;
  }
  if(item.type === "equipment"){
    return Math.max(
      18,
      Math.floor(
        10
        + (item.bonusHp || 0) * 0.8
        + (item.bonusMp || 0) * 1
        + (item.bonusAttack || 0) * 7
        + (item.skillPower || 0) * 6
      )
    );
  }
  return 8;
}

function getForgeUpgradeCost(item){
  const rarityRank = getRarityRank(item.rarity);
  return 70 + rarityRank * 95;
}

function getForgeUpgradeChance(item){
  const rarityRank = getRarityRank(item.rarity);
  const chances = [0.8, 0.58, 0.36, 0.18];
  return chances[rarityRank] || 0;
}

function createConsumableItem(id, qty = 1){
  const data = consumableCatalog[id];
  if(!data){ return null; }
  return {
    id,
    name: data.name,
    qty,
    type: "consumable",
    description: data.description
  };
}

function removeInventoryUnit(itemIndex){
  const item = player.inventory[itemIndex];
  if(!item){ return; }
  if((item.qty || 1) > 1){
    item.qty--;
  }else{
    player.inventory.splice(itemIndex, 1);
  }
}

function getEquipmentDisplayName(item){
  if(!item){
    return `<span class="slot-empty">Espaco vazio</span>`;
  }
  const rarityInfo = getRarityInfo(item.rarity);
  return `<span class="${rarityInfo.cssClass}">${item.name}</span>`;
}

function getEquipmentSlotClass(item){
  return item ? "filled" : "empty";
}

function renderEquipmentShowcase(){

          <div class="equip-slot action-btn equip-chest ${getEquipmentSlotClass(player.equipment.chest)}" data-tooltip="${getEquipmentTooltip(player.equipment.chest)}" oncontextmenu="return unequipItem('chest', event)"><strong>${slotLabels.chest}</strong>${getEquipmentDisplayName(player.equipment.chest)}</div>
          <div class="equip-slot action-btn equip-legs ${getEquipmentSlotClass(player.equipment.legs)}" data-tooltip="${getEquipmentTooltip(player.equipment.legs)}" oncontextmenu="return unequipItem('legs', event)"><strong>${slotLabels.legs}</strong>${getEquipmentDisplayName(player.equipment.legs)}</div>
          <div class="equip-slot action-btn equip-feet ${getEquipmentSlotClass(player.equipment.feet)}" data-tooltip="${getEquipmentTooltip(player.equipment.feet)}" oncontextmenu="return unequipItem('feet', event)"><strong>${slotLabels.feet}</strong>${getEquipmentDisplayName(player.equipment.feet)}</div>

function renderForgePanel(){
  const equippedItems = equipmentSlots
    .map(slot => ({ slot, label: slotLabels[slot], item: normalizeEquipmentMetadata(player.equipment?.[slot]) }))
    .filter(entry => entry.item);
  if(!equippedItems.length){
    return `<div class="inventory-item"><strong>Ferreiro</strong><br><span class="lock-note">Equipe um item no acampamento para tentar aprimora-lo aqui.</span></div>`;
  }
  return `<div class="inventory-item"><strong>Ferreiro</strong><br><span class="lock-note">Tente elevar a raridade dos seus equipamentos equipados. Cada novo grau fica mais caro e mais dificil.</span><div class="inventory-list">${equippedItems.map(entry => {
    const chance = Math.floor(getForgeUpgradeChance(entry.item) * 100);
    const cost = getForgeUpgradeCost(entry.item);
    const atMax = getRarityRank(entry.item.rarity) >= rarityOrder.length - 1;
    return `<div class="inventory-item"><strong>${entry.label}: ${entry.item.name}</strong><br><span class="lock-note">${atMax ? "Raridade maxima alcancada." : `Tentativa: ${cost} moedas | Chance: ${chance}%`}</span><div class="button-row"><button onclick="tryUpgradeEquippedItem('${entry.slot}')" ${atMax ? "disabled" : ""}>Aprimorar</button></div></div>`;
