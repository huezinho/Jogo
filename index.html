<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RPG por Turnos</title>
<style>
body{font-family:Arial,sans-serif;background:#1e1e1e;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.container{width:1180px;max-width:calc(100vw - 24px);background:#2b2b2b;padding:20px;border-radius:16px;box-shadow:0 0 20px rgba(0,0,0,.4)}
button{padding:10px 16px;margin:6px;border:none;border-radius:10px;cursor:pointer}
button:disabled{cursor:not-allowed;opacity:.6}
.button-row{display:flex;gap:10px;flex-wrap:wrap}
.panel{margin:15px 0;padding:15px;background:#3a3a3a;border-radius:12px}
.game-layout{display:grid;grid-template-columns:220px minmax(0,1fr) 260px;gap:18px;align-items:start}
.side-column .panel,.main-column .panel{margin-top:0}
.main-column{display:flex;flex-direction:column;gap:15px}
.player-header{display:flex;justify-content:space-between;align-items:center;gap:12px}
.coin-badge{padding:8px 14px;border-radius:999px;background:#f6c445;color:#2b2100;font-weight:700;box-shadow:0 4px 12px rgba(0,0,0,.22)}
.class-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.class-card{padding:18px;border:none;border-radius:16px;background:linear-gradient(160deg,#4d4d4d,#2f2f2f);color:#fff;text-align:left;box-shadow:0 10px 20px rgba(0,0,0,.18);transition:transform .18s ease,box-shadow .18s ease}
.class-card:hover{transform:translateY(-3px);box-shadow:0 14px 24px rgba(0,0,0,.24)}
.class-card .class-icon{font-size:38px;display:block;margin-bottom:8px}
.class-card h4{margin:0 0 10px 0;font-size:20px}
.class-card p{margin:6px 0;font-size:14px}
.class-card small{display:block;margin-top:10px;color:#d6d6d6;line-height:1.45}
.stat-hp{color:#89f07d}
.stat-mp{color:#7bc9ff}
.stat-atk{color:#ffd36a}
.class-warrior{background:linear-gradient(160deg,#68533a,#32261b)}
.class-archer{background:linear-gradient(160deg,#45644b,#1e3022)}
.class-mage{background:linear-gradient(160deg,#35506c,#1d263b)}
.saved-campaign{margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12)}
.death-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.panel-header{display:flex;justify-content:space-between;align-items:center;gap:10px}
.inventory-list,.trophy-list{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.inventory-item,.trophy-item{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.06)}
.trophy-item.locked{opacity:.55}
.trophy-category{padding:12px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
.trophy-summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
.trophy-summary-card{padding:12px;border-radius:12px;background:linear-gradient(160deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08)}
.trophy-summary-card strong{display:block;font-size:12px;color:#d7d7d7;text-transform:uppercase;letter-spacing:.04em}
.trophy-summary-card span{display:block;margin-top:6px;font-size:22px;font-weight:700}
.trophy-summary-card small{display:block;margin-top:4px;color:#d7d7d7}
.bestiary-filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.boss-ability-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.boss-ability-item{padding:10px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06)}
.boss-ability-item strong{display:block;margin-bottom:4px}
.status-on{color:#89f07d;font-weight:700}
.status-off{color:#ffd36a;font-weight:700}
.camp-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:12px 0}
.camp-stat{padding:12px;border-radius:12px;background:linear-gradient(160deg,rgba(255,255,255,.09),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08)}
.camp-stat strong{display:block;font-size:12px;color:#d7d7d7;text-transform:uppercase;letter-spacing:.04em}
.camp-stat span{display:block;margin-top:6px;font-size:22px;font-weight:700}
.equipment-layout{display:grid;grid-template-columns:126px minmax(0,1fr);gap:12px;align-items:center;margin-top:12px}
.equipment-body{position:relative;min-height:320px;padding:18px 14px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03))}
.equipment-stack{position:relative;display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;min-height:320px}
.hero-silhouette{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:78px;opacity:.18}
.equip-slot{width:126px;min-height:74px;padding:8px 10px;border-radius:12px;font-size:12px;line-height:1.35;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;box-sizing:border-box;transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}
.equip-slot strong{display:block;color:#d7d7d7;font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.equip-slot.empty{background:rgba(17,17,17,.42);border:1px dashed rgba(255,255,255,.14);box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}
.equip-slot.filled{background:rgba(17,17,17,.86);border:1px solid rgba(255,255,255,.14);box-shadow:0 8px 18px rgba(0,0,0,.18)}
.slot-empty{color:#909090;font-style:italic}
.equip-weapon{align-self:center}
.rarity-comum{color:#f0f0f0}
.rarity-incomum{color:#7ee787}
.rarity-rara{color:#62b0ff}
.rarity-ultra-rara{color:#d394ff}
.rarity-lendaria{color:#ffbf47}
.boss-btn{background:#8b2f2f;color:#fff}
.lock-note{font-size:13px;color:#d1d1d1}
.bar{height:20px;background:#555;border-radius:10px;overflow:hidden;margin:5px 0;position:relative}
.bar.small{height:9px;background:#494949}
.fill{height:100%;transition:width .32s linear;position:relative;z-index:2}
.shield-fill{height:100%;background:#aeb5bd;transition:width .32s linear}
.shield-row{margin-bottom:6px}
.shield-label{font-size:12px;color:#d9d9d9}
.buff-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.buff-pill{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px;color:#f3f3f3}
.hp{background:#4caf50}.mp{background:#2196f3}.xp{background:#ffc107}
#log{height:180px;overflow-y:auto;background:#111;padding:10px;border-radius:10px}
.action-btn{position:relative}
.action-btn[data-tooltip]:hover::after{
  content:attr(data-tooltip);
  position:absolute;
  left:50%;
  bottom:calc(100% + 8px);
  transform:translateX(-50%);
  min-width:220px;
  max-width:280px;
  padding:10px 12px;
  border-radius:10px;
  background:#101010;
  color:#fff;
  box-shadow:0 8px 18px rgba(0,0,0,.35);
  font-size:13px;
  line-height:1.4;
  white-space:normal;
  z-index:10
}
.action-btn[data-tooltip]:hover::before{
  content:"";
  position:absolute;
  left:50%;
  bottom:100%;
  transform:translateX(-50%);
  border:6px solid transparent;
  border-top:none;
  border-bottom-color:#101010;
  z-index:11
}
.levelup-panel{border:1px solid #ffc107;background:#4a3c10}
.attribute-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:10px 0;padding:10px;border-radius:10px;background:rgba(255,255,255,.06)}
.attribute-controls{display:flex;align-items:center;gap:8px}
.attribute-controls button{padding:6px 12px;margin:0}
.attribute-value{min-width:32px;text-align:center;font-weight:700}
.tabs{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap}
.tab-btn{background:#505050;color:#fff}
.tab-btn.active{background:#1565c0}
.region-chip{padding:8px 14px;border-radius:999px;background:#505050;color:#fff}
.region-chip.active{background:#2e7d32}
.sprite-box{display:flex;justify-content:center;align-items:center;min-height:140px;font-size:76px;background:rgba(255,255,255,.05);border-radius:14px;margin-top:10px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.sprite-stage{position:relative;display:flex;justify-content:center;align-items:flex-end;width:100%;min-height:140px;padding:14px}
.sprite-ground{position:absolute;left:16px;right:16px;bottom:12px;height:24px;border-radius:50%;background:radial-gradient(circle,rgba(0,0,0,.45),rgba(0,0,0,0));opacity:.75}
.sprite-figure{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;line-height:1;transform-origin:center bottom;filter:drop-shadow(0 12px 16px rgba(0,0,0,.35));user-select:none}
.hero-sprite-box{min-height:132px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));margin-bottom:10px}
.hero-sprite-box .sprite-stage{min-height:132px}
.hero-sprite-box .sprite-figure{font-size:82px}
.enemy-sprite-box .sprite-figure{font-size:84px}
.hero-guerreiro{color:#f2d0a1}
.hero-arqueiro{color:#bce9bf}
.hero-mago{color:#bdd7ff}
.hero-cavaleiro,.hero-paladino{color:#f3d2a7;text-shadow:0 0 14px rgba(255,215,160,.22)}
.hero-espadachim,.hero-samurai,.hero-ninja,.hero-berserker{color:#ffd6a6;text-shadow:0 0 14px rgba(255,184,120,.22)}
.hero-elementalista,.hero-mago-incendiario,.hero-mago-frigido{color:#bfe0ff;text-shadow:0 0 14px rgba(120,190,255,.22)}
.hero-arcanista,.hero-arquimago,.hero-corrompido{color:#d6c4ff;text-shadow:0 0 16px rgba(171,112,255,.24)}
.hero-atirador,.hero-atirador-arcano,.hero-sniper{color:#c8f2c7;text-shadow:0 0 14px rgba(136,223,136,.2)}
.hero-cacador,.hero-espreitador,.hero-guarda-florestal{color:#cde8ab;text-shadow:0 0 14px rgba(153,214,102,.22)}
.sprite-fx{position:absolute;inset:0;pointer-events:none;z-index:3}
.sprite-box.attacking .sprite-figure{animation:heroStrike .24s linear}
.enemy-sprite-box.attacking .sprite-figure{animation:enemyStrike .24s linear}
.sprite-box.casting .sprite-figure{animation:heroCast .42s ease-out}
.sprite-box.buffing .sprite-figure{animation:heroBuff .5s ease-out}
.sprite-box.hit .sprite-figure{animation:spriteHit .22s linear}
.sprite-box.attacking .sprite-fx::after,.sprite-box.casting .sprite-fx::after,.sprite-box.buffing .sprite-fx::after,.sprite-box.hit .sprite-fx::after{content:"";position:absolute;opacity:0}
.hero-sprite-box.attacking .sprite-fx::after{width:96px;height:10px;right:20%;top:48%;background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.92),rgba(255,215,120,0));transform:rotate(-18deg);animation:slashTrail .24s linear}
.enemy-sprite-box.attacking .sprite-fx::after{width:96px;height:10px;left:20%;top:48%;background:linear-gradient(90deg,rgba(255,120,120,0),rgba(255,244,244,.92),rgba(255,255,255,0));transform:rotate(18deg);animation:enemySlashTrail .24s linear}
.sprite-box.casting .sprite-fx::after{width:76px;height:76px;left:50%;top:46%;border-radius:50%;background:radial-gradient(circle,rgba(159,216,255,.95),rgba(95,165,255,.48),rgba(95,165,255,0));transform:translate(-50%,-50%);animation:castPulse .42s ease-out}
.sprite-box.buffing .sprite-fx::after{width:92px;height:92px;left:50%;top:50%;border-radius:50%;border:2px solid rgba(178,255,203,.72);background:radial-gradient(circle,rgba(178,255,203,.32),rgba(109,228,170,.18),rgba(109,228,170,0));transform:translate(-50%,-50%);animation:buffPulse .5s ease-out}
.sprite-box.hit .sprite-fx::after{inset:14px;border-radius:18px;background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,85,85,.42));animation:hitFlash .22s linear}
.region-floresta{background:linear-gradient(180deg,#295238,#182a1d)}
.region-caverna{background:linear-gradient(180deg,#4b5158,#24282d)}
.region-ruinas{background:linear-gradient(180deg,#72654a,#302820)}
.region-pantano{background:linear-gradient(180deg,#4a6333,#1f2f20)}
.region-vulcao{background:linear-gradient(180deg,#7a3725,#2a1410)}
.region-abismo{background:linear-gradient(180deg,#382458,#120d20)}
.region-fortaleza{background:linear-gradient(180deg,#535d67,#1e252d)}
.region-necropole{background:linear-gradient(180deg,#4d4e62,#1b1a27)}
.region-citadela{background:linear-gradient(180deg,#556d8d,#1c2335)}
.region-panteao{background:linear-gradient(180deg,#8b7c47,#2c2614)}
.region-cataclismo{background:linear-gradient(180deg,#702928,#1f0f0f)}
.region-paradoxo{background:linear-gradient(180deg,#3d6f7b,#171d29)}
@keyframes heroStrike{
  0%{transform:translateX(0) scale(1)}
  35%{transform:translateX(18px) scale(1.02)}
  100%{transform:translateX(0) scale(1)}
}
@keyframes enemyStrike{
  0%{transform:translateX(0) scale(1)}
  35%{transform:translateX(-18px) scale(1.02)}
  100%{transform:translateX(0) scale(1)}
}
@keyframes heroCast{
  0%{transform:translateY(0) scale(1)}
  35%{transform:translateY(-8px) scale(1.05)}
  100%{transform:translateY(0) scale(1)}
}
@keyframes heroBuff{
  0%{transform:translateY(0) scale(1)}
  35%{transform:translateY(-5px) scale(1.08)}
  70%{transform:translateY(-2px) scale(1.03)}
  100%{transform:translateY(0) scale(1)}
}
@keyframes spriteHit{
  0%{transform:translateX(0)}
  25%{transform:translateX(8px)}
  50%{transform:translateX(-8px)}
  75%{transform:translateX(5px)}
  100%{transform:translateX(0)}
}
@keyframes slashTrail{
  0%{opacity:0;transform:scale(.7) rotate(-18deg)}
  25%{opacity:1}
  100%{opacity:0;transform:scale(1.08) rotate(-18deg)}
}
@keyframes enemySlashTrail{
  0%{opacity:0;transform:scale(.7) rotate(18deg)}
  25%{opacity:1}
  100%{opacity:0;transform:scale(1.08) rotate(18deg)}
}
@keyframes castPulse{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}
  30%{opacity:1}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.25)}
}
@keyframes buffPulse{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.45)}
  35%{opacity:1}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.35)}
}
@keyframes hitFlash{
  0%{opacity:0}
  40%{opacity:1}
  100%{opacity:0}
}
.enemy-card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08)}
.enemy-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.enemy-title h3{margin:0 0 6px 0}
.enemy-subtitle{margin:0;color:#d0d0d0;font-size:13px}
.enemy-badges{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.enemy-badge{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px;font-weight:700}
.enemy-drop-box{margin-top:12px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
.enemy-drop-box strong{display:block;margin-bottom:4px}
.enemy-drop-box span{color:#d7d7d7}
.text-input{width:100%;padding:10px 12px;border:none;border-radius:10px;background:#1b1b1b;color:#fff;box-sizing:border-box}
.party-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.party-entry{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.06)}
.room-pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#1565c0;color:#fff;font-weight:700}
.settings-fab{position:fixed;left:18px;bottom:18px;z-index:70;padding:12px 16px;border-radius:14px;background:#1f5f87;color:#fff;box-shadow:0 10px 22px rgba(0,0,0,.28)}
.settings-panel{position:fixed;left:18px;bottom:78px;z-index:75;width:290px;margin:0;background:#2f2f2f;border:1px solid rgba(255,255,255,.08);box-shadow:0 14px 28px rgba(0,0,0,.32)}
.settings-options{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.settings-options button.active{background:#2e7d32;color:#fff}
.settings-note{display:block;margin-top:10px;color:#d0d0d0;font-size:13px;line-height:1.45}
.subclass-summary{margin-top:12px;padding:12px;border-radius:12px;background:linear-gradient(160deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08)}
.subclass-route{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.subclass-chip{padding:7px 11px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px;font-weight:700}
.subclass-chip.active{background:#2e7d32;color:#fff}
.subclass-bonus-list,.progression-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.progression-item{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.06)}
.progression-item.next{border:1px solid rgba(255,193,7,.45);background:rgba(255,193,7,.08)}
@media (max-width:640px){
  .attribute-row{flex-direction:column;align-items:flex-start}
  .action-btn[data-tooltip]:hover::after{left:0;transform:none}
  .action-btn[data-tooltip]:hover::before{left:18px;transform:none}
  .enemy-top{flex-direction:column}
  .settings-panel{width:calc(100vw - 36px)}
}
@media (max-width:980px){
  .game-layout{grid-template-columns:1fr}
  .class-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
<div id="classSelect" class="panel">
<h3>Escolha sua classe</h3>
<div class="class-grid">
<button class="class-card class-warrior" onclick="selectClass('Guerreiro')">
<span class="class-icon">&#x1F6E1;&#xFE0F;</span>
<h4>Guerreiro</h4>
<p><span class="stat-hp">Vida 120</span></p>
<p><span class="stat-mp">Mana 60</span></p>
<p><span class="stat-atk">Dano basico 18</span></p>
<small>Alta resistencia, pouca mana e o ataque basico mais forte entre as tres classes.</small>
</button>
<button class="class-card class-archer" onclick="selectClass('Arqueiro')">
<span class="class-icon">&#x1F3F9;</span>
<h4>Arqueiro</h4>
<p><span class="stat-hp">Vida 100</span></p>
<p><span class="stat-mp">Mana 80</span></p>
<p><span class="stat-atk">Dano basico 16</span></p>
<small>Classe equilibrada, com boa mobilidade e o melhor ganho ofensivo por ponto.</small>
</button>
<button class="class-card class-mage" onclick="selectClass('Mago')">
<span class="class-icon">&#x1F52E;</span>
<h4>Mago</h4>
<p><span class="stat-hp">Vida 80</span></p>
<p><span class="stat-mp">Mana 100</span></p>
<p><span class="stat-atk">Dano basico 14</span></p>
<small>Menos vida, muita mana e as habilidades mais destrutivas entre as classes.</small>
</button>
</div>
<div id="savedCampaign" class="saved-campaign" style="display:none;"></div>
</div>
<div id="game" style="display:none;">
<div class="game-layout">
<div class="side-column">
<div class="panel">
<h3>Locais</h3>
<div class="tabs" id="modeTabs"></div>
</div>
</div>
<div class="main-column">
<div class="panel" id="playerInfo"></div>
<div class="button-row" id="actions"></div>
<div class="panel" id="enemyInfo"></div>
<div id="levelUpPanel" class="panel levelup-panel" style="display:none;"></div>
<div class="panel" id="logPanel">
<div class="panel-header">
<strong>Log de batalha</strong>
<button onclick="toggleLog()">Ocultar</button>
</div>
<div id="log"></div>
</div>
</div>
<div class="side-column">
<div class="panel" id="regionInfo"></div>
<div class="panel" id="inventoryInfo"></div>
</div>
</div>
</div>
</div>
<button id="settingsFab" class="settings-fab" onclick="toggleSettingsPanel()">Configuracao</button>
<div id="settingsPanel" class="panel settings-panel" style="display:none;"></div>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
const SAVE_KEY = "rpg_turnos_campaign_v1";
const UI_SETTINGS_KEY = "rpg_turnos_ui_settings_v1";
const MAX_LEVEL = 100;
let player, enemy;
let pendingLevelUps = 0;
let levelUpPoints = 0;
let allocation = { hp: 0, mp: 0, attack: 0 };
let isProcessingTurn = false;
let currentRegion = "Floresta";
let needsNewEnemy = false;
let currentMode = "battle";
let bestiaryRegionFilter = null;
let enemiesSpawned = 0;
let isDead = false;
let deadUntil = null;
let isLogHidden = false;
let isSettingsOpen = false;
let playerEffects = createDefaultPlayerEffects();
let displayState = {
  playerHp: null,
  playerMp: null,
  playerXp: null,
  enemyHp: null
};
let uiSettings = loadUiSettings();
let dungeonMultiplayer = createDungeonMultiplayerState();
const rarityOrder = ["comum", "incomum", "rara", "ultra_rara", "lendaria"];
const rarityData = {
  comum: { label: "Comum", cssClass: "rarity-comum", weight: 62 },

function loadUiSettings(){
  try{
    const saved = JSON.parse(localStorage.getItem(UI_SETTINGS_KEY) || "{}");
    return {
      enemyBarSpeed: saved.enemyBarSpeed || "rapida",
      disableRespawnTimer: !!saved.disableRespawnTimer
    };
  }catch{
    return { enemyBarSpeed: "rapida", disableRespawnTimer: false };
  }
}

function saveUiSettings(){
  localStorage.setItem(UI_SETTINGS_KEY, JSON.stringify(uiSettings));
  renderSettingsPanel();
}

function toggleSettingsPanel(){
  isSettingsOpen = !isSettingsOpen;
  renderSettingsPanel();
}

function setEnemyBarSpeed(speed){
  uiSettings.enemyBarSpeed = speed;
  saveUiSettings();
}

function setDisableRespawnTimer(enabled){
  uiSettings.disableRespawnTimer = !!enabled;
  saveUiSettings();
}

function renderSettingsPanel(){
  const panel = document.getElementById("settingsPanel");
  if(!panel){ return; }
  panel.style.display = isSettingsOpen ? "block" : "none";
  if(!isSettingsOpen){
    panel.innerHTML = "";
    return;
  }
  const options = [
    { id: "instantanea", label: "Instantanea" },
    { id: "rapida", label: "Rapida" },
    { id: "media", label: "Media" },
    { id: "lenta", label: "Lenta" }
  ];
  panel.innerHTML = `
    <h3>Configuracao</h3>
    <span class="lock-note">Velocidade da barra de vida do inimigo</span>
    <div class="settings-options">
      ${options.map(option => `<button class="${uiSettings.enemyBarSpeed === option.id ? "active" : ""}" onclick="setEnemyBarSpeed('${option.id}')">${option.label}</button>`).join("")}
    </div>
    <span class="settings-note">Para Guerreiro e Arqueiro, as opcoes continuam mais rapidas que para o Mago para preservar o impacto do Missel Magico.</span>
    <div style="margin-top:14px;">
      <span class="lock-note">Testes de renascimento</span>
      <div class="settings-options">
        <button class="${uiSettings.disableRespawnTimer ? "active" : ""}" onclick="setDisableRespawnTimer(true)">Sem espera</button>
        <button class="${!uiSettings.disableRespawnTimer ? "active" : ""}" onclick="setDisableRespawnTimer(false)">Normal</button>
      </div>
      <span class="settings-note">Opcao de teste para renascer sem tempo de espera.</span>
    </div>`;
}

function getPlayerSubclassState(targetPlayer = player){
  if(!targetPlayer.subclassChoices){
    targetPlayer.subclassChoices = { tier30: null, tier60: null };
  }
  return targetPlayer.subclassChoices;
}

function getTier30ChoiceDef(className, choiceId){
  return (subclassChoicesByClass[className]?.tier30 || []).find(option => option.id === choiceId) || null;
}

function getTier60ChoiceDef(className, tier30Id, choiceId){
  return (subclassChoicesByClass[className]?.tier60?.[tier30Id] || []).find(option => option.id === choiceId) || null;
}

function getChosenSubclassDefs(targetPlayer = player){
  const subclassState = getPlayerSubclassState(targetPlayer);
  const tier30 = subclassState.tier30 ? getTier30ChoiceDef(targetPlayer.class, subclassState.tier30) : null;
  const tier60 = tier30 && subclassState.tier60 ? getTier60ChoiceDef(targetPlayer.class, tier30.id, subclassState.tier60) : null;
  return [tier30, tier60].filter(Boolean);
}

function getCurrentSubclassDef(targetPlayer = player){
  const chosen = getChosenSubclassDefs(targetPlayer);
  return chosen[chosen.length - 1] || null;
}

function getDisplayedClassName(targetPlayer = player){
  return getCurrentSubclassDef(targetPlayer)?.name || targetPlayer.class;
}

function getHeroSpriteIcon(targetPlayer = player){
  const currentSubclass = getCurrentSubclassDef(targetPlayer);
  return (currentSubclass && subclassIcons[currentSubclass.id]) || classIcons[targetPlayer.class] || "&#x2694;&#xFE0F;";
}

function getHeroSpriteClass(targetPlayer = player){
  const currentSubclass = getCurrentSubclassDef(targetPlayer);
  return `hero-${toCssToken(currentSubclass?.id || targetPlayer?.class || "guerreiro")}`;
}

function formatSubclassStatBonuses(subclass){
  if(!subclass){ return "Sem bonus de status."; }
  const parts = [];
  if(subclass.bonusHp){ parts.push(`+${subclass.bonusHp} HP`); }
  if(subclass.bonusMp){ parts.push(`+${subclass.bonusMp} MP`); }
  if(subclass.bonusAttack){ parts.push(`+${subclass.bonusAttack} ATQ`); }
  if(subclass.skillPower){ parts.push(`+${subclass.skillPower} PODER DE HABILIDADE`); }
  return parts.length ? parts.join(" | ") : "Sem bonus de status.";
}

function getTotalSubclassBonuses(targetPlayer = player){
  return getChosenSubclassDefs(targetPlayer).reduce((acc, subclass) => {
    acc.bonusHp += subclass.bonusHp || 0;
    acc.bonusMp += subclass.bonusMp || 0;
    acc.bonusAttack += subclass.bonusAttack || 0;
    acc.skillPower += subclass.skillPower || 0;
    return acc;
  }, { bonusHp: 0, bonusMp: 0, bonusAttack: 0, skillPower: 0 });
}

function chooseWeightedEnemy(enemyList){
  const totalWeight = enemyList.reduce((sum, enemyData) => sum + enemyData.weight, 0);
  let roll = Math.random() * totalWeight;
  for(const enemyData of enemyList){
    roll -= enemyData.weight;
    if(roll <= 0){
      return enemyData;
    }
  }
  return enemyList[enemyList.length - 1];
}

function getEnemyStats(template, regionOverride = null, isBoss = false){
  const regionName = regionOverride || currentRegion;
  const combatProfile = regionCombatProfiles[regionName] || regionCombatProfiles.Floresta;
  const bossProfile = getBossDifficultyProfile(regionName, isBoss);
  const hpMultiplier = isBoss ? bossProfile.hpMultiplier : (combatProfile.hpMultiplier || 1);
  const attackMultiplier = isBoss ? bossProfile.attackMultiplier : (combatProfile.attackMultiplier || 1);
  const hasArmor = combatProfile.armorScale > 0 || combatProfile.armorFlat > 0;
  const armor = hasArmor
    ? Math.max(1, Math.floor(template.level * combatProfile.armorScale) + combatProfile.armorFlat + (isBoss ? Math.max(2, Math.floor(template.level / 30)) + bossProfile.armorBonus : 0))
    : 0;
  const maxHpStrikePercent = combatProfile.maxHpStrikePercent + (isBoss && combatProfile.maxHpStrikePercent > 0 ? 0.01 : 0);
  return {
    maxHp: Math.floor((template.hp + template.level * 18) * hpMultiplier),
    attack: Math.floor((template.attack + template.level * 2) * attackMultiplier),
    armor,
    maxHpStrikePercent
  };
}

function slugify(value){
  return String(value || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_+|_+$/g, "");
}

function toCssToken(value){
  return String(value || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
}

function getRegionSpriteClass(regionName){
  return `region-${toCssToken(regionName)}`;
}

function isAdvancedBossRegion(regionName){
  return advancedBossRegions.includes(regionName);
}

function getBossDifficultyProfile(regionName, isBoss = false){
  const combatProfile = regionCombatProfiles[regionName] || regionCombatProfiles.Floresta;
  if(!isBoss || !isAdvancedBossRegion(regionName)){
    return {
      hpMultiplier: combatProfile.bossHpMultiplier || 1,
      attackMultiplier: combatProfile.bossAttackMultiplier || 1,
      skillMultiplier: combatProfile.bossSkillMultiplier || 1,
      manaMultiplier: combatProfile.bossManaMultiplier || 1,
      armorBonus: combatProfile.bossArmorBonus || 0
    };
  }
  const index = Math.max(0, advancedBossRegions.indexOf(regionName));
  return {
    hpMultiplier: (combatProfile.bossHpMultiplier || 1) * (1 + index * 0.01),
    attackMultiplier: (combatProfile.bossAttackMultiplier || 1) * (1 + index * 0.008),
    skillMultiplier: (combatProfile.bossSkillMultiplier || 1) * (1 + index * 0.01),
    manaMultiplier: (combatProfile.bossManaMultiplier || 1) * (1 + index * 0.006),
    armorBonus: (combatProfile.bossArmorBonus || 0) + Math.floor(index / 3)
  };
}

function getBossAbilityLimit(regionName){
  if(["Floresta", "Caverna", "Ruinas"].includes(regionName)){ return 1; }
  if(["Pantano", "Vulcao", "Abismo"].includes(regionName)){ return 2; }
  if(["Fortaleza", "Necropole", "Citadela"].includes(regionName)){ return 3; }
  if(["Panteao", "Cataclismo", "Paradoxo"].includes(regionName)){ return 4; }
  return 1;
}

function getBossAbilitySet(enemyName, regionName = currentRegion){
  const abilities = bossAbilityCatalog[enemyName] || [];
  const bossProfile = getBossDifficultyProfile(regionName, true);
  return abilities.slice(0, getBossAbilityLimit(regionName)).map(ability => ({
    ...ability,
    power: Number.isFinite(ability.power) ? Math.floor(ability.power * bossProfile.skillMultiplier) : ability.power,
    bonusIfShield: Number.isFinite(ability.bonusIfShield) ? Math.floor(ability.bonusIfShield * bossProfile.skillMultiplier) : ability.bonusIfShield,
    bonusIfNoShield: Number.isFinite(ability.bonusIfNoShield) ? Math.floor(ability.bonusIfNoShield * bossProfile.skillMultiplier) : ability.bonusIfNoShield,
    flatDamageBonus: Number.isFinite(ability.flatDamageBonus) ? Math.floor(ability.flatDamageBonus * bossProfile.skillMultiplier) : ability.flatDamageBonus,
    selfShieldFlat: Number.isFinite(ability.selfShieldFlat) ? Math.floor(ability.selfShieldFlat * bossProfile.skillMultiplier) : ability.selfShieldFlat
  }));
}

function getBossShieldValue(ability){
  return Math.max(0, Math.floor((enemy?.maxHp || 0) * (ability.selfShieldPercent || 0)) + Math.floor(ability.selfShieldFlat || 0));

function restartElementAnimation(element, className){
  if(!element){ return; }
  element.classList.remove(className);
  void element.offsetWidth;
  element.classList.add(className);
}

function pulseSpriteClass(elementId, className, duration = 260){
  const element = document.getElementById(elementId);
  if(!element){ return Promise.resolve(); }
  restartElementAnimation(element, className);
  return new Promise(resolve => {
    setTimeout(() => {
      element.classList.remove(className);
      resolve();
    }, duration);
  });
}

async function playSpriteAttackAnimation(attacker = "hero", style = "attack", connectHit = true, hitRepeats = 1, hitDelay = 72, betweenHits = 92){
  const attackerId = attacker === "hero" ? "heroSpriteBox" : "enemySpriteBox";
  const defenderId = attacker === "hero" ? "enemySpriteBox" : "heroSpriteBox";
  const attackerClass = style === "cast" ? "casting" : style === "buff" ? "buffing" : "attacking";
  const attackerDuration = style === "cast" ? 420 : style === "buff" ? 500 : 260;
  pulseSpriteClass(attackerId, attackerClass, attackerDuration);
  if(!connectHit){
    await wait(style === "cast" ? 200 : style === "buff" ? 240 : 130);
    return;
  }
  await wait(hitDelay);
  for(let hitIndex = 0; hitIndex < Math.max(1, hitRepeats); hitIndex++){
    pulseSpriteClass(defenderId, "hit", 220);
    if(hitIndex < hitRepeats - 1){
      await wait(betweenHits);
    }
  }
  await wait(style === "cast" ? 160 : style === "buff" ? 130 : 100);
}

function getEnemyTemplateByName(enemyName){
  for(const [regionName, regionData] of Object.entries(regions)){
    const regularEnemy = regionData.enemies.find(template => template.name === enemyName);
    if(regularEnemy){
      return { ...regularEnemy, region: regionName, isBoss: false };
    }
    if(regionData.boss?.name === enemyName){
      return { ...regionData.boss, region: regionName, isBoss: true };
    }
  }
  const dungeonEnemy = dungeonData.enemies.find(template => template.name === enemyName);
  if(dungeonEnemy){
    return { ...dungeonEnemy, region: "Dungeon", isBoss: false };
  }
  return null;
}

function formatStatBonusList(source){
  const parts = [];
  if(source?.bonusHp){ parts.push(`+${source.bonusHp} vida maxima`); }
  if(source?.bonusMp){ parts.push(`+${source.bonusMp} mana maxima`); }
  if(source?.bonusAttack){ parts.push(`+${source.bonusAttack} dano de ataque`); }
  if(source?.skillPower){ parts.push(`+${source.skillPower} dano de habilidade`); }
  if(source?.bonusHpPercent){ parts.push(`+${Math.floor(source.bonusHpPercent * 100)}% vida maxima`); }
  if(source?.bonusMpPercent){ parts.push(`+${Math.floor(source.bonusMpPercent * 100)}% mana maxima`); }
  if(source?.totalDamagePercent){ parts.push(`+${Math.floor(source.totalDamagePercent * 100)}% dano total`); }
  return parts.join(", ");
}

    : `${regionArmorPieceNames[slot] || slotLabels[slot] || "Peca"} ${regionArticleMap[regionName] || `de ${regionName}`}`;
  return {

    name: itemName,
    slot,
    classRestriction: slot === "weapon" ? className : null,
    regionName,
    setId: `${slugify(regionName)}_set`,

  const availableSlots = getRegionDropSlots(regionName, enemyName);
  if(!availableSlots.length){ return null; }
  const chosenSlot = forcedSlot && availableSlots.includes(forcedSlot)
    ? forcedSlot
    : availableSlots[Math.floor(Math.random() * availableSlots.length)];
  return getRegionSetTemplate(regionName, chosenSlot, className);
}

function getEquippedSetCount(setId){
  if(!player?.equipment || !setId){ return 0; }
  return equipmentSlots.reduce((total, slot) => total + (player.equipment?.[slot]?.setId === setId ? 1 : 0), 0);
}

function getActiveSetBonuses(){
  const total = { bonusHp: 0, bonusMp: 0, bonusAttack: 0, skillPower: 0, bonusHpPercent: 0, bonusMpPercent: 0, totalDamagePercent: 0 };
  const activeSets = [];
  if(!player?.equipment){ return { bonuses: total, activeSets }; }

  const sets = {};
  for(const slot of equipmentSlots){
    const item = normalizeEquipmentMetadata(player.equipment?.[slot]);
    if(!item?.setId){ continue; }
    if(!sets[item.setId]){
      sets[item.setId] = { slots: new Set(), item };
    }
    sets[item.setId].slots.add(slot);
  }

  for(const entry of Object.values(sets)){
    if(entry.slots.size !== equipmentSlots.length){ continue; }
    const item = entry.item;
    const setBonus = getSetBonusValues(item.regionName);
    total.bonusHp += setBonus.bonusHp || 0;
    total.bonusMp += setBonus.bonusMp || 0;
    total.bonusAttack += setBonus.bonusAttack || 0;
    total.skillPower += setBonus.skillPower || 0;
    total.bonusHpPercent += setBonus.bonusHpPercent || 0;
    total.bonusMpPercent += setBonus.bonusMpPercent || 0;
    total.totalDamagePercent += setBonus.totalDamagePercent || 0;
    activeSets.push({
      setName: item.setName || getRegionSetLabel(item.regionName || "desconhecida"),
      text: formatStatBonusList(setBonus)
    });
  }

  return { bonuses: total, activeSets };
}

function getRegionAverageLevel(region){
  const regionData = regions[region];
  const totalWeight = regionData.enemies.reduce((sum, enemyData) => sum + enemyData.weight, 0);
  const weightedLevels = regionData.enemies.reduce((sum, enemyData) => sum + enemyData.level * enemyData.weight, 0);
  return Math.ceil(weightedLevels / totalWeight);
}

function recordRegionEnemyKill(regionName, enemyName){

  player.stats.regionKills = player.stats.regionKills || {};

  player.stats.regionKills[regionName][enemyName] = (player.stats.regionKills[regionName][enemyName] || 0) + 1;
}

function getBossUnlockProgress(regionName){
  const regionData = regions[regionName];
  if(!regionData){
    return { defeated: 0, total: 0, unlocked: false, missing: [] };
  }
  const regionKills = player?.stats?.regionKills?.[regionName] || {};
  const defeatedEnemies = regionData.enemies.filter(template => (regionKills[template.name] || 0) > 0);
  const missing = regionData.enemies.filter(template => (regionKills[template.name] || 0) <= 0).map(template => template.name);
  return {
    defeated: defeatedEnemies.length,
    total: regionData.enemies.length,
    unlocked: defeatedEnemies.length === regionData.enemies.length,
    missing
  };
}

function isBossUnlocked(regionName){
  return getBossUnlockProgress(regionName).unlocked;
}

function getBossUnlockText(regionName){
  const progress = getBossUnlockProgress(regionName);
  if(progress.unlocked){
    return `Chefao liberado: ${progress.defeated}/${progress.total} inimigos da regiao ja foram derrotados.`;
  }
  return `Para enfrentar o chefao, derrote pelo menos 1 vez cada inimigo da regiao. Progresso: ${progress.defeated}/${progress.total}.`;
}

function normalizePlayerState(){
  function normalizeInventoryItem(item, index){
    const normalized = {
      ...item,
      uid: item.uid || `${item.id || "item"}_${Date.now()}_${index}`
    };
    if(item.type === "consumable" && consumableCatalog[item.id]){
      normalized.name = consumableCatalog[item.id].name;
      normalized.description = consumableCatalog[item.id].description;
    }
    return normalizeEquipmentMetadata(normalized);
  }
  player.inventory = (Array.isArray(player.inventory) ? player.inventory : []).map((item, index) => ({
    ...normalizeInventoryItem(item, index)
  }));
  const oldEquipment = player.equipment || {};
  player.equipment = {
    head: normalizeEquipmentMetadata(oldEquipment.head || null),
    chest: normalizeEquipmentMetadata(oldEquipment.chest || null),
    weapon: normalizeEquipmentMetadata(oldEquipment.weapon || null),
    legs: normalizeEquipmentMetadata(oldEquipment.legs || null),
    feet: normalizeEquipmentMetadata(oldEquipment.feet || oldEquipment.boots || null)
  };
  player.stats = player.stats || {
    enemiesDefeated: 0,
    bossesDefeated: 0,
    coinsEarned: 0,
    deaths: 0,
    regionKills: {}
  };
  player.stats.migrations = player.stats.migrations || {};
  player.stats.regionKills = player.stats.regionKills || {};
  const classDefaults = classes[player.class] || { hp: player.maxHp || 0, mp: player.maxMp || 0, attack: player.attack || 0 };
  player.baseStats = player.baseStats || { hp: classDefaults.hp, mp: classDefaults.mp, attack: classDefaults.attack };
  if(!player.stats.migrations.baseHpRebalance_v1){
    const oldBaseHpByClass = { Guerreiro: 140, Arqueiro: 120, Mago: 100 };
    const oldBaseHp = oldBaseHpByClass[player.class];
    if(oldBaseHp && player.baseStats.hp === oldBaseHp){
      const hpDelta = oldBaseHp - classDefaults.hp;
      player.baseStats.hp = classDefaults.hp;
      player.maxHp = Math.max(classDefaults.hp, (player.maxHp || classDefaults.hp) - hpDelta);
      player.hp = Math.min(player.maxHp, Math.max(1, (player.hp || player.maxHp) - hpDelta));
    }
    player.stats.migrations.baseHpRebalance_v1 = true;
  }
  player.stats.invested = player.stats.invested || { hp: 0, mp: 0, attack: 0 };
  const legacySubclass = player.subclass?.id || player.subclass || null;
  player.subclass = null;
  const subclassState = getPlayerSubclassState(player);
  if(legacySubclass && !subclassState.tier30){
    if(getTier30ChoiceDef(player.class, legacySubclass)){
      subclassState.tier30 = legacySubclass;
    }
  }
  const classBase = player.baseStats || { hp: player.maxHp || 0, mp: player.maxMp || 0, attack: player.attack || 0, growth: player.growth || { hp: 0, mp: 0, attack: 0 } };
  const inferredInvested = {
    hp: Math.max(0, Math.round(((player.maxHp || classBase.hp) - classBase.hp) / Math.max(1, player.growth.hp))),
    mp: Math.max(0, Math.round(((player.maxMp || classBase.mp) - classBase.mp) / Math.max(1, player.growth.mp))),
    attack: Math.max(0, Math.round(((player.attack || classBase.attack) - classBase.attack) / Math.max(1, player.growth.attack)))
  };
  const savedInvested = player.stats.invested || { hp: 0, mp: 0, attack: 0 };
  const savedTotal = (Number(savedInvested.hp) || 0) + (Number(savedInvested.mp) || 0) + (Number(savedInvested.attack) || 0);
  const inferredTotal = inferredInvested.hp + inferredInvested.mp + inferredInvested.attack;
  if(inferredTotal > 0 && (savedTotal <= 0 || savedTotal !== inferredTotal)){
    player.stats.invested = inferredInvested;
  }
  player.activeSkills = getClassTrees().activeSkills;
  player.passiveSkills = getClassTrees().passiveSkills;
  playerEffects = { ...createDefaultPlayerEffects(), ...(playerEffects || {}) };
}

function getPassiveModifiers(){
  const base = {
    bonusHp: 0,
    bonusMp: 0,
    bonusAttack: 0,
    manaRegen: 0,
    manaRegenPercent: 0,
    manaRegenPercentSet: null,
    damageReduction: 0,
    coinBonus: 0,
    skillPower: 0,
    flatReduction: 0,
    reflectPercent: 0,
    turnHealPercent: 0,
    skillCostIncrease: 0,
    totalDamageFlat: 0,
    totalDamagePercent: 0,
    enemyMissChance: 0,
    enemySkipChance: 0,
    xpBonus: 0,
    preciousMana: false,
    manaToLifePercent: 0
  };
  const subclassState = getPlayerSubclassState();
  const tier30 = subclassState.tier30;
  const tier60 = subclassState.tier60;
  for(const passive of getUnlockedPassiveSkills()){
    if(passive.type === "warrior_flat_reduction"){
      base.flatReduction += Math.floor(0.6 * player.level);
      if(tier30 === "cavaleiro" && player.level >= 30){
        base.turnHealPercent += 0.03;
      }
    }
    if(passive.type === "warrior_enemy_miss"){
      base.enemyMissChance += 0.2;
    }
    if(passive.type === "warrior_reflect"){
      base.reflectPercent += tier60 === "paladino" && player.level >= 60 ? 0.32 : tier60 === "berserker" && player.level >= 60 ? 0 : 0.18;
    }
    if(passive.type === "bonus_xp"){
      base.xpBonus += 0.1;
    }
    if(passive.type === "mage_last_resort"){
      base.preciousMana = true;
    }
    if(passive.type === "mage_mana_to_life"){
      base.manaToLifePercent += tier60 === "mago_frigido" && player.level >= 60 ? 0.65 : 0.5;
    }
    if(passive.type === "mage_overflowing"){
      // applied after all mana bonuses are known
    }
    if(passive.type === "mage_charge_damage"){
      base.totalDamagePercent += 0.05 * (playerEffects.arcaneCharges || 0);
    }
    if(passive.type === "mage_glass_cannon"){
      // handled in combat state
    }
    if(passive.type === "archer_dodge_level_scaling"){
      base.enemyMissChance += 0.05 + (0.005 * player.level);
    }
    if(passive.type === "archer_dodge_double_bonus"){
      base.enemyMissChance += 0.05 + (0.005 * player.level);
    }
    if(passive.type === "archer_dodge_coin_bonus"){
      base.enemyMissChance += 0.05 + (0.005 * player.level);
      base.coinBonus += 0.1;
    }
    if(passive.type === "archer_attack_level_bonus"){
      const attackBonus = Math.floor(0.9 * player.level);
      const skillFactor = tier30 === "atirador" && subclassState.tier60 === "atirador_arcano" && player.level >= 60 ? 1.3 : 0.9;
      const skillBonus = Math.floor(skillFactor * player.level);
      base.bonusAttack += attackBonus;
      base.skillPower += skillBonus;
    }
    if(passive.type === "archer_flat_reduction_level"){
      base.flatReduction += Math.floor(0.2 * player.level);
    }
    if(passive.type === "archer_enemy_skip_chance"){
      base.enemySkipChance += 0.07;
    }
    if(passive.type === "coin_bonus"){
      base.coinBonus += tier30 === "cacador" && player.level >= 42 ? 0.15 : 0;
    }
  }
  for(const subclass of getChosenSubclassDefs()){
    base.bonusHp += subclass.bonusHp || 0;
    base.bonusMp += subclass.bonusMp || 0;
    base.bonusAttack += subclass.bonusAttack || 0;
    base.skillPower += subclass.skillPower || 0;
  }
  for(const slot of equipmentSlots){
    const item = player.equipment?.[slot];
    if(!item){ continue; }
    base.bonusHp += item.bonusHp || 0;
    base.bonusMp += item.bonusMp || 0;
    base.bonusAttack += item.bonusAttack || 0;
    base.skillPower += item.skillPower || 0;
  }
  const activeSetBonuses = getActiveSetBonuses().bonuses;
  base.bonusHp += activeSetBonuses.bonusHp || 0;
  base.bonusMp += activeSetBonuses.bonusMp || 0;
  base.bonusAttack += activeSetBonuses.bonusAttack || 0;
  base.skillPower += activeSetBonuses.skillPower || 0;
  base.totalDamagePercent += activeSetBonuses.totalDamagePercent || 0;
  if(activeSetBonuses.bonusMpPercent > 0){
    base.bonusMp += Math.floor((player.maxMp + base.bonusMp + allocation.mp * player.growth.mp) * activeSetBonuses.bonusMpPercent);
  }
  if(getUnlockedPassiveSkills().some(passive => passive.type === "mage_overflowing")){
    const damageFactor = tier60 === "arquimago" && player.level >= 60 ? 0.45 : 0.3;
    const costFactor = tier60 === "arquimago" && player.level >= 60 ? 0.2 : 0.1;
    base.totalDamageFlat += Math.floor((player.maxMp + base.bonusMp) * damageFactor);
    base.skillCostIncrease += Math.floor((player.maxMp + base.bonusMp) * costFactor);
  }
  if(getUnlockedPassiveSkills().some(passive => passive.type === "archer_mana_to_skill_bonus")){
    base.skillPower += Math.floor((player.maxMp + base.bonusMp) * 0.05);
  }
  if(getUnlockedPassiveSkills().some(passive => passive.type === "mage_mana_to_life") && tier60 === "mago_incendiario" && player.level >= 60){
    base.skillPower += Math.floor((player.maxMp + base.bonusMp) * 0.1);
  }
  if(base.manaToLifePercent > 0){
    base.bonusHp += Math.floor((player.maxMp + base.bonusMp + allocation.mp * player.growth.mp) * base.manaToLifePercent);
  }
  if(activeSetBonuses.bonusHpPercent > 0){
    base.bonusHp += Math.floor((player.maxHp + base.bonusHp + allocation.hp * player.growth.hp) * activeSetBonuses.bonusHpPercent);
  }
  return base;
}

}

  return !!(dungeonMultiplayer.peer && (dungeonMultiplayer.isHost || dungeonMultiplayer.hostConnection?.open));
}

function isDungeonHost(){
  return !!(dungeonMultiplayer.peer && dungeonMultiplayer.isHost);
}

function clearDungeonEnemyTimer(){
  if(dungeonMultiplayer.enemyAttackTimer){
    clearInterval(dungeonMultiplayer.enemyAttackTimer);
    dungeonMultiplayer.enemyAttackTimer = null;
  }
}

function getDungeonRoomMembers(){
  return Object.values(dungeonMultiplayer.party);
}

function getDungeonPlayerProfile(){
  return {
    id: dungeonMultiplayer.peer?.id || "local",
    name: `${getDisplayedClassName()} Lv.${player.level}`,
    class: player.class,
    level: player.level,
    icon: getHeroSpriteIcon()
  };
}

function getDungeonCurrentTurnId(){
  return dungeonMultiplayer.turnOrder[dungeonMultiplayer.turnIndex] || null;
}

function isMyDungeonTurn(){
  return isDungeonConnected() && dungeonMultiplayer.battleActive && getDungeonCurrentTurnId() === dungeonMultiplayer.peer?.id;
}

function syncDungeonEnemyState(sharedEnemy){
  if(currentMode !== "dungeon"){ return; }
  enemy = sharedEnemy ? { ...sharedEnemy } : null;
  displayState.enemyHp = enemy ? enemy.hp : null;
  needsNewEnemy = !enemy;
}

function broadcastToDungeonPeers(payload){
  Object.values(dungeonMultiplayer.connections).forEach(connection => {
    if(connection?.open){
      connection.send(payload);
    }
  });
}

function broadcastDungeonState(){
  if(!isDungeonHost()){ return; }
  dungeonMultiplayer.party[dungeonMultiplayer.peer.id] = getDungeonPlayerProfile();
  broadcastToDungeonPeers({
    type: "state",
    roomCode: dungeonMultiplayer.roomCode,
    party: dungeonMultiplayer.party,
    enemy: enemy ? { ...enemy } : null,
    turnOrder: [...dungeonMultiplayer.turnOrder],
    turnIndex: dungeonMultiplayer.turnIndex,
    round: dungeonMultiplayer.round,
    enemySkipTurn: !!dungeonMultiplayer.enemySkipTurn,
    battleActive: !!dungeonMultiplayer.battleActive
  });
}

function syncDungeonProfile(){
  if(!isDungeonConnected()){ return; }
  const profile = getDungeonPlayerProfile();
  if(isDungeonHost()){
    dungeonMultiplayer.party[dungeonMultiplayer.peer.id] = profile;
    broadcastDungeonState();
  }else if(dungeonMultiplayer.hostConnection?.open){
    dungeonMultiplayer.hostConnection.send({ type: "profile_update", player: profile });
  }
}

function handleDungeonPeerDisconnect(peerId){
  delete dungeonMultiplayer.connections[peerId];
  if(dungeonMultiplayer.party[peerId]){
    log(`${dungeonMultiplayer.party[peerId].name} saiu da sala da dungeon.`);
    delete dungeonMultiplayer.party[peerId];
    dungeonMultiplayer.turnOrder = dungeonMultiplayer.turnOrder.filter(id => id !== peerId);
    if(dungeonMultiplayer.turnIndex >= dungeonMultiplayer.turnOrder.length){
      dungeonMultiplayer.turnIndex = 0;
    }
    if(dungeonMultiplayer.battleActive && dungeonMultiplayer.turnOrder.length < 2){
      handleDungeonRaidDefeat("A incursao terminou porque o grupo se desfez.");
      return;
    }
    broadcastDungeonState();
    updateUI();
  }
}

function leaveDungeonRoom(silent = false){
  clearDungeonEnemyTimer();
  Object.values(dungeonMultiplayer.connections).forEach(connection => {
    try { connection.close(); } catch {}
  });
  if(dungeonMultiplayer.hostConnection){
    try { dungeonMultiplayer.hostConnection.close(); } catch {}
  }
  if(dungeonMultiplayer.peer){
    try { dungeonMultiplayer.peer.destroy(); } catch {}
  }
  dungeonMultiplayer = createDungeonMultiplayerState();
  if(currentMode === "dungeon"){
    enemy = null;
    displayState.enemyHp = null;
    needsNewEnemy = true;
  }
  if(!silent){
    log("Voce saiu da sala da dungeon.");
  }
  updateUI();
}
