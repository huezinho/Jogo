<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RPG por Turnos</title>
<style>
body{font-family:Arial,sans-serif;background:#1e1e1e;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.container{width:1180px;max-width:calc(100vw - 24px);background:#2b2b2b;padding:20px;border-radius:16px;box-shadow:0 0 20px rgba(0,0,0,.4)}
button{padding:10px 16px;margin:6px;border:none;border-radius:10px;cursor:pointer}
button:disabled{cursor:not-allowed;opacity:.6}
.button-row{display:flex;gap:10px;flex-wrap:wrap}
.panel{margin:15px 0;padding:15px;background:#3a3a3a;border-radius:12px}
.game-layout{display:grid;grid-template-columns:220px minmax(0,1fr) 260px;gap:18px;align-items:start}
.side-column .panel,.main-column .panel{margin-top:0}
.main-column{display:flex;flex-direction:column;gap:15px}
.player-header{display:flex;justify-content:space-between;align-items:center;gap:12px}
.coin-badge{padding:8px 14px;border-radius:999px;background:#f6c445;color:#2b2100;font-weight:700;box-shadow:0 4px 12px rgba(0,0,0,.22)}
.class-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.class-card{padding:18px;border:none;border-radius:16px;background:linear-gradient(160deg,#4d4d4d,#2f2f2f);color:#fff;text-align:left;box-shadow:0 10px 20px rgba(0,0,0,.18);transition:transform .18s ease,box-shadow .18s ease}
.class-card:hover{transform:translateY(-3px);box-shadow:0 14px 24px rgba(0,0,0,.24)}
.class-card .class-icon{font-size:38px;display:block;margin-bottom:8px}
.class-card h4{margin:0 0 10px 0;font-size:20px}
.class-card p{margin:6px 0;font-size:14px}
.class-card small{display:block;margin-top:10px;color:#d6d6d6;line-height:1.45}
.stat-hp{color:#89f07d}
.stat-mp{color:#7bc9ff}
.stat-atk{color:#ffd36a}
.class-warrior{background:linear-gradient(160deg,#68533a,#32261b)}
.class-archer{background:linear-gradient(160deg,#45644b,#1e3022)}
.class-mage{background:linear-gradient(160deg,#35506c,#1d263b)}
.saved-campaign{margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12)}
.death-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.panel-header{display:flex;justify-content:space-between;align-items:center;gap:10px}
.inventory-list,.trophy-list{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.inventory-item,.trophy-item{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.06)}
.trophy-item.locked{opacity:.55}
.status-on{color:#89f07d;font-weight:700}
.status-off{color:#ffd36a;font-weight:700}
.camp-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:12px 0}
.camp-stat{padding:12px;border-radius:12px;background:linear-gradient(160deg,rgba(255,255,255,.09),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08)}
.camp-stat strong{display:block;font-size:12px;color:#d7d7d7;text-transform:uppercase;letter-spacing:.04em}
.camp-stat span{display:block;margin-top:6px;font-size:22px;font-weight:700}
.equipment-layout{display:grid;grid-template-columns:126px minmax(0,1fr);gap:12px;align-items:center;margin-top:12px}
.equipment-body{position:relative;min-height:320px;padding:18px 14px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03))}
.equipment-stack{position:relative;display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;min-height:320px}
.hero-silhouette{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:78px;opacity:.18}
.equip-slot{width:126px;min-height:74px;padding:8px 10px;border-radius:12px;font-size:12px;line-height:1.35;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;box-sizing:border-box;transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}
.equip-slot strong{display:block;color:#d7d7d7;font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.equip-slot.empty{background:rgba(17,17,17,.42);border:1px dashed rgba(255,255,255,.14);box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}
.equip-slot.filled{background:rgba(17,17,17,.86);border:1px solid rgba(255,255,255,.14);box-shadow:0 8px 18px rgba(0,0,0,.18)}
.slot-empty{color:#909090;font-style:italic}
.equip-weapon{align-self:center}
.rarity-comum{color:#f0f0f0}
.rarity-incomum{color:#7ee787}
.rarity-rara{color:#62b0ff}
.rarity-ultra-rara{color:#d394ff}
.rarity-lendaria{color:#ffbf47}
.boss-btn{background:#8b2f2f;color:#fff}
.lock-note{font-size:13px;color:#d1d1d1}
.bar{height:20px;background:#555;border-radius:10px;overflow:hidden;margin:5px 0;position:relative}
.fill{height:100%;transition:width .28s ease;position:relative;z-index:2}
.shield-fill{position:absolute;right:0;top:0;height:100%;background:#9e9e9e;opacity:.75;transition:width .28s ease;z-index:1}
.hp{background:#4caf50}.mp{background:#2196f3}.xp{background:#ffc107}
#log{height:180px;overflow-y:auto;background:#111;padding:10px;border-radius:10px}
.action-btn{position:relative}
.action-btn[data-tooltip]:hover::after{
  content:attr(data-tooltip);
  position:absolute;
  left:50%;
  bottom:calc(100% + 8px);
  transform:translateX(-50%);
  min-width:220px;
  max-width:280px;
  padding:10px 12px;
  border-radius:10px;
  background:#101010;
  color:#fff;
  box-shadow:0 8px 18px rgba(0,0,0,.35);
  font-size:13px;
  line-height:1.4;
  white-space:normal;
  z-index:10
}
.action-btn[data-tooltip]:hover::before{
  content:"";
  position:absolute;
  left:50%;
  bottom:100%;
  transform:translateX(-50%);
  border:6px solid transparent;
  border-top:none;
  border-bottom-color:#101010;
  z-index:11
}
.levelup-panel{border:1px solid #ffc107;background:#4a3c10}
.attribute-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:10px 0;padding:10px;border-radius:10px;background:rgba(255,255,255,.06)}
.attribute-controls{display:flex;align-items:center;gap:8px}
.attribute-controls button{padding:6px 12px;margin:0}
.attribute-value{min-width:32px;text-align:center;font-weight:700}
.tabs{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap}
.tab-btn{background:#505050;color:#fff}
.tab-btn.active{background:#1565c0}
.region-chip{padding:8px 14px;border-radius:999px;background:#505050;color:#fff}
.region-chip.active{background:#2e7d32}
.sprite-box{display:flex;justify-content:center;align-items:center;min-height:140px;font-size:76px;background:rgba(255,255,255,.05);border-radius:14px;margin-top:10px}
.enemy-card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08)}
.enemy-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.enemy-title h3{margin:0 0 6px 0}
.enemy-subtitle{margin:0;color:#d0d0d0;font-size:13px}
.enemy-badges{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.enemy-badge{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px;font-weight:700}
.enemy-drop-box{margin-top:12px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
.enemy-drop-box strong{display:block;margin-bottom:4px}
.enemy-drop-box span{color:#d7d7d7}
.text-input{width:100%;padding:10px 12px;border:none;border-radius:10px;background:#1b1b1b;color:#fff;box-sizing:border-box}
.party-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.party-entry{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.06)}
.room-pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#1565c0;color:#fff;font-weight:700}
@media (max-width:640px){
  .attribute-row{flex-direction:column;align-items:flex-start}
  .action-btn[data-tooltip]:hover::after{left:0;transform:none}
  .action-btn[data-tooltip]:hover::before{left:18px;transform:none}
  .enemy-top{flex-direction:column}
}
@media (max-width:980px){
  .game-layout{grid-template-columns:1fr}
  .class-grid{grid-template-columns:1fr}
}
</style>
</head>

<div id="game" style="display:none;">

<button onclick="toggleLog()">Ocultar</button>
</div>
<div id="log"></div>
</div>
</div>
<div class="side-column">
<div class="panel" id="regionInfo"></div>
<div class="panel" id="inventoryInfo"></div>
</div>
</div>
</div>
</div>

function chooseWeightedEnemy(enemyList){
  const totalWeight = enemyList.reduce((sum, enemyData) => sum + enemyData.weight, 0);
  let roll = Math.random() * totalWeight;
  for(const enemyData of enemyList){
    roll -= enemyData.weight;
    if(roll <= 0){
      return enemyData;
    }
  }
  return enemyList[enemyList.length - 1];
}

function getEnemyStats(template){
  return {
    maxHp: template.hp + template.level * 18,
    attack: template.attack + template.level * 2
  };
}

function getRegionAverageLevel(region){
  const regionData = regions[region];
  const totalWeight = regionData.enemies.reduce((sum, enemyData) => sum + enemyData.weight, 0);
  const weightedLevels = regionData.enemies.reduce((sum, enemyData) => sum + enemyData.level * enemyData.weight, 0);
  return Math.ceil(weightedLevels / totalWeight);
}

function normalizePlayerState(){
  function normalizeInventoryItem(item, index){
    const normalized = {
      ...item,
      uid: item.uid || `${item.id || "item"}_${Date.now()}_${index}`
    };
    if(item.type === "consumable" && consumableCatalog[item.id]){
      normalized.name = consumableCatalog[item.id].name;
      normalized.description = consumableCatalog[item.id].description;
    }
    return normalizeEquipmentMetadata(normalized);
  }
  player.inventory = (Array.isArray(player.inventory) ? player.inventory : []).map((item, index) => ({
    ...normalizeInventoryItem(item, index)
  }));
  const oldEquipment = player.equipment || {};
  player.equipment = {
    head: normalizeEquipmentMetadata(oldEquipment.head || null),
    chest: normalizeEquipmentMetadata(oldEquipment.chest || null),
    weapon: normalizeEquipmentMetadata(oldEquipment.weapon || null),
    legs: normalizeEquipmentMetadata(oldEquipment.legs || null),
    feet: normalizeEquipmentMetadata(oldEquipment.feet || oldEquipment.boots || null)
  };
  player.stats = player.stats || {
    enemiesDefeated: 0,
    bossesDefeated: 0,
    coinsEarned: 0,
    deaths: 0
  };
  player.stats.invested = player.stats.invested || { hp: 0, mp: 0, attack: 0 };
  player.subclass = player.subclass || null;
  player.activeSkills = getCurrentClassData().activeSkills;
  player.passiveSkills = getCurrentClassData().passiveSkills;
  playerEffects = { ...createDefaultPlayerEffects(), ...(playerEffects || {}) };
}

function getPassiveModifiers(){
  const base = {
    bonusHp: 0,
    bonusMp: 0,
    bonusAttack: 0,
    manaRegen: 0,
    manaRegenPercent: 0,
    damageReduction: 0,
    coinBonus: 0,
    skillPower: 0,
    flatReduction: 0,
    reflectPercent: 0,
    turnHealPercent: 0,
    skillCostIncrease: 0
  };
  for(const passive of getUnlockedPassiveSkills()){
    if(passive.type === "bonus_hp"){ base.bonusHp += passive.value; }
    if(passive.type === "bonus_mp"){ base.bonusMp += passive.value; }
    if(passive.type === "bonus_attack"){ base.bonusAttack += passive.value; }
    if(passive.type === "mana_regen"){ base.manaRegen += passive.value; }
    if(passive.type === "mana_regen_percent"){ base.manaRegenPercent += passive.value; }
    if(passive.type === "damage_reduction"){ base.damageReduction += passive.value; }
    if(passive.type === "coin_bonus"){ base.coinBonus += passive.value; }
    if(passive.type === "skill_power"){ base.skillPower += passive.value; }
    if(passive.type === "flat_reduction_scale"){ base.flatReduction += (passive.base || 0) + Math.floor(player.level * (passive.scale || 0)); }
    if(passive.type === "reflect_percent"){ base.reflectPercent += passive.value; }
    if(passive.type === "turn_heal_percent"){ base.turnHealPercent += passive.value; }
    if(passive.type === "bonus_attack_scale"){ base.bonusAttack += (passive.base || 0) + Math.floor(player.level * (passive.scale || 0)); }
    if(passive.type === "skill_power_scale"){
      base.skillPower += (passive.base || 0) + Math.floor(player.level * (passive.scale || 0));
      base.skillCostIncrease += passive.extra?.skillCostIncrease || 0;
    }
  }
  if(player.subclass){
    base.bonusHp += player.subclass.hp || 0;
    base.bonusMp += player.subclass.mp || 0;
    base.bonusAttack += player.subclass.attack || 0;
    base.manaRegen += player.subclass.manaRegen || 0;
    base.damageReduction += player.subclass.damageReduction || 0;
    base.coinBonus += player.subclass.coinBonus || 0;
    base.skillPower += player.subclass.skillPower || 0;
  }
  for(const slot of equipmentSlots){
    const item = player.equipment?.[slot];
    if(!item){ continue; }
    base.bonusHp += item.bonusHp || 0;
    base.bonusMp += item.bonusMp || 0;
    base.bonusAttack += item.bonusAttack || 0;
    base.skillPower += item.skillPower || 0;
  }
  for(const passive of getUnlockedPassiveSkills()){
    if(passive.type === "mana_to_life_percent"){
      base.bonusHp += Math.floor((player.maxMp + base.bonusMp + allocation.mp * player.growth.mp) * passive.value);
    }
  }
  return base;
}

    type: "state",
    roomCode: dungeonMultiplayer.roomCode,
    party: dungeonMultiplayer.party,
    enemy: enemy ? { ...enemy } : null
  });

  if(isDungeonHost()){

    broadcastDungeonState();
  }else if(dungeonMultiplayer.hostConnection?.open){
    dungeonMultiplayer.hostConnection.send({ type: "profile_update", player: profile });

function handleDungeonPeerDisconnect(peerId){
  delete dungeonMultiplayer.connections[peerId];
  if(dungeonMultiplayer.party[peerId]){
    log(`${dungeonMultiplayer.party[peerId].name} saiu da sala da dungeon.`);
    delete dungeonMultiplayer.party[peerId];
    broadcastDungeonState();
    updateUI();
  }
}

function leaveDungeonRoom(silent = false){
  clearDungeonEnemyTimer();
  Object.values(dungeonMultiplayer.connections).forEach(connection => {
    try { connection.close(); } catch {}
  });
  if(dungeonMultiplayer.hostConnection){
    try { dungeonMultiplayer.hostConnection.close(); } catch {}
  }
  if(dungeonMultiplayer.peer){
    try { dungeonMultiplayer.peer.destroy(); } catch {}
  }
  dungeonMultiplayer = createDungeonMultiplayerState();
  if(currentMode === "dungeon"){
    enemy = null;
    displayState.enemyHp = null;
    needsNewEnemy = true;
  }
  if(!silent){
    log("Voce saiu da sala da dungeon.");
  }
  updateUI();
}

function hostDungeonRoom(){
  if(currentMode !== "dungeon" || !player){ return; }
  if(typeof Peer === "undefined"){
    log("Nao foi possivel carregar o sistema online da dungeon.");
    return;
  }
  leaveDungeonRoom(true);
  const roomCode = `DNG${Math.random().toString(36).slice(2, 7).toUpperCase()}`;
  dungeonMultiplayer = createDungeonMultiplayerState();
  dungeonMultiplayer.isHost = true;
  dungeonMultiplayer.roomCode = roomCode;
  dungeonMultiplayer.peer = new Peer(roomCode);
  dungeonMultiplayer.peer.on("open", id => {
    dungeonMultiplayer.roomCode = id;
    dungeonMultiplayer.party[id] = getDungeonPlayerProfile();
    log(`Sala da dungeon criada: ${id}.`);
    updateUI();
  });
  dungeonMultiplayer.peer.on("connection", connection => {
    if(getDungeonRoomMembers().length >= 3){
      connection.on("open", () => {
        connection.send({ type: "reject", reason: "A sala da dungeon ja esta cheia." });
        connection.close();
      });
      return;
    }
    dungeonMultiplayer.connections[connection.peer] = connection;
    connection.on("data", data => handleDungeonHostMessage(connection, data));
    connection.on("close", () => handleDungeonPeerDisconnect(connection.peer));
  });
  dungeonMultiplayer.peer.on("error", error => {
    log(`Erro na dungeon online: ${error.type || error.message}.`);
    updateUI();
  });
}

function joinDungeonRoom(){
  if(currentMode !== "dungeon" || !player){ return; }
  if(typeof Peer === "undefined"){
    log("Nao foi possivel carregar o sistema online da dungeon.");
    return;
  }
  const input = document.getElementById("dungeonJoinCode");
  const roomCode = (input?.value || "").trim().toUpperCase();
  if(!roomCode){
    log("Informe o codigo da sala para entrar na dungeon.");
    return;
  }
  leaveDungeonRoom(true);
  dungeonMultiplayer = createDungeonMultiplayerState();
  dungeonMultiplayer.isHost = false;
  dungeonMultiplayer.roomCode = roomCode;
  dungeonMultiplayer.peer = new Peer();
  dungeonMultiplayer.peer.on("open", () => {
    const connection = dungeonMultiplayer.peer.connect(roomCode, { reliable: true });
    dungeonMultiplayer.hostConnection = connection;
    connection.on("open", () => {
      connection.send({ type: "join", player: getDungeonPlayerProfile() });
      log(`Conectando a sala ${roomCode}...`);
      updateUI();
    });
    connection.on("data", handleDungeonGuestMessage);
    connection.on("close", () => {
      log("A conexao com a dungeon foi encerrada.");
      leaveDungeonRoom(true);
    });
  });
  dungeonMultiplayer.peer.on("error", error => {
    log(`Erro na conexao da dungeon: ${error.type || error.message}.`);
    updateUI();
  });
}

function handleDungeonHostMessage(connection, data){
  if(!data || !isDungeonHost()){ return; }
  if(data.type === "join"){
    dungeonMultiplayer.party[connection.peer] = data.player;
    connection.send({ type: "joined", roomCode: dungeonMultiplayer.roomCode });
    log(`${data.player.name} entrou na sala da dungeon.`);
    broadcastDungeonState();
    updateUI();
    return;
  }
  if(data.type === "profile_update"){
    dungeonMultiplayer.party[connection.peer] = data.player;
    broadcastDungeonState();
    updateUI();
    return;
  }
  if(data.type === "action"){
    if(data.player){
      dungeonMultiplayer.party[connection.peer] = data.player;
    }
    if(data.message){
      log(data.message);
      broadcastToDungeonPeers({ type: "log", message: data.message });
    }
    if(enemy && data.damage){
      enemy.hp -= data.damage;
      displayState.enemyHp = enemy.hp;
    }
    if(enemy && enemy.hp <= 0){
      handleDungeonRaidVictory();
      return;
    }
    broadcastDungeonState();
    updateUI();
  }
}

function handleDungeonGuestMessage(data){
  if(!data){ return; }
  if(data.type === "reject"){
    log(data.reason);
    leaveDungeonRoom(true);
    return;
  }
  if(data.type === "joined"){
    dungeonMultiplayer.roomCode = data.roomCode;
    updateUI();
    return;
  }
  if(data.type === "state"){
    dungeonMultiplayer.roomCode = data.roomCode || dungeonMultiplayer.roomCode;
    dungeonMultiplayer.party = data.party || {};
    syncDungeonEnemyState(data.enemy || null);
    updateUI();
    return;
  }
  if(data.type === "log"){
    log(data.message);
    return;
  }
  if(data.type === "enemy_attack"){
    processDungeonIncomingDamage(data.damage, data.message);
    return;
  }
  if(data.type === "victory"){
    syncDungeonEnemyState(null);
    grantDungeonRaidRewards(data.rewards);
    log(data.message);
    updateUI();
    return;
  }
  if(data.type === "room_closed"){
    log("O host encerrou a sala da dungeon.");
    leaveDungeonRoom(true);
  }
}

function startDungeonRaid(){
  if(!isDungeonHost() || getDungeonRoomMembers().length < 2 || enemy){ return; }
  const template = chooseWeightedEnemy(dungeonData.enemies);
  enemy = createEnemyFromTemplate(template, false);
  displayState.enemyHp = enemy.hp;
  needsNewEnemy = false;
  log(`A dungeon comecou contra ${enemy.name}!`);
  broadcastToDungeonPeers({ type: "log", message: `A dungeon comecou contra ${enemy.name}!` });
  broadcastDungeonState();
  clearDungeonEnemyTimer();
  dungeonMultiplayer.enemyAttackTimer = setInterval(() => {
    if(!isDungeonHost() || currentMode !== "dungeon" || !enemy){ return; }
    const damage = enemy.attack + Math.floor(Math.random() * 5);
    const message = `${enemy.name} atingiu todo o grupo com ${damage} de dano.`;
    processDungeonIncomingDamage(damage, message);
    broadcastToDungeonPeers({ type: "enemy_attack", damage, message });
  }, 3800);
  updateUI();
}

function grantDungeonRaidRewards(rewards){
  if(!rewards){ return; }
  player.coins += rewards.coins;
  player.stats.coinsEarned += rewards.coins;
  player.stats.enemiesDefeated++;
  gainXP(rewards.xp);
}

function handleDungeonRaidVictory(){
  if(!enemy){ return; }
  const rewards = {
    xp: 40 + enemy.level * 9,
    coins: 14 + enemy.level * 4
  };
  const enemyName = enemy.name;
  clearDungeonEnemyTimer();
  enemy = null;
  displayState.enemyHp = null;
  needsNewEnemy = true;
  grantDungeonRaidRewards(rewards);
  const message = `${enemyName} foi derrotado! Cada jogador recebeu ${rewards.xp} XP e ${rewards.coins} moedas.`;
  log(message);
  broadcastToDungeonPeers({ type: "victory", rewards, message });
  broadcastDungeonState();
  updateUI();
}

function processDungeonIncomingDamage(baseDamage, message){
  if(message){
    log(message);
  }
  let dmg = baseDamage;
  const hpBefore = player.hp;
  const passiveReduction = getPassiveModifiers().damageReduction;
  const flatReduction = getPassiveModifiers().flatReduction;
  dmg = Math.max(0, dmg - flatReduction);
  if(flatReduction > 0){
    log(`Sua resistencia reduziu ${flatReduction} de dano.`);
  }
  dmg = Math.max(0, Math.floor(dmg * (1 - Math.min(0.75, passiveReduction))));
  if(playerEffects.shieldValue > 0 && dmg > 0){
    const absorbed = Math.min(dmg, playerEffects.shieldValue);
    playerEffects.shieldValue -= absorbed;
    dmg -= absorbed;
    log(`Seu escudo absorveu ${absorbed} de dano.`);
  }
  if(dmg > 0){
    player.hp = Math.max(1, player.hp - dmg);
  }
  if(hpBefore > 1 && player.hp === 1){
    log("Voce ficou por um fio, mas o grupo ainda te manteve na batalha.");
  }
  displayState.playerHp = player.hp;
  updateUI();
}

function sendDungeonActionPayload(payload){
  if(!isDungeonConnected() || !enemy){ return; }
  const actionPayload = { ...payload, player: getDungeonPlayerProfile() };
  if(isDungeonHost()){
    handleDungeonHostMessage({ peer: dungeonMultiplayer.peer.id }, { type: "action", ...actionPayload });
  }else if(dungeonMultiplayer.hostConnection?.open){
    dungeonMultiplayer.hostConnection.send({ type: "action", ...actionPayload });
  }
}

function dungeonAttack(){
  if(currentMode !== "dungeon" || !isDungeonConnected() || !enemy || isDead){ return; }
  if(Date.now() < dungeonMultiplayer.actionLockedUntil){
    updateUI();
    return;
  }
  dungeonMultiplayer.actionLockedUntil = Date.now() + 900;
  let damage = 0;
  let message;
  if(player.class === "Arqueiro" && !rollHit("basic")){
    message = `${getDungeonPlayerProfile().name} errou o ataque.`;
  }else{
    damage = getActiveAttack() + Math.floor(Math.random() * 6);
    message = `${getDungeonPlayerProfile().name} causou ${damage} de dano.`;
  }
  decayPlayerBuffs();
  updateUI();
  sendDungeonActionPayload({ damage, message });
}

function dungeonUseSkill(index){
  if(currentMode !== "dungeon" || !isDungeonConnected() || !enemy || isDead){ return; }
  if(Date.now() < dungeonMultiplayer.actionLockedUntil){
    updateUI();
    return;
  }
  const skillInfo = getSkillInfo()[index];
  if(!skillInfo){
    log("Voce ainda nao desbloqueou essa habilidade.");
    return;
  }
  if(player.mp < skillInfo.cost){
    log("Mana insuficiente!");
    return;
  }
  player.mp -= skillInfo.cost;
  displayState.playerMp = player.mp;
  let damage = 0;
  let message = `${getDungeonPlayerProfile().name} usou ${skillInfo.name}.`;
  let freeTurn = false;

  if(skillInfo.type === "damage" || skillInfo.type === "fireball" || skillInfo.type === "damage_maxhp_percent"){
    damage = skillInfo.damage;
    message = `${getDungeonPlayerProfile().name} usou ${skillInfo.name} e causou ${damage} de dano.`;
  }
  if(skillInfo.type === "damage_and_drain_mana"){
    damage = skillInfo.damage;
    message = `${getDungeonPlayerProfile().name} usou ${skillInfo.name} e causou ${damage} de dano.`;
  }
  if(skillInfo.type === "triple_shot"){
    let totalDamage = 0;
    let hitsLanded = 0;
    for(let hit = 0; hit < skillInfo.hits; hit++){
      if(rollHit("multi")){
        totalDamage += getActiveAttack() + Math.floor(Math.random() * 4);
        hitsLanded++;
      }
    }
    damage = totalDamage;
    message = hitsLanded
      ? `${getDungeonPlayerProfile().name} acertou ${hitsLanded} flecha(s) com ${skillInfo.name} e causou ${damage} de dano.`
      : `${getDungeonPlayerProfile().name} falhou com ${skillInfo.name}.`;
  }
  if(skillInfo.type === "heal_percent"){
    player.hp = Math.min(getCurrentCaps().maxHp, player.hp + skillInfo.heal);
    displayState.playerHp = player.hp;
    message = `${getDungeonPlayerProfile().name} recuperou ${skillInfo.heal} de vida com ${skillInfo.name}.`;
  }
  if(skillInfo.type === "mana_percent"){
    player.mp = Math.min(getCurrentCaps().maxMp, player.mp + skillInfo.mana);
    displayState.playerMp = player.mp;
    message = `${getDungeonPlayerProfile().name} recuperou ${skillInfo.mana} de mana com ${skillInfo.name}.`;
  }
  if(skillInfo.type === "mana_percent_free"){
    player.mp = Math.min(getCurrentCaps().maxMp, player.mp + skillInfo.mana);
    displayState.playerMp = player.mp;
    freeTurn = true;
    message = `${getDungeonPlayerProfile().name} recuperou ${skillInfo.mana} de mana com ${skillInfo.name}.`;
  }
  if(skillInfo.type === "shield"){
    playerEffects.shieldValue = skillInfo.shield;
    playerEffects.shieldTurns = skillInfo.turns || -1;
    message = `${getDungeonPlayerProfile().name} ergueu um escudo de ${skillInfo.shield} com ${skillInfo.name}.`;
  }
  if(skillInfo.type === "battle_cry"){
    playerEffects.attackBuffTurns = skillInfo.turns;
    playerEffects.attackBuffAmount = skillInfo.attackBuff;
    playerEffects.skillBuffTurns = skillInfo.turns;
    playerEffects.skillBuffAmount = skillInfo.skillBuff;
    message = `${getDungeonPlayerProfile().name} fortaleceu o grupo com ${skillInfo.name}.`;
  }
  if(skillInfo.type === "aim_buff"){
    playerEffects.attackBuffTurns = skillInfo.turns;
    playerEffects.attackBuffAmount = skillInfo.attackBuff;
    playerEffects.skillBuffTurns = skillInfo.turns;
    playerEffects.skillBuffAmount = skillInfo.skillBuff;
    playerEffects.precisionTurns = skillInfo.turns;
    playerEffects.precisionBonus = skillInfo.precision;
    message = `${getDungeonPlayerProfile().name} entrou em foco total com ${skillInfo.name}.`;
  }
  if(!freeTurn && !["battle_cry", "aim_buff"].includes(skillInfo.type)){
    decayPlayerBuffs();
  }
  dungeonMultiplayer.actionLockedUntil = Date.now() + (freeTurn ? 250 : 900);
  updateUI();
  sendDungeonActionPayload({ damage, message });
}

function getRegionRequirement(region){
  return regions[region].minLevel || 1;
}

function getActiveAttack(){
  return getPreviewStats().attack + (playerEffects.attackBuffTurns > 0 ? playerEffects.attackBuffAmount : 0);
}

function getSkillPowerBonus(){
  return getPassiveModifiers().skillPower + (playerEffects.skillBuffTurns > 0 ? playerEffects.skillBuffAmount : 0);
}

function getAccuracyBonus(){
  return playerEffects.precisionTurns > 0 ? playerEffects.precisionBonus : 0;
}

function getHitChance(mode = "basic"){
  if(player.class !== "Arqueiro"){ return 1; }
  const baseChance = mode === "multi" ? 0.82 : mode === "precise" ? 0.95 : 0.86;
  return Math.min(1, baseChance + getAccuracyBonus());
}

function rollHit(mode = "basic"){
  return Math.random() < getHitChance(mode);
}

function decayPlayerBuffs(){
  for(const buffName of ["attackBuffTurns", "skillBuffTurns", "precisionTurns"]){
    if(playerEffects[buffName] > 0){
      playerEffects[buffName]--;
    }
  }
  if(playerEffects.attackBuffTurns <= 0){ playerEffects.attackBuffAmount = 0; }
  if(playerEffects.skillBuffTurns <= 0){ playerEffects.skillBuffAmount = 0; }
  if(playerEffects.precisionTurns <= 0){ playerEffects.precisionBonus = 0; }
}

function getTurnHealing(){
  return Math.floor(getCurrentCaps().maxHp * getPassiveModifiers().turnHealPercent);
}

function getSkillInfo(){
  return getUnlockedActiveSkills().map(skill => {
    const passiveModifiers = getPassiveModifiers();
    const subclassCostReduction = player.subclass?.skillCostReduction || 0;
    const attackBonus = getActiveAttack() - player.baseAttack;
    const skillBonus = getSkillPowerBonus();
    const costIncrease = passiveModifiers.skillCostIncrease || 0;
    let cost = Math.max(8, Math.ceil(skill.cost * (1 - subclassCostReduction + costIncrease)));
    if(skill.type === "damage"){
      const damage = skill.value + attackBonus + skillBonus;
      return { ...skill, cost, damage, description: `${skill.name}: consome ${cost} MP e causa ${damage} de dano.` };
    }
    if(skill.type === "fireball"){
      cost += Math.floor(skillBonus / 12);
      const damage = skill.value + attackBonus + skillBonus;
      return { ...skill, cost, damage, description: `${skill.name}: consome ${cost} MP e causa ${damage} de dano.` };
    }
    if(skill.type === "heal_percent"){
      const heal = Math.ceil(getPreviewStats().maxHp * skill.value);
      return { ...skill, cost, heal, description: `${skill.name}: consome ${cost} MP e recupera ${heal} de vida.` };
    }
    if(skill.type === "mana_percent"){
      const mana = Math.ceil(getPreviewStats().maxMp * skill.value);
      return { ...skill, cost, mana, description: `${skill.name}: consome ${cost} MP e recupera ${mana} de mana.` };
    }
    if(skill.type === "mana_percent_free"){
      const mana = Math.ceil(getPreviewStats().maxMp * skill.value);
      return { ...skill, cost, mana, description: `${skill.name}: consome ${cost} MP, recupera ${mana} de mana e nao encerra seu turno.` };
    }
    if(skill.type === "shield"){
      const baseStat = skill.stat === "mp" ? getPreviewStats().maxMp : getPreviewStats().maxHp;
      const shield = Math.ceil(baseStat * skill.value);
      const durationText = skill.turns ? ` por ${skill.turns} turno(s)` : "";
      return { ...skill, cost, shield, description: `${skill.name}: consome ${cost} MP e cria um escudo de ${shield}${durationText}.` };
    }
    if(skill.type === "damage_maxhp_percent"){
      const damage = Math.ceil(getPreviewStats().maxHp * skill.value) + Math.floor(skillBonus / 2);
      return { ...skill, cost, damage, description: `${skill.name}: consome ${cost} MP e causa ${damage} de dano com base na vida maxima.` };
    }
    if(skill.type === "battle_cry"){
      const attackBuff = 5 + Math.floor(player.level * 0.4);
      const skillBuff = 7 + Math.floor(player.level * 0.45);
      return { ...skill, cost, attackBuff, skillBuff, description: `${skill.name}: consome ${cost} MP e aumenta ataque em ${attackBuff} e habilidades em ${skillBuff} por ${skill.turns} turnos.` };
    }
    if(skill.type === "aim_buff"){
      const attackBuff = 4 + Math.floor(player.level * 0.3);
      const skillBuff = 4 + Math.floor(player.level * 0.3);
      const precision = 0.18;
      return { ...skill, cost, attackBuff, skillBuff, precision, description: `${skill.name}: consome ${cost} MP, aumenta a precisao e adiciona ${attackBuff} ao ataque e ${skillBuff} as habilidades por ${skill.turns} turnos.` };
    }
    if(skill.type === "triple_shot"){
      const perHit = getActiveAttack();
      return { ...skill, cost, perHit, description: `${skill.name}: consome ${cost} MP e dispara ${skill.hits} ataques com seu dano basico.` };
    }
    if(skill.type === "damage_and_drain_mana"){
      const damage = skill.value + attackBonus + skillBonus;
      return { ...skill, cost, damage, manaDrain: skill.manaDrainPercent, description: `${skill.name}: consome ${cost} MP, causa ${damage} de dano e drena 10% da mana do alvo.` };
    }
    return { ...skill, cost, description: skill.description || skill.name };
  });
}

function getCampEntries(){
  const unlockedActiveNames = new Set(getUnlockedActiveSkills().map(skill => skill.name));
  const activeDetails = new Map(getSkillInfo().map(skill => [skill.name, skill]));
  const activeEntries = (player.activeSkills || []).map(skill => {
    const activeDetail = activeDetails.get(skill.name);
    const unlocked = unlockedActiveNames.has(skill.name);
    return {
      name: skill.name,
      status: unlocked ? "Disponivel" : `Desbloqueia no nivel ${skill.level}`,
      statusClass: unlocked ? "status-on" : "status-off",
      description: activeDetail?.description || skill.description
    };
  });
  const passiveEntries = (player.passiveSkills || []).map(skill => {
    const unlocked = player.level >= skill.level;
    return {
      name: skill.name,
      status: unlocked ? "Sempre ativa" : `Desbloqueia no nivel ${skill.level}`,
      statusClass: unlocked ? "status-on" : "status-off",
      description: unlocked ? getPassiveStatusDescription(skill) : skill.description
    };
  });
  return { activeEntries, passiveEntries };
}

function getPassiveStatusDescription(skill){
  if(skill.type === "coin_bonus"){
    return `${skill.name}: aumenta as moedas obtidas em ${Math.floor(skill.value * 100)}%.`;
  }
  if(skill.type === "bonus_attack_scale"){
    const bonus = (skill.base || 0) + Math.floor(player.level * (skill.scale || 0));
    return `${skill.name}: concede ${bonus} de dano base extra no nivel atual.`;
  }
  if(skill.type === "mana_regen_percent"){
    const totalPercent = Math.floor((0.1 + skill.value) * 100);
    return `${skill.name}: sua regeneracao total de mana por turno esta em ${totalPercent}%.`;
  }
  if(skill.type === "flat_reduction_scale"){
    const reduction = (skill.base || 0) + Math.floor(player.level * (skill.scale || 0));
    return `${skill.name}: reduz ${reduction} de dano fixo por ataque recebido no nivel atual.`;
  }
  if(skill.type === "turn_heal_percent"){
    const heal = Math.floor(getCurrentCaps().maxHp * skill.value);
    return `${skill.name}: recupera ${heal} de vida ao final de cada turno seu.`;
  }
  if(skill.type === "reflect_percent"){
    return `${skill.name}: devolve ${Math.floor(skill.value * 100)}% do dano recebido ao inimigo.`;
  }
  if(skill.type === "skill_power_scale"){
    const bonus = (skill.base || 0) + Math.floor(player.level * (skill.scale || 0));
    const extraCost = Math.floor((skill.extra?.skillCostIncrease || 0) * 100);
    return `${skill.name}: concede ${bonus} de dano de habilidade e aumenta os custos em ${extraCost}%.`;
  }
  if(skill.type === "mana_to_life_percent"){
    const converted = Math.floor(getPreviewStats().maxMp * skill.value);
    return `${skill.name}: converte 10% da mana maxima em vida maxima. Bonus atual: ${converted} de vida.`;
  }
  return skill.description;
}

function getRarityStat(statKey, rarity){
  return rarityStats[statKey]?.[rarity] || 0;
}

function normalizeEquipmentMetadata(item){
  if(!item || item.type !== "equipment"){ return item; }
  if(!item.baseItemId){
    const raritySuffix = item.rarity ? `_${item.rarity}` : "";
    item.baseItemId = item.id?.endsWith(raritySuffix) ? item.id.slice(0, -raritySuffix.length) : item.id;
  }
  return item;
}

function buildEquipmentDescription(item){
  const lines = [];
  if(item.bonusHp){ lines.push(`+${item.bonusHp} vida maxima`); }
  if(item.bonusMp){ lines.push(`+${item.bonusMp} mana maxima`); }
  if(item.bonusAttack){ lines.push(`+${item.bonusAttack} dano de ataque`); }
  if(item.skillPower){ lines.push(`+${item.skillPower} dano de habilidade`); }
  lines.push(`Equipavel apenas por ${item.classRestriction}.`);
  return lines.join(". ");
}

function createEquipmentItem(dropTemplate, rarity){
  const rarityInfo = getRarityInfo(rarity);
  const item = {
    id: `${dropTemplate.id}_${rarity}`,
    baseItemId: dropTemplate.id,
    name: `${dropTemplate.name} ${rarityInfo.label}`,
    type: "equipment",
    slot: dropTemplate.slot,
    classRestriction: dropTemplate.classRestriction,
    rarity,
    rarityLabel: rarityInfo.label
  };
  for(const [bonusKey, statScale] of Object.entries(dropTemplate.stats)){
    item[bonusKey] = getRarityStat(statScale, rarity);
  }
  item.description = buildEquipmentDescription(item);
  return item;
}

function getSellPrice(item){
  if(item.type === "consumable"){
    const price = consumableCatalog[item.id]?.price || 20;
    return Math.max(8, Math.floor(price * 0.5));
  }
  if(item.type === "chest"){
    return 35;
  }
  if(item.type === "equipment"){
    return Math.max(
      18,
      Math.floor(
        10
        + (item.bonusHp || 0) * 0.8
        + (item.bonusMp || 0) * 1
        + (item.bonusAttack || 0) * 7
        + (item.skillPower || 0) * 6
      )
    );
  }
  return 8;
}

function getForgeUpgradeCost(item){
  const rarityRank = getRarityRank(item.rarity);
  return 70 + rarityRank * 95;
}

function getForgeUpgradeChance(item){
  const rarityRank = getRarityRank(item.rarity);
  const chances = [0.8, 0.58, 0.36, 0.18];
  return chances[rarityRank] || 0;
}

function createConsumableItem(id, qty = 1){
  const data = consumableCatalog[id];
  if(!data){ return null; }
  return {
    id,
    name: data.name,
    qty,
    type: "consumable",
    description: data.description
  };
}

function removeInventoryUnit(itemIndex){
  const item = player.inventory[itemIndex];
  if(!item){ return; }
  if((item.qty || 1) > 1){
    item.qty--;
  }else{
    player.inventory.splice(itemIndex, 1);
  }
}

function getEquipmentDisplayName(item){
  if(!item){
    return `<span class="slot-empty">Espaco vazio</span>`;
  }
  const rarityInfo = getRarityInfo(item.rarity);
  return `<span class="${rarityInfo.cssClass}">${item.name}</span>`;
}

function getEquipmentSlotClass(item){
  return item ? "filled" : "empty";
}

function renderEquipmentShowcase(){
  return `
    <div class="equipment-layout">
      <div class="equipment-stack">
        <div class="equip-slot equip-weapon ${getEquipmentSlotClass(player.equipment.weapon)}"><strong>${slotLabels.weapon}</strong>${getEquipmentDisplayName(player.equipment.weapon)}</div>
      </div>
      <div class="equipment-body">
        <div class="hero-silhouette">${classIcons[player.class] || "&#x2726;"}</div>
        <div class="equipment-stack">
          <div class="equip-slot equip-head ${getEquipmentSlotClass(player.equipment.head)}"><strong>${slotLabels.head}</strong>${getEquipmentDisplayName(player.equipment.head)}</div>
          <div class="equip-slot equip-chest ${getEquipmentSlotClass(player.equipment.chest)}"><strong>${slotLabels.chest}</strong>${getEquipmentDisplayName(player.equipment.chest)}</div>
          <div class="equip-slot equip-legs ${getEquipmentSlotClass(player.equipment.legs)}"><strong>${slotLabels.legs}</strong>${getEquipmentDisplayName(player.equipment.legs)}</div>
          <div class="equip-slot equip-feet ${getEquipmentSlotClass(player.equipment.feet)}"><strong>${slotLabels.feet}</strong>${getEquipmentDisplayName(player.equipment.feet)}</div>
        </div>
      </div>
    </div>`;
}

function renderForgePanel(){
  const equippedItems = equipmentSlots
    .map(slot => ({ slot, label: slotLabels[slot], item: normalizeEquipmentMetadata(player.equipment?.[slot]) }))
    .filter(entry => entry.item);
  if(!equippedItems.length){
    return `<div class="inventory-item"><strong>Ferreiro</strong><br><span class="lock-note">Equipe um item no acampamento para tentar aprimora-lo aqui.</span></div>`;
  }
  return `<div class="inventory-item"><strong>Ferreiro</strong><br><span class="lock-note">Tente elevar a raridade dos seus equipamentos equipados. Cada novo grau fica mais caro e mais dificil.</span><div class="inventory-list">${equippedItems.map(entry => {
    const chance = Math.floor(getForgeUpgradeChance(entry.item) * 100);
    const cost = getForgeUpgradeCost(entry.item);
    const atMax = getRarityRank(entry.item.rarity) >= rarityOrder.length - 1;
    return `<div class="inventory-item"><strong>${entry.label}: ${entry.item.name}</strong><br><span class="lock-note">${atMax ? "Raridade maxima alcancada." : `Tentativa: ${cost} moedas | Chance: ${chance}%`}</span><div class="button-row"><button onclick="tryUpgradeEquippedItem('${entry.slot}')" ${atMax ? "disabled" : ""}>Aprimorar</button></div></div>`;
  }).join("")}</div></div>`;
}

function renderAlchemistPanel(){
  return `<div class="inventory-item"><strong>Alquimista</strong><br><span class="lock-note">Misturas raras e reforcos temporarios para a aventura.</span><div class="inventory-list">${Object.entries(consumableCatalog).map(([id, item]) => `<div class="inventory-item"><strong>${item.name}</strong><br><span class="lock-note">${item.description}</span><div class="button-row"><button onclick="buyConsumable('${id}')">Comprar (${item.price} moedas)</button></div></div>`).join("")}</div></div>`;
}

function getBaseEnemyName(enemyName){
  return enemyName.replace(/ Lv\.\d+$/, "");
}

function getRarityInfo(rarity){
  return rarityData[rarity] || rarityData.comum;
}

function getRarityRank(rarity){
  return rarityOrder.indexOf(rarity);
}

function getEnemyRarity(region, enemyName, isBoss = false){
  if(isBoss){
    return { key: "ultra_rara", label: "Chefao", cssClass: "rarity-ultra-rara" };
  }
  const regionData = region === "Dungeon" ? dungeonData : regions[region];
  if(!regionData || !regionData.enemies){
    return { key: "comum", label: "Comum", cssClass: "rarity-comum" };
  }
  const orderedEnemies = [...regionData.enemies].sort((a, b) => b.weight - a.weight);
  const index = orderedEnemies.findIndex(enemyData => enemyData.name === enemyName);
  const rarityByIndex = ["comum", "incomum", "rara"];
  const rarityKey = rarityByIndex[index] || "comum";
  const rarityInfo = getRarityInfo(rarityKey);
  return { key: rarityKey, label: rarityInfo.label, cssClass: rarityInfo.cssClass };
}

function getEnemyPossibleDrop(enemyName, region, isBoss = false){
  if(isBoss){
    return `Bau da ${region}`;
  }
  if(region === "Dungeon"){
    return "Tesouros da expedicao ainda nao catalogados";
  }
  const dropTemplate = enemyDrops[enemyName];
  return dropTemplate ? dropTemplate.name : "Sem drop conhecido";
}

function rollWeightedRarity(){
  const total = rarityOrder.reduce((sum, rarity) => sum + getRarityInfo(rarity).weight, 0);
  let roll = Math.random() * total;
  for(const rarity of rarityOrder){
    roll -= getRarityInfo(rarity).weight;
    if(roll <= 0){
      return rarity;
    }
  }
  return "comum";
}

function addInventoryItem(item){
  const normalizedItem = normalizeEquipmentMetadata({ ...item, uid: item.uid || `${item.id}_${Date.now()}_${Math.floor(Math.random() * 1000)}` });
  const stackable = ["equipment", "consumable", "chest"].includes(normalizedItem.type);
  if(stackable){
    const existing = player.inventory.find(entry =>
      entry.type === normalizedItem.type
      && entry.id === normalizedItem.id
      && (entry.rarity || "") === (normalizedItem.rarity || "")
      && (entry.region || "") === (normalizedItem.region || "")
      && (entry.baseItemId || "") === (normalizedItem.baseItemId || "")
    );
    if(existing){
      existing.qty = (existing.qty || 1) + (normalizedItem.qty || 1);
      return;
    }
  }
  if(stackable && !normalizedItem.qty){
    normalizedItem.qty = 1;
  }
  player.inventory.push(normalizedItem);
}

function tryEnemyDrop(defeatedEnemy){
  const enemyBaseName = getBaseEnemyName(defeatedEnemy.name);
  const dropTemplate = enemyDrops[enemyBaseName];
  if(!dropTemplate){ return; }
  if(Math.random() > 0.1){ return; }
  const rarity = rollWeightedRarity();
  const item = createEquipmentItem(dropTemplate, rarity);
  addInventoryItem(item);
  log(`O ${enemyBaseName} deixou ${item.name}!`);
}

function getBossChestItem(region){
  const regionData = regions[region];
  if(!regionData){ return null; }
  const possibleDrops = regionData.enemies.filter(enemyData => enemyDrops[enemyData.name]);
  if(!possibleDrops.length){ return null; }
  const chosenEnemy = chooseWeightedEnemy(possibleDrops);
  const dropTemplate = enemyDrops[chosenEnemy.name];
  return createEquipmentItem(dropTemplate, rollWeightedRarity());
}

function createRegionChest(region){
  return {
    id: `bau_${region.toLowerCase()}`,
    name: `Bau da ${region}`,
    type: "chest",
    region,
    description: `Contem 1 equipamento aleatorio da regiao ${region}.`
  };
}

function grantBossChest(region){
  addInventoryItem(createRegionChest(region));
  log(`Voce recebeu um Bau da ${region}!`);
}

function openChest(itemUid){
  const itemIndex = player.inventory.findIndex(entry => entry.uid === itemUid && entry.type === "chest");
  if(itemIndex < 0){ return; }
  const chest = player.inventory[itemIndex];
  const chestItem = getBossChestItem(chest.region);
  removeInventoryUnit(itemIndex);
  if(!chestItem){
    log("O bau estava vazio.");
    updateUI();
    return;
  }
  addInventoryItem(chestItem);
  log(`Voce abriu ${chest.name} e encontrou ${chestItem.name}.`);
  updateUI();
}

async function useManaPotion(){
  if(isDead || currentMode === "trophies" || isProcessingTurn){ return; }
  const item = player.inventory.find(entry => entry.id === "mana_potion" && entry.qty > 0);
  if(!item){
    log("Voce nao tem Pocao de Mana no inventario.");
    return;
  }
  const itemIndex = player.inventory.findIndex(entry => entry.uid === item.uid);
  removeInventoryUnit(itemIndex);
  player.mp = Math.min(getPreviewStats().maxMp, player.mp + 60);
  displayState.playerMp = player.mp;
  if(currentMode === "battle" && enemy){
    isProcessingTurn = true;
  }
  log("Voce usou uma Pocao de Mana e recuperou 60 de mana.");
  updateUI();
  if(currentMode === "dungeon" && isDungeonConnected()){
    syncDungeonProfile();
    return;
  }
  if(currentMode === "battle" && enemy){
    await wait(220);
    await enemyTurn();
  }
}

async function useConsumable(itemId){
  if(itemId === "mana_potion"){
    await useManaPotion();
    return;
  }
  if(isDead || currentMode === "trophies" || isProcessingTurn){ return; }
  const item = player.inventory.find(entry => entry.id === itemId && entry.qty > 0);
  const config = consumableCatalog[itemId];
  if(!item || !config){
    log("Esse consumivel nao esta disponivel.");
    return;
  }
  const itemIndex = player.inventory.findIndex(entry => entry.uid === item.uid);
  removeInventoryUnit(itemIndex);

  if(config.effectType === "restore_hp"){
    player.hp = Math.min(getCurrentCaps().maxHp, player.hp + config.value);
    displayState.playerHp = player.hp;
    log(`Voce usou ${config.name} e recuperou ${config.value} de vida.`);
  }
  if(config.effectType === "buff_skill"){
    playerEffects.skillBuffTurns = Math.max(playerEffects.skillBuffTurns, config.turns);
    playerEffects.skillBuffAmount = Math.max(playerEffects.skillBuffAmount, config.value);
    log(`Voce usou ${config.name} e ganhou +${config.value} de dano de habilidade por ${config.turns} turnos.`);
  }
  if(config.effectType === "buff_attack"){
    playerEffects.attackBuffTurns = Math.max(playerEffects.attackBuffTurns, config.turns);
    playerEffects.attackBuffAmount = Math.max(playerEffects.attackBuffAmount, config.value);
    log(`Voce usou ${config.name} e ganhou +${config.value} de dano de ataque por ${config.turns} turnos.`);
  }

  updateUI();
  if(currentMode === "dungeon" && isDungeonConnected()){
    syncDungeonProfile();
    return;
  }
  if(currentMode === "battle" && enemy){
    isProcessingTurn = true;
    updateUI();
    await wait(220);
    await enemyTurn();
  }
}

function equipItem(itemUid){
  const itemIndex = player.inventory.findIndex(entry => entry.uid === itemUid);
  if(itemIndex < 0){ return; }
  const item = player.inventory[itemIndex];
  if(item.type !== "equipment"){ return; }
  if(player.class !== item.classRestriction){
    log(`Somente a classe ${item.classRestriction} pode equipar ${item.name}.`);
    return;
  }
  const equipped = player.equipment?.[item.slot] || null;
  if(equipped && getRarityRank(item.rarity) <= getRarityRank(equipped.rarity)){
    log("Voce so pode trocar o item atual por outro de raridade maior.");
    return;
  }
  removeInventoryUnit(itemIndex);
  if(equipped){
    addInventoryItem(equipped);
  }
  player.equipment[item.slot] = item;
  player.hp = Math.min(getCurrentCaps().maxHp, player.hp);
  player.mp = Math.min(getCurrentCaps().maxMp, player.mp);
  displayState.playerHp = player.hp;
  displayState.playerMp = player.mp;
  log(`${item.name} foi equipada.`);
  updateUI();
}

function sellItem(itemUid){
  if(currentMode !== "village"){ return; }
  const itemIndex = player.inventory.findIndex(entry => entry.uid === itemUid);
  if(itemIndex < 0){ return; }
  const item = player.inventory[itemIndex];
  const value = getSellPrice(item);
  if(item.qty && item.qty > 1){
    item.qty--;
  }else{
    player.inventory.splice(itemIndex, 1);
  }
  player.coins += value;
  log(`Voce vendeu ${item.name} por ${value} moedas.`);
  updateUI();
}

function getFleeCost(){
  return 2 + 3 * player.level;
}

function fleeBattle(){
  if(currentMode !== "battle" || !enemy || isProcessingTurn || levelUpPoints > 0 || isDead){ return; }
  const cost = getFleeCost();
  if(player.coins < cost){
    log(`Voce precisa de ${cost} moedas para fugir.`);
    return;
  }
  player.coins -= cost;
  enemy = null;
  needsNewEnemy = true;
  displayState.enemyHp = null;
  isProcessingTurn = false;
  log(`Voce fugiu da batalha e pagou ${cost} moedas.`);
  updateUI();
}

function grantNextLevelXPCommand(){
  if(!player || player.level >= MAX_LEVEL){ return; }
  const xpNeeded = Math.max(0, getXpToNextLevel() - player.xp);
  if(xpNeeded <= 0){ return; }
  gainXP(xpNeeded);
  log("Comando de teste: XP do proximo nivel concedido.");
  updateUI();
}

function createEnemyFromTemplate(template, isBoss = false){
  const stats = getEnemyStats(template);
  const origin = isDungeonMode() ? "Dungeon" : currentRegion;
  const rarity = getEnemyRarity(origin, template.name, isBoss);
  return {
    name: template.name + " Lv." + template.level,
    baseName: template.name,
    region: origin,
    level: template.level,
    maxHp: stats.maxHp,
    hp: stats.maxHp,
    attack: stats.attack,
    isBoss,
    rarityKey: rarity.key,
    rarityLabel: rarity.label,
    rarityClass: rarity.cssClass,
    possibleDrop: getEnemyPossibleDrop(template.name, origin, isBoss),
    maxMp: isBoss ? template.mp : 0,
    mp: isBoss ? template.mp : 0,
    skillName: isBoss ? template.skillName : "",
    skillDamage: isBoss ? template.skillDamage : 0,
    skillCost: isBoss ? template.skillCost : 0
  };
}

function spawnEnemy(isBoss = false){
  const regionData = isDungeonMode() ? dungeonData : regions[currentRegion];
  const template = isBoss
    ? regionData.boss
    : enemiesSpawned < 3
      ? (!isDungeonMode() ? regionData.enemies.find(enemyData => enemyData.name === "Lobo Sombrio") : null) || chooseWeightedEnemy(regionData.enemies)
      : chooseWeightedEnemy(regionData.enemies);
  enemy = createEnemyFromTemplate(template, isBoss);
  if(!isBoss){
    enemiesSpawned++;
  }
  needsNewEnemy = false;
  displayState.enemyHp = enemy.hp;
  log(
    isDungeonMode()
      ? `Um ${enemy.name} surgiu nas profundezas da Dungeon!`
      : isBoss
        ? `O chefao ${enemy.name} surgiu na ${currentRegion}!`
        : `Um ${enemy.name} apareceu na ${currentRegion}!`
  );
  saveCampaign();
}

function ensureEnemy(){
  if(!["battle", "dungeon"].includes(currentMode) || levelUpPoints > 0 || isProcessingTurn || isDead){ return; }
  if(!enemy || needsNewEnemy){
    spawnEnemy();
    updateUI();
  }
}

function challengeBoss(){
  if(currentMode !== "battle" || levelUpPoints > 0 || isProcessingTurn || isDead){ return; }
  if(player.level < getRegionRequirement(currentRegion)){
    log(`Voce precisa estar no nivel ${getRegionRequirement(currentRegion)} para desafiar esta area.`);
    return;
  }
  enemy = null;
  needsNewEnemy = false;
  spawnEnemy(true);
  updateUI();
}

function setMode(mode){
  if(isProcessingTurn || isDead || !["battle", "village", "trophies", "camp", "dungeon"].includes(mode)){ return; }
  if((levelUpPoints > 0 || needsSubclassChoice()) && mode !== "battle"){
    log("Finalize sua evolucao antes de sair da batalha.");
    updateUI();
    return;
  }
  if((mode === "village" || mode === "trophies" || mode === "camp" || mode === "dungeon") && enemy){
    log(
      mode === "village" ? "Voce so pode ir ao vilarejo fora de combate."
      : mode === "trophies" ? "A sala de trofeus so pode ser acessada fora de combate."
      : mode === "camp" ? "O acampamento so pode ser acessado fora de combate."
      : "A dungeon so pode ser acessada fora de combate."
    );
    updateUI();
    return;
  }
  if(mode === "dungeon" && player.level < getDungeonRequirement()){
    log(`A dungeon exige nivel ${getDungeonRequirement()}.`);
    updateUI();
    return;
  }
  if(currentMode === "dungeon" && mode !== "dungeon" && isDungeonConnected()){
    leaveDungeonRoom(true);
  }
  currentMode = mode;
  updateUI();
}

function getHealCost(){
  return Math.max(3, Math.ceil((getPreviewStats().maxHp - player.hp) / 7));
}

function healAtVillage(){
  if(currentMode !== "village"){ return; }
  const { maxHp } = getCurrentCaps();
  if(player.hp >= maxHp){
    log("Voce ja esta com a vida cheia.");
    return;
  }
  const cost = getHealCost();
  if(player.coins < cost){
    log(`Moedas insuficientes. Cura custa ${cost} moedas.`);
    return;
  }
  player.coins -= cost;
  player.hp = maxHp;
  displayState.playerHp = player.hp;
  log(`Voce descansou no vilarejo e recuperou toda a vida por ${cost} moedas.`);
  updateUI();
}

function buyConsumable(itemId){
  if(currentMode !== "village"){ return; }
  const data = consumableCatalog[itemId];
  if(!data){ return; }
  const cost = data.price;
  if(player.coins < cost){
    log(`Voce nao tem moedas suficientes para comprar ${data.name}.`);
    return;
  }
  player.coins -= cost;
  const existing = player.inventory.find(item => item.id === itemId);
  if(existing){
    existing.qty++;
  }else{
    addInventoryItem(createConsumableItem(itemId));
  }
  log(`Voce comprou ${data.name}.`);
  updateUI();
}

function tryUpgradeEquippedItem(slot){
  if(currentMode !== "village"){ return; }
  const item = normalizeEquipmentMetadata(player.equipment?.[slot]);
  if(!item){
    log("Nao ha item equipado nesse espaco.");
    return;
  }
  const currentRank = getRarityRank(item.rarity);
  if(currentRank >= rarityOrder.length - 1){
    log("Esse item ja esta na raridade maxima.");
    return;
  }
  const cost = getForgeUpgradeCost(item);
  if(player.coins < cost){
    log(`Moedas insuficientes. O ferreiro cobra ${cost} moedas nessa tentativa.`);
    return;
  }
  player.coins -= cost;
  const chance = getForgeUpgradeChance(item);
  if(Math.random() > chance){
    log(`O ferreiro falhou em aprimorar ${item.name}. Chance da tentativa: ${Math.floor(chance * 100)}%.`);
    updateUI();
    return;
  }
  const nextRarity = rarityOrder[currentRank + 1];
  const baseDrop = Object.values(enemyDrops).find(drop => drop.id === item.baseItemId);
  if(!baseDrop){
    log("O ferreiro nao conseguiu identificar a origem do equipamento.");
    updateUI();
    return;
  }
  const upgradedItem = createEquipmentItem(baseDrop, nextRarity);
  upgradedItem.uid = item.uid;
  player.equipment[slot] = upgradedItem;
  player.hp = Math.min(getCurrentCaps().maxHp, player.hp);
  player.mp = Math.min(getCurrentCaps().maxMp, player.mp);
  displayState.playerHp = player.hp;
  displayState.playerMp = player.mp;
  log(`O ferreiro aprimorou ${item.name} para ${upgradedItem.name}!`);
  updateUI();
}

function getRespawnSeconds(){
  return 6 + player.level * 2;
}

function handleDeath(){
  isProcessingTurn = false;
  isDead = true;
  deadUntil = Date.now() + getRespawnSeconds() * 1000;
  player.stats.deaths++;
  enemy = null;
  needsNewEnemy = true;
  currentMode = "battle";
  log("Voce caiu em batalha.");
  updateUI();
}

function respawnPlayer(){
  if(!isDead || (deadUntil && Date.now() < deadUntil)){ return; }
  const { maxHp, maxMp } = getCurrentCaps();
  isDead = false;
  deadUntil = null;
  player.hp = maxHp;
  player.mp = maxMp;
  displayState.playerHp = player.hp;
  displayState.playerMp = player.mp;
  log("Voce renasceu e retornou a aventura.");
  updateUI();
}

function resetAdventure(){
  localStorage.removeItem(SAVE_KEY);
  location.reload();
}

function saveCampaign(){
  if(!player){
    localStorage.removeItem(SAVE_KEY);
    renderSavedCampaign();
    return;
  }
  const state = {
    player,
    enemy: currentMode === "dungeon" ? null : enemy,
    pendingLevelUps,
    levelUpPoints,
    allocation,
    isProcessingTurn: false,
    currentRegion,
    needsNewEnemy: currentMode === "dungeon" ? true : needsNewEnemy,
    currentMode: currentMode === "dungeon" ? "battle" : currentMode,
    enemiesSpawned,
    isDead,
    deadUntil,
    isLogHidden,
    playerEffects
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  renderSavedCampaign();
}

function continueCampaign(){
  const raw = localStorage.getItem(SAVE_KEY);
  if(!raw){ return; }
  const state = JSON.parse(raw);
  player = state.player;
  enemy = state.enemy;
  pendingLevelUps = state.pendingLevelUps;
  levelUpPoints = state.levelUpPoints;
  allocation = state.allocation;
  currentRegion = state.currentRegion;
  needsNewEnemy = state.needsNewEnemy;
  currentMode = state.currentMode;
  enemiesSpawned = state.enemiesSpawned;
  isDead = state.isDead;
  deadUntil = state.deadUntil;
  isLogHidden = !!state.isLogHidden;
  playerEffects = { ...createDefaultPlayerEffects(), ...(state.playerEffects || {}) };
  if(!["battle", "village", "trophies", "camp"].includes(currentMode)){
    currentMode = "battle";
  }
  isProcessingTurn = false;
  normalizePlayerState();
  displayState = { playerHp: player.hp, playerMp: player.mp, playerXp: player.xp, enemyHp: enemy ? enemy.hp : null };
  document.getElementById("classSelect").style.display = "none";
  document.getElementById("game").style.display = "block";
  if(isDead && deadUntil && Date.now() >= deadUntil){
    deadUntil = Date.now();
  }
  log("Campanha retomada.");
  updateUI();
}

function renderSavedCampaign(){
  const saved = document.getElementById("savedCampaign");
  if(localStorage.getItem(SAVE_KEY)){
    saved.style.display = "block";
    saved.innerHTML = `
      <h3>Campanha em andamento</h3>
      <div class="button-row">
        <button onclick="continueCampaign()">Continuar campanha</button>
        <button onclick="resetAdventure()">Reiniciar aventura</button>
      </div>`;
  }else{
    saved.style.display = "none";
    saved.innerHTML = "";
  }
}

function changeRegion(region){
  if(isProcessingTurn || isDead || levelUpPoints > 0 || !regions[region] || currentRegion === region){ return; }
  if(enemy){
    log("Voce nao pode trocar de regiao durante um combate.");
    return;
  }
  if(player.level < getRegionRequirement(region)){
    log(`A regiao ${region} exige nivel ${getRegionRequirement(region)}.`);
    return;
  }
  currentRegion = region;
  log(`Voce viajou para a ${region}.`);
  needsNewEnemy = true;
  enemy = null;
  updateUI();
}

      ${enemy.isBoss ? `<strong>Mana</strong>: ${enemy.mp}/${enemy.maxMp}<div class="bar"><div class="fill mp" style="width:${enemy.mp / enemy.maxMp * 100}%"></div></div>` : ""}
      <div class="enemy-drop-box">

    : ["battle", "dungeon"].includes(currentMode) ? `

    : currentMode === "camp" ? `
    <h3>Acampamento</h3>

function animateBars(){
  requestAnimationFrame(() => {
    const playerHpFill = document.getElementById("playerHpFill");
    const playerShieldFill = document.getElementById("playerShieldFill");
    const playerMpFill = document.getElementById("playerMpFill");
    const playerXpFill = document.getElementById("playerXpFill");
    const enemyHpFill = document.getElementById("enemyHpFill");

    if(playerHpFill){
      playerHpFill.style.width = `${player.hp / getPreviewStats().maxHp * 100}%`;
    }
    if(playerShieldFill){
      playerShieldFill.style.width = `${Math.min(100, (playerEffects.shieldValue || 0) / getPreviewStats().maxHp * 100)}%`;
    }
    if(playerMpFill){
      playerMpFill.style.width = `${player.mp / getPreviewStats().maxMp * 100}%`;
    }
    if(playerXpFill){
    playerXpFill.style.width = `${player.level >= MAX_LEVEL ? 100 : player.xp / getXpToNextLevel() * 100}%`;
    }
    if(enemy && enemyHpFill){
      enemyHpFill.style.width = `${Math.max(0, enemy.hp) / enemy.maxHp * 100}%`;
    }

    displayState.playerHp = player.hp;
    displayState.playerMp = player.mp;
    displayState.playerXp = player.xp;
    displayState.enemyHp = enemy ? enemy.hp : null;
  });
}

function getManaRegen(){
  const modifiers = getPassiveModifiers();
  return Math.max(1, Math.floor(getPreviewStats().maxMp * (0.1 + modifiers.manaRegenPercent)) + modifiers.manaRegen);
}

function regenMana(){
  const manaBefore = player.mp;
  const regen = getManaRegen();
  player.mp = Math.min(getCurrentCaps().maxMp, player.mp + regen);
  return player.mp - manaBefore;
}

function wait(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function attack(){
  if(levelUpPoints > 0 || isProcessingTurn || !enemy){ return; }
  isProcessingTurn = true;
  if(player.class === "Arqueiro" && !rollHit("basic")){
    log("Seu ataque passou raspando pelo alvo.");
  }else{
    const dmg = getActiveAttack() + Math.floor(Math.random() * 6);
    enemy.hp -= dmg;
    log(`Voce causou ${dmg} de dano.`);
  }
  decayPlayerBuffs();
  updateUI();
  await wait(320);
  await afterTurn();
}

async function useSkill(index){
  if(levelUpPoints > 0 || isProcessingTurn || !enemy){ return; }
  const skills = getSkillInfo();
  const skillInfo = skills[index];
  if(!skillInfo){
    log("Voce ainda nao desbloqueou uma habilidade.");
    return;
  }
  if(player.mp < skillInfo.cost){
    log("Mana insuficiente!");
    return;
  }
  isProcessingTurn = true;
  player.mp -= skillInfo.cost;
  let freeTurn = false;
  if(skillInfo.type === "damage"){
    enemy.hp -= skillInfo.damage;
    log(`${skillInfo.name} causou ${skillInfo.damage} de dano!`);
  }
  if(skillInfo.type === "fireball"){
    enemy.hp -= skillInfo.damage;
    log(`${skillInfo.name} explodiu causando ${skillInfo.damage} de dano!`);
  }
  if(skillInfo.type === "heal_percent"){
    player.hp = Math.min(getCurrentCaps().maxHp, player.hp + skillInfo.heal);
    log(`${skillInfo.name} recuperou ${skillInfo.heal} de vida.`);
  }
  if(skillInfo.type === "mana_percent"){
    player.mp = Math.min(getCurrentCaps().maxMp, player.mp + skillInfo.mana);
    log(`${skillInfo.name} recuperou ${skillInfo.mana} de mana.`);
  }
  if(skillInfo.type === "mana_percent_free"){
    player.mp = Math.min(getCurrentCaps().maxMp, player.mp + skillInfo.mana);
    log(`${skillInfo.name} recuperou ${skillInfo.mana} de mana sem encerrar seu turno.`);
    freeTurn = true;
  }
  if(skillInfo.type === "shield"){
    playerEffects.shieldValue = skillInfo.shield;
    playerEffects.shieldTurns = skillInfo.turns || -1;
    log(`${skillInfo.name} criou um escudo de ${skillInfo.shield}.`);
  }
  if(skillInfo.type === "damage_maxhp_percent"){
    enemy.hp -= skillInfo.damage;
    log(`${skillInfo.name} esmagou o alvo com ${skillInfo.damage} de dano!`);
  }
  if(skillInfo.type === "battle_cry"){
    playerEffects.attackBuffTurns = skillInfo.turns;
    playerEffects.attackBuffAmount = skillInfo.attackBuff;
    playerEffects.skillBuffTurns = skillInfo.turns;
    playerEffects.skillBuffAmount = skillInfo.skillBuff;
    log(`${skillInfo.name} elevou seu ataque em ${skillInfo.attackBuff} e suas habilidades em ${skillInfo.skillBuff}.`);
  }
  if(skillInfo.type === "aim_buff"){
    playerEffects.attackBuffTurns = skillInfo.turns;
    playerEffects.attackBuffAmount = skillInfo.attackBuff;
    playerEffects.skillBuffTurns = skillInfo.turns;
    playerEffects.skillBuffAmount = skillInfo.skillBuff;
    playerEffects.precisionTurns = skillInfo.turns;
    playerEffects.precisionBonus = skillInfo.precision;
    log(`${skillInfo.name} deixou seus proximos disparos muito mais precisos.`);
  }
  if(skillInfo.type === "triple_shot"){
    let totalDamage = 0;
    let hitsLanded = 0;
    for(let hit = 0; hit < skillInfo.hits; hit++){
      if(rollHit("multi")){
        const arrowDamage = getActiveAttack() + Math.floor(Math.random() * 4);
        totalDamage += arrowDamage;
        enemy.hp -= arrowDamage;
        hitsLanded++;
      }
    }
    log(hitsLanded ? `${skillInfo.name} acertou ${hitsLanded} flecha(s) e causou ${totalDamage} de dano.` : `${skillInfo.name} falhou em encontrar o alvo.`);
  }
  if(skillInfo.type === "damage_and_drain_mana"){
    enemy.hp -= skillInfo.damage;
    let drained = 0;
    if(enemy.maxMp > 0){
      drained = Math.floor(enemy.maxMp * skillInfo.manaDrain);
      enemy.mp = Math.max(0, enemy.mp - drained);
    }
    log(`${skillInfo.name} causou ${skillInfo.damage} de dano${drained ? ` e drenou ${drained} de mana` : ""}.`);
  }
  if(!freeTurn && !["battle_cry", "aim_buff"].includes(skillInfo.type)){
    decayPlayerBuffs();
  }
  updateUI();
  if(freeTurn){
    isProcessingTurn = false;
    updateUI();
    return;
  }
  await wait(320);
  await afterTurn();
}

function handleEnemyDefeat(){
  const defeatedRegion = enemy?.region;
  const wasBoss = !!enemy?.isBoss;
  log("Inimigo derrotado!");
  tryEnemyDrop(enemy);
  const coinMultiplier = 1 + getPassiveModifiers().coinBonus;
  const coinsEarned = Math.floor(((enemy.isBoss ? 18 : 4) + enemy.level * 3 + Math.floor(Math.random() * 4)) * coinMultiplier);
  const xpEarned = (enemy.isBoss ? 40 : 22) + enemy.level * 8;
  player.coins += coinsEarned;
  player.stats.coinsEarned += coinsEarned;
  if(enemy.isBoss){
    player.stats.bossesDefeated++;
  }else{
    player.stats.enemiesDefeated++;
  }
  log(`Voce encontrou ${coinsEarned} moedas.`);
  log(`Voce ganhou ${xpEarned} de XP.`);
  if(wasBoss && defeatedRegion){
    grantBossChest(defeatedRegion);
  }
  gainXP(xpEarned);
  enemy = null;
  needsNewEnemy = true;
  displayState.enemyHp = null;
  isProcessingTurn = false;
  updateUI();
}

async function afterTurn(){
  if(enemy.hp <= 0){
    handleEnemyDefeat();
    return;
  }
  await enemyTurn();
}

async function enemyTurn(){
  log(`${enemy.name} prepara um ataque!`);
  await wait(220);
  let dmg;
  if(enemy.isBoss && enemy.mp >= enemy.skillCost && Math.random() < 0.45){
    enemy.mp -= enemy.skillCost;
    dmg = enemy.skillDamage + Math.floor(Math.random() * 6);
    log(`${enemy.skillName} atingiu voce com ${dmg} de dano.`);
  }else{
    dmg = enemy.attack + Math.floor(Math.random() * 5);
    log(`O inimigo atacou e causou ${dmg} de dano.`);
  }
  if(enemy.isBoss && enemy.mp < enemy.maxMp){
    enemy.mp = Math.min(enemy.maxMp, enemy.mp + Math.max(4, Math.floor(enemy.maxMp / 8)));
  }
  const passiveReduction = getPassiveModifiers().damageReduction;
  const flatReduction = getPassiveModifiers().flatReduction;
  dmg = Math.max(0, dmg - flatReduction);
  if(flatReduction > 0){
    log(`Sua resistencia reduziu ${flatReduction} de dano.`);
  }
  const totalReduction = 1 - Math.min(0.75, passiveReduction);
  dmg = Math.max(0, Math.floor(dmg * totalReduction));
  if(playerEffects.shieldValue > 0 && dmg > 0){
    const absorbed = Math.min(dmg, playerEffects.shieldValue);
    playerEffects.shieldValue -= absorbed;
    dmg -= absorbed;
    log(`Seu escudo absorveu ${absorbed} de dano.`);
    if(playerEffects.shieldValue <= 0){
      playerEffects.shieldValue = 0;
      playerEffects.shieldTurns = 0;
      log("Seu escudo foi destruido.");
    }
  }
  player.hp -= dmg;
  const reflectPercent = getPassiveModifiers().reflectPercent;
  if(reflectPercent > 0 && dmg > 0){
    const reflected = Math.max(1, Math.floor(dmg * reflectPercent));
    enemy.hp -= reflected;
    log(`Pele de Ferro devolveu ${reflected} de dano ao inimigo.`);
  }
  if(playerEffects.shieldTurns > 0){
    playerEffects.shieldTurns--;
    if(playerEffects.shieldTurns <= 0){
      playerEffects.shieldValue = 0;
      log("Seu escudo se desfez.");
    }
  }
  updateUI();
  await wait(320);
  if(player.hp <= 0){
    handleDeath();
    return;
  }
  if(enemy.hp <= 0){
    handleEnemyDefeat();
    return;
  }
  const manaRecovered = regenMana();
  if(manaRecovered > 0){
    log(`Voce recuperou ${manaRecovered} de mana.`);
  }
  const healed = getTurnHealing();
  if(healed > 0){
    player.hp = Math.min(getCurrentCaps().maxHp, player.hp + healed);
    log(`Voce recuperou ${healed} de vida.`);
  }
  isProcessingTurn = false;
  updateUI();
}

function gainXP(amount){
  if(player.level >= MAX_LEVEL){
    player.xp = getXpToNextLevel();
    return;
  }
  player.xp += amount;
  while(player.level < MAX_LEVEL && player.xp >= getXpToNextLevel()){
    player.xp -= getXpToNextLevel();
    player.level++;
    pendingLevelUps++;
    levelUpPoints++;
    log("Voce subiu de nivel! Distribua 1 ponto de atributo.");
  }
  if(player.level >= MAX_LEVEL){
    player.level = MAX_LEVEL;
    player.xp = getXpToNextLevel();
    log("Voce alcancou o nivel maximo!");
  }
}

function adjustAttribute(attribute, amount){
  if(amount > 0 && levelUpPoints <= 0){ return; }
  if(amount < 0 && allocation[attribute] <= 0){ return; }

  allocation[attribute] += amount;
  levelUpPoints -= amount;
  updateUI();
}

function finishLevelUp(){
  if(levelUpPoints > 0){ return; }

  const spentHp = Number(allocation.hp) || 0;
  const spentMp = Number(allocation.mp) || 0;
  const spentAttack = Number(allocation.attack) || 0;
  const hpGain = spentHp * player.growth.hp;
  const mpGain = spentMp * player.growth.mp;
  const attackGain = spentAttack * player.growth.attack;
  player.stats.invested.hp += spentHp;
  player.stats.invested.mp += spentMp;
  player.stats.invested.attack += spentAttack;
  player.maxHp += hpGain;
  player.maxMp += mpGain;
  player.attack += attackGain;
  player.hp = Math.min(getCurrentCaps().maxHp, player.hp + hpGain);
  player.mp = Math.min(getCurrentCaps().maxMp, player.mp + mpGain);
  displayState.playerHp = player.hp;
  displayState.playerMp = player.mp;
  displayState.playerXp = player.xp;
  pendingLevelUps = 0;
  allocation = { hp: 0, mp: 0, attack: 0 };
  isProcessingTurn = false;
  log(`Atributos atualizados: +${hpGain} HP max, +${mpGain} MP max, +${attackGain} ATQ.`);
  enemy = null;
  needsNewEnemy = true;
  currentMode = "battle";
  updateUI();
}

function chooseSubclass(subclassId){
  if(!needsSubclassChoice()){ return; }
  const subclass = getSubclassChoices().find(option => option.id === subclassId);
  if(!subclass){ return; }
  player.subclass = subclass;
  player.hp = Math.min(getPreviewStats().maxHp, player.hp + (subclass.hp || 0));
  player.mp = Math.min(getPreviewStats().maxMp, player.mp + (subclass.mp || 0));
  displayState.playerHp = player.hp;
  displayState.playerMp = player.mp;
  log(`Voce escolheu a subclasse ${subclass.name}.`);
  updateUI();
}

function log(msg){
  const logBox = document.getElementById("log");
  logBox.innerHTML += `<p>${msg}</p>`;
  logBox.scrollTop = logBox.scrollHeight;
}

renderSavedCampaign();
setInterval(() => {
  if(isDead){
    updateUI();
  }
}, 1000);
window.comandoProximoNivel = grantNextLevelXPCommand;
</script>
