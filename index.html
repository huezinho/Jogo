<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RPG por Turnos</title>
<style>
body{font-family:Arial,sans-serif;background:#1e1e1e;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.container{width:1180px;max-width:calc(100vw - 24px);background:#2b2b2b;padding:20px;border-radius:16px;box-shadow:0 0 20px rgba(0,0,0,.4)}
button{padding:10px 16px;margin:6px;border:none;border-radius:10px;cursor:pointer}
button:disabled{cursor:not-allowed;opacity:.6}
.button-row{display:flex;gap:10px;flex-wrap:wrap}
.panel{margin:15px 0;padding:15px;background:#3a3a3a;border-radius:12px}
.game-layout{display:grid;grid-template-columns:220px minmax(0,1fr) 260px;gap:18px;align-items:start}
.side-column .panel,.main-column .panel{margin-top:0}
.main-column{display:flex;flex-direction:column;gap:15px}
.player-header{display:flex;justify-content:space-between;align-items:center;gap:12px}
.player-title-wrap{display:flex;align-items:center;gap:10px;min-width:0}
.hero-portrait-panel{padding:12px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08)}
.hero-portrait-panel h3{margin:0 0 10px 0}
.hero-portrait-card{display:flex;flex-direction:column;gap:10px}
.hero-portrait-stage{width:100%;height:320px;border-radius:18px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:
radial-gradient(circle at 50% 18%,rgba(255,255,255,.12),rgba(255,255,255,0) 42%),
linear-gradient(180deg,rgba(255,255,255,.1),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08)}
.hero-portrait-stage .combat-avatar-media{width:100%;height:100%;object-fit:contain;object-position:center top}
.hero-portrait-stage .combat-avatar-fallback{font-size:110px}
.hero-portrait-copy{display:flex;flex-direction:column;gap:6px}
.hero-portrait-copy strong{font-size:18px}
.coin-badge{padding:8px 14px;border-radius:999px;background:#f6c445;color:#2b2100;font-weight:700;box-shadow:0 4px 12px rgba(0,0,0,.22)}
.class-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
.class-card{padding:18px;border:none;border-radius:16px;background:linear-gradient(160deg,#4d4d4d,#2f2f2f);color:#fff;text-align:left;box-shadow:0 10px 20px rgba(0,0,0,.18);transition:transform .18s ease,box-shadow .18s ease}
.class-card:hover{transform:translateY(-3px);box-shadow:0 14px 24px rgba(0,0,0,.24)}
.class-card .class-icon{font-size:38px;display:block;margin-bottom:8px}
.class-card h4{margin:0 0 10px 0;font-size:20px}
.class-card p{margin:6px 0;font-size:14px}
.class-card small{display:block;margin-top:10px;color:#d6d6d6;line-height:1.45}
.stat-hp{color:#89f07d}
.stat-mp{color:#7bc9ff}
.stat-atk{color:#ffd36a}
.class-warrior{background:linear-gradient(160deg,#68533a,#32261b)}
.class-archer{background:linear-gradient(160deg,#45644b,#1e3022)}
.class-mage{background:linear-gradient(160deg,#35506c,#1d263b)}
.class-nature{background:linear-gradient(160deg,#466741,#20301c)}
.saved-campaign{margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12)}
.death-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.panel-header{display:flex;justify-content:space-between;align-items:center;gap:10px}
.inventory-list,.trophy-list{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.inventory-item,.trophy-item{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.06)}
.inventory-card{display:grid;grid-template-columns:70px minmax(0,1fr);gap:12px;align-items:center}
.inventory-card.compact{grid-template-columns:58px minmax(0,1fr)}
.inventory-media{position:relative;width:70px;height:70px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 10px 20px rgba(0,0,0,.16);overflow:hidden}
.inventory-card.compact .inventory-media{width:58px;height:58px;border-radius:14px}
.inventory-media::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.1),rgba(255,255,255,0) 38%,rgba(0,0,0,.1));pointer-events:none}
.inventory-media::after{content:"";position:absolute;left:10px;right:10px;bottom:8px;height:12px;border-radius:50%;background:radial-gradient(circle,rgba(0,0,0,.28),rgba(0,0,0,0));opacity:.72}
.inventory-media.item-rarity-comum{box-shadow:inset 0 0 0 1px rgba(255,255,255,.03),0 10px 20px rgba(0,0,0,.16)}
.inventory-media.item-rarity-incomum{box-shadow:inset 0 0 0 1px rgba(126,231,135,.18),0 0 0 1px rgba(126,231,135,.28),0 12px 22px rgba(0,0,0,.18)}
.inventory-media.item-rarity-rara{box-shadow:inset 0 0 0 1px rgba(98,176,255,.18),0 0 0 1px rgba(98,176,255,.34),0 12px 22px rgba(0,0,0,.18)}
.inventory-media.item-rarity-ultra-rara{box-shadow:inset 0 0 0 1px rgba(211,148,255,.18),0 0 0 1px rgba(211,148,255,.34),0 12px 22px rgba(0,0,0,.18)}
.inventory-media.item-rarity-lendaria{box-shadow:inset 0 0 0 1px rgba(255,191,71,.24),0 0 0 1px rgba(255,191,71,.38),0 14px 24px rgba(0,0,0,.2)}
.inventory-media.tone-floresta{background:linear-gradient(180deg,rgba(93,146,91,.22),rgba(27,43,26,.22))}
.inventory-media.tone-caverna{background:linear-gradient(180deg,rgba(118,130,145,.24),rgba(31,36,43,.18))}
.inventory-media.tone-ruinas{background:linear-gradient(180deg,rgba(178,154,113,.22),rgba(53,42,31,.22))}
.inventory-media.tone-pantano{background:linear-gradient(180deg,rgba(128,167,83,.22),rgba(35,52,29,.22))}
.inventory-media.tone-vulcao{background:linear-gradient(180deg,rgba(196,105,73,.26),rgba(54,24,18,.22))}
.inventory-media.tone-abismo{background:linear-gradient(180deg,rgba(118,101,188,.26),rgba(31,20,46,.22))}
.inventory-media.tone-fortaleza{background:linear-gradient(180deg,rgba(139,156,174,.24),rgba(29,35,43,.2))}
.inventory-media.tone-necropole{background:linear-gradient(180deg,rgba(124,113,164,.24),rgba(28,23,39,.22))}
.inventory-media.tone-citadela{background:linear-gradient(180deg,rgba(111,142,179,.24),rgba(26,34,49,.22))}
.inventory-media.tone-panteao{background:linear-gradient(180deg,rgba(222,196,113,.24),rgba(53,42,19,.22))}
.inventory-media.tone-cataclismo{background:linear-gradient(180deg,rgba(200,97,88,.26),rgba(51,18,18,.22))}
.inventory-media.tone-paradoxo,.inventory-media.tone-dungeon{background:linear-gradient(180deg,rgba(109,180,189,.24),rgba(19,30,39,.22))}
.inventory-media.tone-neutral{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03))}
.item-sprite{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:42px;height:42px}
.inventory-card.compact .item-sprite{width:34px;height:34px}
.item-sprite .item-part{position:absolute;display:block;box-sizing:border-box}
.item-sprite.weapon-sword .blade{left:19px;top:2px;width:8px;height:28px;background:linear-gradient(180deg,#f8fbff,#aebccc);clip-path:polygon(50% 0,100% 22%,72% 100%,28% 100%,0 22%)}
.item-sprite.weapon-sword .guard{left:11px;top:27px;width:24px;height:5px;background:linear-gradient(180deg,#f1d597,#8f6d2b);border-radius:999px}
.item-sprite.weapon-sword .hilt{left:18px;top:30px;width:10px;height:10px;background:linear-gradient(180deg,#9a6b39,#512f14);border-radius:4px}
.item-sprite.weapon-sword .pommel{left:18px;top:37px;width:10px;height:5px;background:#d2ad62;border-radius:999px}
.item-sprite.weapon-bow .bow{left:13px;top:3px;width:18px;height:34px;border:4px solid #b9823f;border-right-color:transparent;border-radius:44px;transform:rotate(8deg)}
.item-sprite.weapon-bow .string{left:26px;top:5px;width:2px;height:30px;background:linear-gradient(180deg,#fff,#d0e8d8)}
.item-sprite.weapon-bow .arrow{left:2px;top:18px;width:28px;height:4px;background:linear-gradient(90deg,#f8fcff,#d9f1ff);border-radius:999px}
.item-sprite.weapon-bow .arrow::after{content:"";position:absolute;right:-7px;top:-2px;border-left:7px solid #eef5ff;border-top:4px solid transparent;border-bottom:4px solid transparent}
.item-sprite.weapon-bow .arrow::before{content:"";position:absolute;left:-7px;top:-3px;width:7px;height:10px;background:linear-gradient(180deg,#d4eec8,#86c285);clip-path:polygon(0 50%,100% 0,100% 100%)}
.item-sprite.weapon-staff .shaft{left:19px;top:8px;width:6px;height:28px;background:linear-gradient(180deg,#a06a3f,#5a351b);border-radius:999px}
.item-sprite.weapon-staff .orb{left:11px;top:0;width:22px;height:22px;border-radius:50%;background:radial-gradient(circle,#f0e0ff,#af78ff 58%,#5830a5);box-shadow:0 0 10px rgba(173,120,255,.42)}
.item-sprite.weapon-staff .rune{left:7px;top:2px;width:30px;height:30px;border-radius:50%;border:2px solid rgba(205,177,255,.34)}
.item-sprite.armor-head .helm{left:6px;top:6px;width:30px;height:18px;background:linear-gradient(180deg,#cfd8e3,#677482);clip-path:polygon(50% 0,100% 38%,88% 100%,12% 100%,0 38%);border-radius:12px 12px 5px 5px}
.item-sprite.armor-head .visor{left:11px;top:19px;width:20px;height:6px;background:linear-gradient(180deg,#26303b,#495564);border-radius:999px}
.item-sprite.armor-head .crest{left:17px;top:0;width:8px;height:10px;background:linear-gradient(180deg,#d76047,#87261d);clip-path:polygon(50% 0,100% 100%,0 100%)}
.item-sprite.armor-chest .plate{left:9px;top:6px;width:24px;height:28px;background:linear-gradient(180deg,#98abc0,#415060);border-radius:14px 14px 10px 10px}
.item-sprite.armor-chest .pauldron-left,.item-sprite.armor-chest .pauldron-right{top:8px;width:12px;height:10px;background:linear-gradient(180deg,#c7d1dc,#6a7582);border-radius:10px 10px 6px 6px}
.item-sprite.armor-chest .pauldron-left{left:3px}
.item-sprite.armor-chest .pauldron-right{right:3px}
.item-sprite.armor-chest .emblem{left:16px;top:16px;width:10px;height:12px;background:linear-gradient(180deg,#e1c57f,#916927);clip-path:polygon(50% 0,95% 24%,82% 100%,18% 100%,5% 24%)}
.item-sprite.armor-legs .leg-left,.item-sprite.armor-legs .leg-right{top:8px;width:11px;height:24px;background:linear-gradient(180deg,#64758a,#313b48);border-radius:8px}
.item-sprite.armor-legs .leg-left{left:10px}
.item-sprite.armor-legs .leg-right{left:21px}
.item-sprite.armor-legs .belt{left:8px;top:4px;width:26px;height:6px;background:linear-gradient(180deg,#d9bb71,#8a6327);border-radius:999px}
.item-sprite.armor-feet .boot-left,.item-sprite.armor-feet .boot-right{top:14px;width:14px;height:18px;background:linear-gradient(180deg,#58534f,#1c1f24);border-radius:9px 9px 6px 6px}
.item-sprite.armor-feet .boot-left{left:7px}
.item-sprite.armor-feet .boot-right{left:22px}
.item-sprite.armor-feet .sole-left,.item-sprite.armor-feet .sole-right{top:28px;width:16px;height:6px;background:#101216;border-radius:999px}
.item-sprite.armor-feet .sole-left{left:6px}
.item-sprite.armor-feet .sole-right{left:21px}
.item-sprite.potion .bottle{left:10px;top:6px;width:22px;height:28px;background:linear-gradient(180deg,#eef6ff,#a9bac7);clip-path:polygon(34% 0,66% 0,72% 10%,84% 20%,84% 100%,16% 100%,16% 20%,28% 10%);border-radius:8px}
.item-sprite.potion .liquid{left:13px;top:16px;width:16px;height:14px;border-radius:0 0 8px 8px}
.item-sprite.potion.health .liquid{background:linear-gradient(180deg,#ff9078,#c83a30)}
.item-sprite.potion.mana .liquid{background:linear-gradient(180deg,#86d8ff,#2c82ff)}
.item-sprite.potion.skill .liquid{background:linear-gradient(180deg,#d2afff,#7d40d5)}
.item-sprite.potion.attack .liquid{background:linear-gradient(180deg,#ffd48a,#d06e1f)}
.item-sprite.potion .cork{left:15px;top:0;width:12px;height:10px;background:linear-gradient(180deg,#a97a4c,#623914);border-radius:4px 4px 2px 2px}
.item-sprite.chest .lid{left:6px;top:8px;width:30px;height:12px;background:linear-gradient(180deg,#c48a46,#6c4317);border-radius:8px 8px 4px 4px}
.item-sprite.chest .body{left:5px;top:18px;width:32px;height:18px;background:linear-gradient(180deg,#a56a2b,#5c3815);border-radius:4px 4px 8px 8px}
.item-sprite.chest .lock{left:17px;top:20px;width:8px;height:10px;background:linear-gradient(180deg,#f2df9a,#b58f36);border-radius:3px}
.item-sprite.chest .band-left,.item-sprite.chest .band-right{top:8px;width:4px;height:28px;background:rgba(77,45,18,.48)}
.item-sprite.chest .band-left{left:10px}
.item-sprite.chest .band-right{right:10px}
.inventory-content{min-width:0}
.inventory-title-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.inventory-qty-badge{padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.08);font-size:11px;font-weight:700;color:#f0f0f0}
.inventory-meta{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 8px}
.inventory-tag{padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.08);font-size:11px;font-weight:700}
.inventory-subtext{display:block;margin-top:4px}
.trophy-item.locked{opacity:.55}
.trophy-category{padding:12px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
.trophy-summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
.trophy-summary-card{padding:12px;border-radius:12px;background:linear-gradient(160deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08)}
.trophy-summary-card strong{display:block;font-size:12px;color:#d7d7d7;text-transform:uppercase;letter-spacing:.04em}
.trophy-summary-card span{display:block;margin-top:6px;font-size:22px;font-weight:700}
.trophy-summary-card small{display:block;margin-top:4px;color:#d7d7d7}
.bestiary-filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.boss-ability-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.boss-ability-item{padding:10px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06)}
.boss-ability-item strong{display:block;margin-bottom:4px}
.status-on{color:#89f07d;font-weight:700}
.status-off{color:#ffd36a;font-weight:700}
.camp-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:12px 0}
.camp-stat{padding:12px;border-radius:12px;background:linear-gradient(160deg,rgba(255,255,255,.09),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08)}
.camp-stat strong{display:block;font-size:12px;color:#d7d7d7;text-transform:uppercase;letter-spacing:.04em}
.camp-stat span{display:block;margin-top:6px;font-size:22px;font-weight:700}
.equipment-layout{display:grid;grid-template-columns:126px minmax(0,1fr);gap:12px;align-items:center;margin-top:12px}
.equipment-body{position:relative;min-height:320px;padding:18px 14px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03))}
.equipment-stack{position:relative;display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;min-height:320px}
.hero-silhouette{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:78px;opacity:.18}
.equip-slot{width:126px;min-height:74px;padding:8px 10px;border-radius:12px;font-size:12px;line-height:1.35;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;box-sizing:border-box;transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}
.equip-slot strong{display:block;color:#d7d7d7;font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.equip-slot.empty{background:rgba(17,17,17,.42);border:1px dashed rgba(255,255,255,.14);box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}
.equip-slot.filled{background:rgba(17,17,17,.86);border:1px solid rgba(255,255,255,.14);box-shadow:0 8px 18px rgba(0,0,0,.18)}
.slot-empty{color:#909090;font-style:italic}
.equip-weapon{align-self:center}
.rarity-comum{color:#f0f0f0}
.rarity-incomum{color:#7ee787}
.rarity-rara{color:#62b0ff}
.rarity-ultra-rara{color:#d394ff}
.rarity-lendaria{color:#ffbf47}
.boss-btn{background:#8b2f2f;color:#fff}
.lock-note{font-size:13px;color:#d1d1d1}
.bar{height:20px;background:#555;border-radius:10px;overflow:hidden;margin:5px 0;position:relative}
.bar.small{height:9px;background:#494949}
.fill{height:100%;transition:width .32s linear;position:relative;z-index:2}
.shield-fill{height:100%;background:#aeb5bd;transition:width .32s linear}
.shield-row{margin-bottom:6px}
.shield-label{font-size:12px;color:#d9d9d9}
.buff-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.buff-pill{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px;color:#f3f3f3}
.hp{background:#4caf50}.mp{background:#2196f3}.xp{background:#ffc107}
#log{height:180px;overflow-y:auto;background:#111;padding:10px;border-radius:10px}
.action-btn{position:relative}
.action-btn[data-tooltip]:hover::after,
.has-tooltip[data-tooltip]:hover::after{
  content:attr(data-tooltip);
  position:absolute;
  left:50%;
  bottom:calc(100% + 8px);
  transform:translateX(-50%);
  min-width:220px;
  max-width:280px;
  padding:10px 12px;
  border-radius:10px;
  background:#101010;
  color:#fff;
  box-shadow:0 8px 18px rgba(0,0,0,.35);
  font-size:13px;
  line-height:1.4;
  white-space:normal;
  z-index:10
}
.action-btn[data-tooltip]:hover::before,
.has-tooltip[data-tooltip]:hover::before{
  content:"";
  position:absolute;
  left:50%;
  bottom:100%;
  transform:translateX(-50%);
  border:6px solid transparent;
  border-top:none;
  border-bottom-color:#101010;
  z-index:11
}
.levelup-panel{border:1px solid #ffc107;background:#4a3c10}
.attribute-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:10px 0;padding:10px;border-radius:10px;background:rgba(255,255,255,.06)}
.attribute-controls{display:flex;align-items:center;gap:8px}
.attribute-controls button{padding:6px 12px;margin:0}
.attribute-value{min-width:32px;text-align:center;font-weight:700}
.tabs{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap}
.tab-btn{background:#505050;color:#fff}
.tab-btn.active{background:#1565c0}
.region-chip{padding:8px 14px;border-radius:999px;background:#505050;color:#fff}
.region-chip.active{background:#2e7d32}
.sprite-box{display:flex;justify-content:center;align-items:center;min-height:140px;font-size:76px;background:rgba(255,255,255,.05);border-radius:14px;margin-top:10px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.sprite-stage{position:relative;display:flex;justify-content:center;align-items:flex-end;width:100%;min-height:140px;padding:14px}
.sprite-ground{position:absolute;left:16px;right:16px;bottom:12px;height:24px;border-radius:50%;background:radial-gradient(circle,rgba(0,0,0,.45),rgba(0,0,0,0));opacity:.75}
.sprite-figure{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;line-height:1;transform-origin:center bottom;filter:drop-shadow(0 12px 16px rgba(0,0,0,.35));user-select:none}
.hero-sprite-box{min-height:132px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));margin-bottom:10px}
.hero-sprite-box .sprite-stage{min-height:132px}
.hero-sprite-box .sprite-figure{font-size:82px}
.enemy-sprite-box .sprite-figure{font-size:84px}
.hero-guerreiro{color:#f2d0a1}
.hero-arqueiro{color:#bce9bf}
.hero-mago{color:#bdd7ff}
.hero-cavaleiro,.hero-paladino{color:#f3d2a7;text-shadow:0 0 14px rgba(255,215,160,.22)}
.hero-espadachim,.hero-samurai,.hero-ninja,.hero-berserker{color:#ffd6a6;text-shadow:0 0 14px rgba(255,184,120,.22)}

#heroSpriteBox.casting .hero-mage-rig .mage-staff-orb{animation:mageOrbCast .42s ease-out}

.hero-mage-rig.hero-arcanista .mage-staff-orb,.hero-mage-rig.hero-arquimago .mage-staff-orb{background:radial-gradient(circle,#f4dcff,#b983ff 58%,#5732ab);box-shadow:0 0 20px rgba(173,120,255,.58)}

.hero-mage-rig.hero-corrompido .mage-staff-orb{background:radial-gradient(circle,#dfffd6,#7ec55f 54%,#1f4b22);box-shadow:0 0 20px rgba(117,214,97,.55)}

@keyframes mageIdleFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-2px)}
}
@keyframes mageIdleRobe{
  0%,100%{transform:rotate(0deg)}
  50%{transform:rotate(-3deg)}
}
@keyframes mageIdleOrb{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-2px) scale(1.04)}
}
@keyframes mageStaffCast{
  0%{transform:rotate(-26deg)}
  45%{transform:rotate(-44deg) translate(-3px,-5px)}
  100%{transform:rotate(-26deg)}
}
@keyframes mageStaffTilt{
  0%{transform:rotate(-8deg)}
  45%{transform:rotate(-18deg) translate(-2px,-3px)}
  100%{transform:rotate(-8deg)}
}
@keyframes mageOrbCast{
  0%{transform:scale(1)}
  45%{transform:scale(1.32)}
  100%{transform:scale(1)}
}
@keyframes mageRuneSpin{
  0%{transform:rotate(0deg) scale(.88);opacity:.3}
  45%{transform:rotate(140deg) scale(1.08);opacity:1}
  100%{transform:rotate(240deg) scale(.88);opacity:.3}
}
@keyframes mageHandProject{
  0%{transform:translateX(0)}
  45%{transform:translateX(6px) translateY(-3px)}
  100%{transform:translateX(0)}
}
@keyframes mageChannelBody{
  0%{transform:translateY(0)}
  45%{transform:translateY(-4px)}
  100%{transform:translateY(0)}
}
@keyframes mageOrbBuff{
  0%{transform:scale(1)}
  45%{transform:scale(1.24)}
  100%{transform:scale(1)}
}
@keyframes mageRuneBuff{
  0%{transform:rotate(0deg) scale(1);opacity:.48}
  45%{transform:rotate(80deg) scale(1.14);opacity:1}
  100%{transform:rotate(160deg) scale(1);opacity:.48}
}
@keyframes mageHitRobe{
  0%{transform:translateX(0)}
  45%{transform:translateX(4px)}
  100%{transform:translateX(0)}
}
@keyframes mageHitHat{
  0%{transform:translateY(0)}
  45%{transform:translateY(-3px) rotate(5deg)}
  100%{transform:translateY(0)}
}

.enemy-card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08)}

.enemy-title h3{margin:0 0 6px 0}
.enemy-subtitle{margin:0;color:#d0d0d0;font-size:13px}
.enemy-badges{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.enemy-badge{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px;font-weight:700}
.enemy-drop-box{margin-top:12px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}

.enemy-drop-box span{color:#d7d7d7}
.combat-arena-card{padding:16px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08)}
.combat-scene-header{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
.combat-detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:14px}
.combat-detail-card{padding:12px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:6px}

.simple-combat-banner{display:flex;align-items:center;gap:14px;margin-top:14px;padding:14px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.08)}

.scene-preview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}

.spawn-preview-pill strong{display:block;margin-bottom:4px}
.spawn-preview-pill span{font-size:12px;color:#d7d7d7}
.battle-scene{position:relative;min-height:330px;margin-top:14px;border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.1);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 22px 40px rgba(0,0,0,.22);isolation:isolate}

.battle-scene-overlay{position:absolute;inset:0;pointer-events:none;z-index:2}
.scene-atmosphere,.scene-props{position:absolute;inset:0;pointer-events:none}
.scene-atmosphere{z-index:2}
.scene-props{z-index:3}
.scene-haze{position:absolute;left:-6%;right:-6%;bottom:74px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.12),rgba(255,255,255,0) 64%);opacity:.45;filter:blur(14px)}

.scene-glow.two{right:-18px;top:18px}

.scene-prop.left{left:18px}
.scene-prop.mid{left:50%;transform:translateX(-50%)}
.scene-prop.right{right:18px}
.scene-prop-ground{position:absolute;left:0;right:0;bottom:24px;height:58px;background:linear-gradient(180deg,rgba(0,0,0,0),rgba(5,7,9,.34));opacity:.75}
.scene-region-tag{position:absolute;left:18px;top:16px;z-index:6;padding:8px 14px;border-radius:999px;background:rgba(9,10,12,.48);backdrop-filter:blur(8px);font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border:1px solid rgba(255,255,255,.08)}
.scene-nameplate{position:absolute;bottom:18px;z-index:6;padding:8px 12px;border-radius:14px;background:rgba(7,9,12,.52);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:2px;max-width:220px}

.scene-subclass-line{display:flex;align-items:center;gap:6px;font-size:11px;color:#e9edf0}
.scene-subclass-glyph{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.08);font-size:12px}
.scene-preview-pill{position:absolute;left:34px;top:86px;z-index:5;width:122px;height:122px;border-radius:28px;background:rgba(10,14,18,.48);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:58px;backdrop-filter:blur(8px);box-shadow:0 18px 28px rgba(0,0,0,.16)}
.combat-entity{position:absolute;bottom:34px;width:178px;height:178px;z-index:4;pointer-events:none}

.combat-entity .sprite-fx{position:absolute;inset:0;z-index:7;pointer-events:none}

.emoji-sprite{font-size:92px;line-height:1;display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.hero-entity .emoji-sprite{transform:translateX(-50%) scaleX(-1)}
.enemy-entity .emoji-sprite{transform:translateX(-50%)}
.preview-scene .hero-entity{opacity:.92}
.preview-scene .hero-entity .entity-aura{opacity:.26}
.preview-scene .entity-shadow{opacity:.58}
.enemy-entity{left:24px}

function loadUiSettings(){
  try{
    const saved = JSON.parse(localStorage.getItem(UI_SETTINGS_KEY) || "{}");
    return {
      enemyBarSpeed: saved.enemyBarSpeed || "rapida",
      disableRespawnTimer: !!saved.disableRespawnTimer,
      musicVolume: typeof saved.musicVolume === "number" ? Math.min(1, Math.max(0, saved.musicVolume)) : 0.5,
      musicMuted: !!saved.musicMuted
    };
  }catch{
    return { enemyBarSpeed: "rapida", disableRespawnTimer: false, musicVolume: 0.5, musicMuted: false };
  }
}

function saveUiSettings(){
  localStorage.setItem(UI_SETTINGS_KEY, JSON.stringify(uiSettings));
  renderSettingsPanel();
}

function toggleSettingsPanel(){
  isSettingsOpen = !isSettingsOpen;
  renderSettingsPanel();
}

function ensureRegionMusicAudio(){
  if(regionMusicAudio){ return regionMusicAudio; }
  regionMusicAudio = new Audio();
  regionMusicAudio.loop = true;
  regionMusicAudio.preload = "auto";
  applyMusicSettings();
  return regionMusicAudio;
}

function clearMusicFade(){
  if(musicFadeInterval){
    clearInterval(musicFadeInterval);
    musicFadeInterval = null;
  }
}

function getTargetMusicVolume(){
  if(uiSettings.musicMuted){ return 0; }
  return Math.min(1, Math.max(0, uiSettings.musicVolume ?? 0.5));
}

function startRegionMusicFadeIn(){
  const audio = ensureRegionMusicAudio();
  const targetVolume = getTargetMusicVolume();
  musicFadeTargetVolume = targetVolume;
  clearMusicFade();
  if(targetVolume <= 0){
    audio.volume = 0;
    return;
  }
  const startingVolume = Math.min(targetVolume, 0.03);
  audio.volume = startingVolume;
  musicFadeInterval = setInterval(() => {
    const liveTarget = getTargetMusicVolume();
    musicFadeTargetVolume = liveTarget;
    if(liveTarget <= 0){
      audio.volume = 0;
      clearMusicFade();
      return;
    }
    const nextVolume = Math.min(liveTarget, audio.volume + Math.max(0.008, liveTarget / 18));
    audio.volume = nextVolume;
    if(nextVolume >= liveTarget - 0.001){
      audio.volume = liveTarget;
      clearMusicFade();
    }
  }, 220);
}

function applyMusicSettings(){
  const audio = ensureRegionMusicAudio();
  const targetVolume = getTargetMusicVolume();
  musicFadeTargetVolume = targetVolume;
  if(targetVolume <= 0){
    audio.volume = 0;
    clearMusicFade();
    return;
  }
  if(musicFadeInterval){
    if(audio.volume > targetVolume){
      audio.volume = targetVolume;
    }
    return;
  }
  audio.volume = targetVolume;
}

function setMusicVolume(nextVolume){
  uiSettings.musicVolume = Math.min(1, Math.max(0, nextVolume));
  applyMusicSettings();
  saveUiSettings();
}

function adjustMusicVolume(delta){
  setMusicVolume((uiSettings.musicVolume ?? 0.5) + delta);
}

function toggleMusicMute(){
  uiSettings.musicMuted = !uiSettings.musicMuted;
  applyMusicSettings();
  saveUiSettings();
}

function syncRegionMusic(forceRestart = false){
  const track = regionMusicTracks[currentRegion] || null;
  const audio = ensureRegionMusicAudio();
  if(!track){
    clearMusicFade();
    if(!audio.paused){
      audio.pause();
    }
    audio.volume = 0;
    currentMusicRegion = null;
    return;
  }
  const shouldRestart = forceRestart || currentMusicRegion !== currentRegion || !audio.src || !audio.src.endsWith(track.src.replace(/\\/g, "/"));
  if(shouldRestart){
    clearMusicFade();
    audio.src = track.src;
    currentMusicRegion = currentRegion;
    audio.currentTime = 0;
  }
  const targetVolume = getTargetMusicVolume();
  if(!shouldRestart){
    applyMusicSettings();
  }else{
    audio.volume = targetVolume <= 0 ? 0 : Math.min(targetVolume, 0.03);
  }
  const playAttempt = audio.play();
  if(playAttempt?.catch){
    playAttempt.catch(() => {});
  }
  if(shouldRestart){
    startRegionMusicFadeIn();
  }
}

function setEnemyBarSpeed(speed){
  uiSettings.enemyBarSpeed = speed;
  saveUiSettings();
}

function setDisableRespawnTimer(enabled){
  uiSettings.disableRespawnTimer = !!enabled;
  saveUiSettings();
}

function renderSettingsPanel(){
  const panel = document.getElementById("settingsPanel");
  if(!panel){ return; }
  panel.style.display = isSettingsOpen ? "block" : "none";
  if(!isSettingsOpen){
    panel.innerHTML = "";
    return;
  }
  const options = [
    { id: "instantanea", label: "Instantanea" },
    { id: "rapida", label: "Rapida" },
    { id: "media", label: "Media" },
    { id: "lenta", label: "Lenta" }
  ];
  panel.innerHTML = `
    <h3>Configuracao</h3>
    <span class="lock-note">Velocidade da barra de vida do inimigo</span>
    <div class="settings-options">
      ${options.map(option => `<button class="${uiSettings.enemyBarSpeed === option.id ? "active" : ""}" onclick="setEnemyBarSpeed('${option.id}')">${option.label}</button>`).join("")}
    </div>
    <span class="settings-note">Para Guerreiro e Arqueiro, as opcoes continuam mais rapidas que para o Mago para preservar o impacto do Missel Magico.</span>
    <div style="margin-top:14px;">
      <span class="lock-note">Testes de renascimento</span>
      <div class="settings-options">
        <button class="${uiSettings.disableRespawnTimer ? "active" : ""}" onclick="setDisableRespawnTimer(true)">Sem espera</button>
        <button class="${!uiSettings.disableRespawnTimer ? "active" : ""}" onclick="setDisableRespawnTimer(false)">Normal</button>
      </div>
      <span class="settings-note">Opcao de teste para renascer sem tempo de espera.</span>
    </div>
    <div style="margin-top:14px;">
      <span class="lock-note">Volume da musica</span>
      <div class="settings-options">
        <button onclick="adjustMusicVolume(-0.1)">Diminuir</button>
        <button onclick="adjustMusicVolume(0.1)">Aumentar</button>
        <button class="${uiSettings.musicMuted ? "active" : ""}" onclick="toggleMusicMute()">${uiSettings.musicMuted ? "Desmutar" : "Mutar"}</button>
      </div>
      <span class="settings-note">Volume atual: ${Math.round((uiSettings.musicVolume ?? 0.5) * 100)}%${uiSettings.musicMuted ? " | Mutado" : ""}</span>
    </div>`;
}

function getPlayerSubclassState(targetPlayer = player){
  if(!targetPlayer.subclassChoices){
    targetPlayer.subclassChoices = { tier30: null, tier60: null };
  }
  return targetPlayer.subclassChoices;
}

function getTier30ChoiceDef(className, choiceId){
  return (subclassChoicesByClass[className]?.tier30 || []).find(option => option.id === choiceId) || null;
}

function getTier60ChoiceDef(className, tier30Id, choiceId){
  return (subclassChoicesByClass[className]?.tier60?.[tier30Id] || []).find(option => option.id === choiceId) || null;
}

function getChosenSubclassDefs(targetPlayer = player){
  const subclassState = getPlayerSubclassState(targetPlayer);
  const tier30 = subclassState.tier30 ? getTier30ChoiceDef(targetPlayer.class, subclassState.tier30) : null;
  const tier60 = tier30 && subclassState.tier60 ? getTier60ChoiceDef(targetPlayer.class, tier30.id, subclassState.tier60) : null;
  return [tier30, tier60].filter(Boolean);
}

function getCurrentSubclassDef(targetPlayer = player){
  const chosen = getChosenSubclassDefs(targetPlayer);
  return chosen[chosen.length - 1] || null;
}

function getDisplayedClassName(targetPlayer = player){
  return getCurrentSubclassDef(targetPlayer)?.name || targetPlayer.class;
}

function getHeroSpriteIcon(targetPlayer = player){
  const currentSubclass = getCurrentSubclassDef(targetPlayer);
  return (currentSubclass && subclassIcons[currentSubclass.id]) || classIcons[targetPlayer.class] || "&#x2694;&#xFE0F;";
}

function getHeroSpriteClass(targetPlayer = player){
  const currentSubclass = getCurrentSubclassDef(targetPlayer);
  return `hero-${toCssToken(currentSubclass?.id || targetPlayer?.class || "guerreiro")}`;
}

function getHeroCombatAssetKey(targetPlayer = player){
  const currentSubclass = getCurrentSubclassDef(targetPlayer);
  return toCssToken(currentSubclass?.id || targetPlayer?.class || "guerreiro");
}

function getHeroRigType(targetPlayer = player){
  if(targetPlayer?.class === "Guerreiro"){ return "warrior"; }
  if(targetPlayer?.class === "Arqueiro"){ return "archer"; }
  if(targetPlayer?.class === "Mago"){ return "mage"; }
  return null;
}

function formatSubclassStatBonuses(subclass){
  if(!subclass){ return "Sem bonus de status."; }
  const parts = [];
  if(subclass.bonusHp){ parts.push(`+${subclass.bonusHp} HP`); }
  if(subclass.bonusMp){ parts.push(`+${subclass.bonusMp} MP`); }
  if(subclass.bonusAttack){ parts.push(`+${subclass.bonusAttack} ATQ`); }
  if(subclass.skillPower){ parts.push(`+${subclass.skillPower} PODER DE HABILIDADE`); }
  return parts.length ? parts.join(" | ") : "Sem bonus de status.";
}

function getTotalSubclassBonuses(targetPlayer = player){
  return getChosenSubclassDefs(targetPlayer).reduce((acc, subclass) => {
    acc.bonusHp += subclass.bonusHp || 0;
    acc.bonusMp += subclass.bonusMp || 0;
    acc.bonusAttack += subclass.bonusAttack || 0;
    acc.skillPower += subclass.skillPower || 0;
    return acc;
  }, { bonusHp: 0, bonusMp: 0, bonusAttack: 0, skillPower: 0 });
}

function chooseWeightedEnemy(enemyList, options = {}){
  const { regionName = currentRegion, applyLevelAdjustment = true } = options;
  const weightedEntries = applyLevelAdjustment
    ? getAdjustedRegionSpawnWeights(enemyList, regionName)
    : enemyList.map(enemyData => ({
      enemyData,
      weight: Math.max(0, enemyData.weight || 0)
    }));
  const totalWeight = weightedEntries.reduce((sum, entry) => sum + entry.weight, 0);
  let roll = Math.random() * totalWeight;
  for(const entry of weightedEntries){
    roll -= entry.weight;
    if(roll <= 0){
      return entry.enemyData;
    }
  }
  return enemyList[enemyList.length - 1];
}

function getAdjustedEnemySpawnWeight(enemyData, regionName = currentRegion){
  if(!enemyData || !enemyData.weight){ return 0; }
  const levelGap = player.level - enemyData.level;
  if(levelGap <= 3){
    return enemyData.weight;
  }
  const excessGap = levelGap - 3;
  const rarityKey = getEnemyRarity(regionName, enemyData.name, false).key;
  const rarityPenaltyFactor = {
    comum: 1.45,
    incomum: 0.9,
    rara: 0.55
  }[rarityKey] || 1;
  const penalty = 1 + (excessGap * 2.4 * rarityPenaltyFactor) + (excessGap * excessGap * 1.1 * rarityPenaltyFactor);
  return Math.max(1, enemyData.weight / penalty);
}

function getAdjustedRegionSpawnWeights(enemyList, regionName = currentRegion){
  const rawEntries = enemyList.map(enemyData => ({
    enemyData,
    baseWeight: Math.max(0, enemyData.weight || 0),
    weight: getAdjustedEnemySpawnWeight(enemyData, regionName)
  }));
  const rareEntry = rawEntries.find(entry => getEnemyRarity(regionName, entry.enemyData.name, false).key === "rara");
  if(!rareEntry){
    return rawEntries;
  }
  const baseTotal = rawEntries.reduce((sum, entry) => sum + entry.baseWeight, 0) || 1;
  const rawTotal = rawEntries.reduce((sum, entry) => sum + entry.weight, 0) || 1;
  const baseRareChance = rareEntry.baseWeight / baseTotal;
  const rawRareChance = rareEntry.weight / rawTotal;
  const rareLead = player.level - rareEntry.enemyData.level;
  let revealProgress = 0;
  if(rareLead >= 1){
    revealProgress = Math.min(1, rareLead / 3);
  }
  const allowedRareChance = baseRareChance + ((rawRareChance - baseRareChance) * revealProgress);
  if(rawRareChance <= allowedRareChance || allowedRareChance >= 0.999){
    return rawEntries;
  }
  const otherWeight = Math.max(0.0001, rawTotal - rareEntry.weight);
  rareEntry.weight = Math.max(1, (allowedRareChance * otherWeight) / Math.max(0.0001, 1 - allowedRareChance));
  return rawEntries;
}

function getRegionSpawnPreview(regionName){
  const regionData = regions[regionName];
  if(!regionData?.enemies?.length){
    return [];
  }
  if(regionName === currentRegion && !isDungeonMode() && enemiesSpawned < 3){
    const forcedEnemy = regionData.enemies.find(enemyData => enemyData.name === "Lobo Sombrio");
    if(forcedEnemy){
      return regionData.enemies.map(enemyData => ({
        ...enemyData,
        chance: enemyData.name === forcedEnemy.name ? 100 : 0
      }));
    }
  }
  const weightedEntries = getAdjustedRegionSpawnWeights(regionData.enemies, regionName);
  const totalWeight = weightedEntries.reduce((sum, entry) => sum + entry.weight, 0) || 1;
  return weightedEntries.map(entry => ({
    ...entry.enemyData,
    chance: (entry.weight / totalWeight) * 100
  }));
}

function getEnemyStats(template, regionOverride = null, isBoss = false){
  const regionName = regionOverride || currentRegion;
  const combatProfile = regionCombatProfiles[regionName] || regionCombatProfiles.Floresta;
  const bossProfile = getBossDifficultyProfile(regionName, isBoss);
  const hpMultiplier = isBoss ? bossProfile.hpMultiplier : (combatProfile.hpMultiplier || 1);
  const attackMultiplier = isBoss ? bossProfile.attackMultiplier : (combatProfile.attackMultiplier || 1);
  const hasArmor = combatProfile.armorScale > 0 || combatProfile.armorFlat > 0;
  const armor = hasArmor
    ? Math.max(1, Math.floor(template.level * combatProfile.armorScale) + combatProfile.armorFlat + (isBoss ? Math.max(2, Math.floor(template.level / 30)) + bossProfile.armorBonus : 0))
    : 0;
  const maxHpStrikePercent = combatProfile.maxHpStrikePercent + (isBoss && combatProfile.maxHpStrikePercent > 0 ? 0.01 : 0);
  return {
    maxHp: Math.floor((template.hp + template.level * 18) * hpMultiplier),
    attack: Math.floor((template.attack + template.level * 2) * attackMultiplier),
    armor,
    maxHpStrikePercent
  };
}

function slugify(value){
  return String(value || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_+|_+$/g, "");
}

function toCssToken(value){
  return String(value || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
}

function isAdvancedBossRegion(regionName){
  return advancedBossRegions.includes(regionName);
}

function getBossDifficultyProfile(regionName, isBoss = false){
  const combatProfile = regionCombatProfiles[regionName] || regionCombatProfiles.Floresta;
  if(!isBoss || !isAdvancedBossRegion(regionName)){
    return {
      hpMultiplier: combatProfile.bossHpMultiplier || 1,
      attackMultiplier: combatProfile.bossAttackMultiplier || 1,
      skillMultiplier: combatProfile.bossSkillMultiplier || 1,
      manaMultiplier: combatProfile.bossManaMultiplier || 1,
      armorBonus: combatProfile.bossArmorBonus || 0
    };
  }
  const index = Math.max(0, advancedBossRegions.indexOf(regionName));
  return {
    hpMultiplier: (combatProfile.bossHpMultiplier || 1) * (1 + index * 0.01),
    attackMultiplier: (combatProfile.bossAttackMultiplier || 1) * (1 + index * 0.008),
    skillMultiplier: (combatProfile.bossSkillMultiplier || 1) * (1 + index * 0.01),
    manaMultiplier: (combatProfile.bossManaMultiplier || 1) * (1 + index * 0.006),
    armorBonus: (combatProfile.bossArmorBonus || 0) + Math.floor(index / 3)
  };
}

function getBossAbilityLimit(regionName){
  if(["Floresta", "Caverna", "Ruinas"].includes(regionName)){ return 1; }

  if(["Fortaleza", "Necropole", "Citadela"].includes(regionName)){ return 3; }
  if(["Panteao", "Cataclismo", "Paradoxo"].includes(regionName)){ return 4; }
  return 1;
}

    bonusIfShield: Number.isFinite(ability.bonusIfShield) ? Math.floor(ability.bonusIfShield * bossProfile.skillMultiplier) : ability.bonusIfShield,

function restartElementAnimation(element, className){
  if(!element){ return; }
  element.classList.remove(className);
  void element.offsetWidth;
  element.classList.add(className);
}

function pulseSpriteClass(elementId, className, duration = 260){
  const element = document.getElementById(elementId);
  if(!element){ return Promise.resolve(); }
  restartElementAnimation(element, className);
  return new Promise(resolve => {
    setTimeout(() => {
      element.classList.remove(className);
      resolve();
    }, duration);
  });
}

function getSpriteAnimationTiming(attacker = "hero", style = "attack"){
  if(style === "buff"){
    return { attackerDuration: 520, hitDelay: 180, settleDelay: 160, betweenHits: 96 };
  }
  if(style === "cast"){
    return attacker === "hero"
      ? { attackerDuration: 480, hitDelay: 180, settleDelay: 180, betweenHits: 110 }
      : { attackerDuration: 430, hitDelay: 160, settleDelay: 150, betweenHits: 100 };
  }
  if(attacker === "hero"){
    if(player?.class === "Arqueiro"){
      return { attackerDuration: 420, hitDelay: 170, settleDelay: 140, betweenHits: 110 };
    }
    if(player?.class === "Guerreiro"){
      return { attackerDuration: 320, hitDelay: 150, settleDelay: 120, betweenHits: 96 };
    }
  }
  const enemyArchetype = getEnemyRigArchetype(enemy?.baseName || enemy?.name || "");
  if(["specter", "reaper", "winged", "humanoid"].includes(enemyArchetype)){
    return { attackerDuration: 320, hitDelay: 140, settleDelay: 110, betweenHits: 96 };
  }
  return { attackerDuration: 280, hitDelay: 120, settleDelay: 100, betweenHits: 90 };
}

async function playSpriteAttackAnimation(attacker = "hero", style = "attack", connectHit = true, hitRepeats = 1, hitDelay = null, betweenHits = null){
  const attackerId = attacker === "hero" ? "heroSpriteBox" : "enemySpriteBox";
  const defenderId = attacker === "hero" ? "enemySpriteBox" : "heroSpriteBox";
  const attackerClass = style === "cast" ? "casting" : style === "buff" ? "buffing" : "attacking";
  const timing = getSpriteAnimationTiming(attacker, style);
  const attackerDuration = timing.attackerDuration;
  const resolvedHitDelay = hitDelay ?? timing.hitDelay;
  const resolvedBetweenHits = betweenHits ?? timing.betweenHits;
  pulseSpriteClass(attackerId, attackerClass, attackerDuration);
  if(!connectHit){
    await wait(Math.floor(resolvedHitDelay * 0.85));
    return;
  }
  await wait(resolvedHitDelay);
  for(let hitIndex = 0; hitIndex < Math.max(1, hitRepeats); hitIndex++){
    pulseSpriteClass(defenderId, "hit", 220);
    if(hitIndex < hitRepeats - 1){
      await wait(resolvedBetweenHits);
    }
  }
  await wait(timing.settleDelay);
}

function formatStatBonusList(source){
  const parts = [];
  if(source?.bonusHp){ parts.push(`+${source.bonusHp} vida maxima`); }
  if(source?.bonusMp){ parts.push(`+${source.bonusMp} mana maxima`); }
  if(source?.bonusAttack){ parts.push(`+${source.bonusAttack} dano de ataque`); }
  if(source?.skillPower){ parts.push(`+${source.skillPower} dano de habilidade`); }
  if(source?.reflectPercent){ parts.push(`+${Math.floor(source.reflectPercent * 100)}% reflexao de dano`); }
  if(source?.coinBonus){ parts.push(`+${Math.floor(source.coinBonus * 100)}% moedas`); }
  if(source?.xpBonus){ parts.push(`+${Math.floor(source.xpBonus * 100)}% XP`); }
  if(source?.turnHealPercent){ parts.push(`+${(source.turnHealPercent * 100).toFixed(1)}% regen de vida`); }
  if(source?.burnDamageReductionPercent){ parts.push(`-${(source.burnDamageReductionPercent * 100).toFixed(1)}% dano de queimadura recebido`); }
  if(source?.flatReduction){ parts.push(`+${source.flatReduction} resistencia fixa`); }
  if(source?.bonusHpPercent){ parts.push(`+${Math.floor(source.bonusHpPercent * 100)}% vida maxima`); }
  if(source?.bonusMpPercent){ parts.push(`+${Math.floor(source.bonusMpPercent * 100)}% mana maxima`); }
  if(source?.totalDamagePercent){ parts.push(`+${Math.floor(source.totalDamagePercent * 100)}% dano total`); }
  if(source?.fatalSaveHealPercent){ parts.push(`1 salvamento fatal por combate e cura de ${Math.floor(source.fatalSaveHealPercent * 100)}% da vida`); }
  if(source?.critChanceBonus){ parts.push(`+${Math.floor(source.critChanceBonus * 100)}% chance de critico`); }
  return parts.join(", ");
}

function getRegionFromEnemy(enemyName){
  return getEnemyTemplateByName(enemyName)?.region || null;
}

function getSetBonusValues(regionName){
  return regionSetBonusProfiles[regionName] || { bonusHp: 0, bonusMp: 0, bonusAttack: 0, skillPower: 0, bonusHpPercent: 0, bonusMpPercent: 0, totalDamagePercent: 0 };
}

function getRegionEquipmentBaseStats(regionName, slot){
  const profile = regionEquipmentBaseProfiles[regionName] || regionEquipmentBaseProfiles.Floresta;
  if(slot === "accessory"){
    return { ...(getBossAccessoryTemplate(regionName)?.baseStats || {}) };
  }
  return slot === "weapon" ? { ...(profile.weapon || {}) } : { ...(profile.armor || {}) };
}

function getRegionDropSlots(regionName, enemyName){
  const regionData = regions[regionName];
  if(!regionData){ return []; }
  const orderedEnemies = [...regionData.enemies].sort((a, b) => b.weight - a.weight);
  const enemyIndex = orderedEnemies.findIndex(enemyData => enemyData.name === enemyName);
  return enemyDropSlotGroups[enemyIndex] ? [...enemyDropSlotGroups[enemyIndex]] : [];
}

function getRegionSetTemplate(regionName, slot, className = player?.class || "Guerreiro"){
  if(!regionName || !slot){ return null; }
  const itemName = slot === "weapon"
    ? `${regionWeaponPieceNames[className] || "Arma"} ${regionArticleMap[regionName] || `de ${regionName}`}`
    : `${regionArmorPieceNames[slot] || slotLabels[slot] || "Peca"} ${regionArticleMap[regionName] || `de ${regionName}`}`;
  return {
    id: `${slugify(regionName)}_${slot}${slot === "weapon" ? `_${slugify(className)}` : ""}`,
    name: itemName,
    slot,
    classRestriction: slot === "weapon" ? className : null,
    regionName,
    setId: `${slugify(regionName)}_set`,
    setName: getRegionSetLabel(regionName),
    baseStats: getRegionEquipmentBaseStats(regionName, slot)
  };
}

function getBossAccessoryTemplate(regionName){
  const accessory = bossAccessoryProfiles[regionName];
  if(!accessory){ return null; }
  return {
    id: `${slugify(regionName)}_accessory_${accessory.id}`,
    name: accessory.name,
    slot: "accessory",
    classRestriction: null,
    regionName,
    setId: null,
    setName: null,
    baseStats: accessory.baseStats
  };
}

function getEnemyDropTemplate(enemyName, regionName, className = player?.class || "Guerreiro", forcedSlot = null){
  const availableSlots = getRegionDropSlots(regionName, enemyName);
  if(!availableSlots.length){ return null; }
  const chosenSlot = forcedSlot && availableSlots.includes(forcedSlot)
    ? forcedSlot
    : availableSlots[Math.floor(Math.random() * availableSlots.length)];
  return getRegionSetTemplate(regionName, chosenSlot, className);
}

function getEquippedSetCount(setId){
  if(!player?.equipment || !setId){ return 0; }
  return equipmentSlots.reduce((total, slot) => total + (player.equipment?.[slot]?.setId === setId ? 1 : 0), 0);
}

function getActiveSetBonuses(){
  const total = { bonusHp: 0, bonusMp: 0, bonusAttack: 0, skillPower: 0, bonusHpPercent: 0, bonusMpPercent: 0, totalDamagePercent: 0 };
  const activeSets = [];
  if(!player?.equipment){ return { bonuses: total, activeSets }; }

  const requiredSetSlots = ["head", "chest", "weapon", "legs", "feet"];
  const sets = {};
  for(const slot of requiredSetSlots){
    const item = normalizeEquipmentMetadata(player.equipment?.[slot]);
    if(!item?.setId){ continue; }
    if(!sets[item.setId]){
      sets[item.setId] = { slots: new Set(), item };
    }
    sets[item.setId].slots.add(slot);
  }

  for(const entry of Object.values(sets)){
    if(entry.slots.size !== requiredSetSlots.length){ continue; }
    const item = entry.item;
    const setBonus = getSetBonusValues(item.regionName);
    total.bonusHp += setBonus.bonusHp || 0;
    total.bonusMp += setBonus.bonusMp || 0;
    total.bonusAttack += setBonus.bonusAttack || 0;
    total.skillPower += setBonus.skillPower || 0;
    total.bonusHpPercent += setBonus.bonusHpPercent || 0;
    total.bonusMpPercent += setBonus.bonusMpPercent || 0;
    total.totalDamagePercent += setBonus.totalDamagePercent || 0;
    activeSets.push({
      setName: item.setName || getRegionSetLabel(item.regionName || "desconhecida"),
      text: formatStatBonusList(setBonus)
    });
  }

  return { bonuses: total, activeSets };
}

function getRegionAverageLevel(region){
  const regionData = regions[region];
  const totalWeight = regionData.enemies.reduce((sum, enemyData) => sum + enemyData.weight, 0);
  const weightedLevels = regionData.enemies.reduce((sum, enemyData) => sum + enemyData.level * enemyData.weight, 0);
  return Math.ceil(weightedLevels / totalWeight);
}

function recordRegionEnemyKill(regionName, enemyName){
  if(!player?.stats || !regionName || !enemyName || !regions[regionName]){ return; }
  player.stats.regionKills = player.stats.regionKills || {};
  player.stats.regionKills[regionName] = player.stats.regionKills[regionName] || {};
  player.stats.regionKills[regionName][enemyName] = (player.stats.regionKills[regionName][enemyName] || 0) + 1;
}

function getBossUnlockProgress(regionName){
  const regionData = regions[regionName];
  if(!regionData){
    return { defeated: 0, total: 0, unlocked: false, missing: [] };
  }
  const regionKills = player?.stats?.regionKills?.[regionName] || {};
  const defeatedEnemies = regionData.enemies.filter(template => (regionKills[template.name] || 0) > 0);
  const missing = regionData.enemies.filter(template => (regionKills[template.name] || 0) <= 0).map(template => template.name);
  return {
    defeated: defeatedEnemies.length,
    total: regionData.enemies.length,
    unlocked: defeatedEnemies.length === regionData.enemies.length,
    missing
  };
}

function isBossUnlocked(regionName){
  return getBossUnlockProgress(regionName).unlocked;
}

function getBossUnlockText(regionName){
  const progress = getBossUnlockProgress(regionName);
  if(progress.unlocked){
    return `Chefao liberado: ${progress.defeated}/${progress.total} inimigos da regiao ja foram derrotados.`;
  }
  return `Para enfrentar o chefao, derrote pelo menos 1 vez cada inimigo da regiao. Progresso: ${progress.defeated}/${progress.total}.`;
}

function normalizePlayerState(){
  function normalizeInventoryItem(item, index){
    const normalized = {
      ...item,
      uid: item.uid || `${item.id || "item"}_${Date.now()}_${index}`
    };
    if(item.type === "consumable" && consumableCatalog[item.id]){
      normalized.name = consumableCatalog[item.id].name;
      normalized.description = consumableCatalog[item.id].description;
    }
    return normalizeEquipmentMetadata(normalized);
  }
  player.inventory = (Array.isArray(player.inventory) ? player.inventory : []).map((item, index) => ({
    ...normalizeInventoryItem(item, index)
  }));
  const oldEquipment = player.equipment || {};
  player.equipment = {
    head: normalizeEquipmentMetadata(oldEquipment.head || null),
    chest: normalizeEquipmentMetadata(oldEquipment.chest || null),
    weapon: normalizeEquipmentMetadata(oldEquipment.weapon || null),
    legs: normalizeEquipmentMetadata(oldEquipment.legs || null),
    feet: normalizeEquipmentMetadata(oldEquipment.feet || oldEquipment.boots || null),
    accessory: normalizeEquipmentMetadata(oldEquipment.accessory || null)
  };
  player.stats = player.stats || {
    enemiesDefeated: 0,
    bossesDefeated: 0,
    coinsEarned: 0,
    deaths: 0,
    regionKills: {}
  };
  player.stats.migrations = player.stats.migrations || {};
  player.stats.regionKills = player.stats.regionKills || {};
  const classDefaults = classes[player.class] || { hp: player.maxHp || 0, mp: player.maxMp || 0, attack: player.attack || 0 };
  player.baseStats = player.baseStats || { hp: classDefaults.hp, mp: classDefaults.mp, attack: classDefaults.attack };
  if(!player.stats.migrations.baseHpRebalance_v1){
    const oldBaseHpByClass = { Guerreiro: 140, Arqueiro: 120, Mago: 100 };
    const oldBaseHp = oldBaseHpByClass[player.class];
    if(oldBaseHp && player.baseStats.hp === oldBaseHp){
      const hpDelta = oldBaseHp - classDefaults.hp;
      player.baseStats.hp = classDefaults.hp;
      player.maxHp = Math.max(classDefaults.hp, (player.maxHp || classDefaults.hp) - hpDelta);
      player.hp = Math.min(player.maxHp, Math.max(1, (player.hp || player.maxHp) - hpDelta));
    }
    player.stats.migrations.baseHpRebalance_v1 = true;
  }
  player.stats.invested = createDefaultInvestedStats(player.stats.invested);
  const legacySubclass = player.subclass?.id || player.subclass || null;
  player.subclass = null;
  const subclassState = getPlayerSubclassState(player);
  if(legacySubclass && !subclassState.tier30){
    if(getTier30ChoiceDef(player.class, legacySubclass)){
      subclassState.tier30 = legacySubclass;
    }
  }
  syncInvestedStatsFromCurrentTotals();
  player.activeSkills = getClassTrees().activeSkills;
  player.passiveSkills = getClassTrees().passiveSkills;
  playerEffects = { ...createDefaultPlayerEffects(), ...(playerEffects || {}) };
}

function getAttributePointGain(attribute, targetLevel = player?.level || 1){
  const level = Math.max(1, Math.floor(targetLevel || 1));
  if(attribute === "strength"){
    return Math.floor(5 + (level * 0.15));
  }
  if(attribute === "wisdom"){
    return Math.floor(10 + (1.5 * level));
  }
  return Math.floor(10 + (1.8 * level));
}

function getPendingAllocationGains(targetLevel = player?.level || 1){
  return {
    hpGain: (allocation.vitality || 0) * getAttributePointGain("vitality", targetLevel),
    mpGain: (allocation.wisdom || 0) * getAttributePointGain("wisdom", targetLevel),
    attackGain: (allocation.strength || 0) * getAttributePointGain("strength", targetLevel),
    skillGain: (allocation.strength || 0) * getAttributePointGain("strength", targetLevel)
  };
}

function createDefaultInvestedStats(saved = {}){
  return {
    vitality: Number(saved.vitality ?? saved.hp ?? 0) || 0,
    wisdom: Number(saved.wisdom ?? saved.mp ?? 0) || 0,
    strength: Number(saved.strength ?? saved.attack ?? 0) || 0,
    hpGain: Number(saved.hpGain) || 0,
    mpGain: Number(saved.mpGain) || 0,
    attackGain: Number(saved.attackGain) || 0,
    skillGain: Number(saved.skillGain ?? saved.attackGain) || 0
  };
}

function getPreviewStats(){
  const passives = getPassiveModifiers();
  const pendingGains = getPendingAllocationGains();
  return {
    maxHp: player.maxHp + passives.bonusHp + pendingGains.hpGain,
    maxMp: player.maxMp + passives.bonusMp + pendingGains.mpGain,
    attack: player.attack + passives.bonusAttack + pendingGains.attackGain
  };
}

function getCurrentCaps(){
  const previewStats = getPreviewStats();
  return {
    maxHp: previewStats.maxHp,
    maxMp: previewStats.maxMp
  };
}

function getXpToNextLevel(){
  return 100 + player.level * 25 + Math.floor(player.level * player.level * 1.5);
}

function getCurrentClassData(){
  return classes[player.class];
}

function getSubclassChoices(){
  if(!player){ return []; }
  const subclassState = getPlayerSubclassState();
  if(player.level >= 30 && !subclassState.tier30){
    return subclassChoicesByClass[player.class]?.tier30 || [];
  }
  if(player.level >= 60 && subclassState.tier30 && !subclassState.tier60){
    return subclassChoicesByClass[player.class]?.tier60?.[subclassState.tier30] || [];
  }
  return [];
}

function getUnlockedActiveSkills(){
  return getClassTrees().activeSkills.filter(skill => player.level >= skill.level);
}

function getUnlockedPassiveSkills(){
  return getClassTrees().passiveSkills.filter(skill => player.level >= skill.level);
}

function getPassiveModifiers(){
  const base = {
    bonusHp: 0,
    bonusMp: 0,
    bonusAttack: 0,
    manaRegen: 0,
    manaRegenPercent: 0,
    manaRegenPercentSet: null,
    damageReduction: 0,
    coinBonus: 0,
    skillPower: 0,
    flatReduction: 0,
    reflectPercent: 0,
    turnHealPercent: 0,
    skillCostIncrease: 0,
    totalDamageFlat: 0,
    totalDamagePercent: 0,
    enemyMissChance: 0,
    enemySkipChance: 0,
    xpBonus: 0,
    burnDamageReductionPercent: 0,
    bonusHpPercentAccessory: 0,
    bonusMpPercentAccessory: 0,
    fatalSaveHealPercent: 0,
    critChanceBonus: 0,
    preciousMana: false,
    manaToLifePercent: 0
  };
  const pendingGains = getPendingAllocationGains();
  const subclassState = getPlayerSubclassState();
  const tier30 = subclassState.tier30;
  const tier60 = subclassState.tier60;
  for(const passive of getUnlockedPassiveSkills()){
    if(passive.type === "warrior_flat_reduction"){
      base.flatReduction += Math.floor(0.6 * player.level);
      if(tier30 === "cavaleiro" && player.level >= 30){
        base.turnHealPercent += 0.03;
      }
    }
    if(passive.type === "warrior_enemy_miss"){
      base.enemyMissChance += 0.2;
    }
    if(passive.type === "warrior_reflect"){
      base.reflectPercent += tier60 === "paladino" && player.level >= 60 ? 0.32 : tier60 === "berserker" && player.level >= 60 ? 0 : 0.18;
    }
    if(passive.type === "bonus_xp"){
      base.xpBonus += 0.1;
    }
    if(passive.type === "mage_last_resort"){
      base.preciousMana = true;
    }
    if(passive.type === "mage_mana_to_life"){
      base.manaToLifePercent += tier60 === "mago_frigido" && player.level >= 60 ? 0.65 : 0.5;
    }
    if(passive.type === "mage_overflowing"){
      // applied after all mana bonuses are known
    }
    if(passive.type === "mage_charge_damage"){
      base.totalDamagePercent += 0.05 * (playerEffects.arcaneCharges || 0);
    }
    if(passive.type === "mage_glass_cannon"){
      // handled in combat state
    }
    if(passive.type === "archer_dodge_level_scaling"){
      base.enemyMissChance += 0.05 + (0.005 * player.level);
    }
    if(passive.type === "archer_dodge_double_bonus"){
      base.enemyMissChance += 0.05 + (0.005 * player.level);
    }
    if(passive.type === "archer_dodge_coin_bonus"){
      base.enemyMissChance += 0.05 + (0.005 * player.level);
      base.coinBonus += 0.1;
    }
    if(passive.type === "archer_attack_level_bonus"){
      const attackBonus = Math.floor(0.9 * player.level);
      const skillFactor = tier30 === "atirador" && subclassState.tier60 === "atirador_arcano" && player.level >= 60 ? 1.3 : 0.9;
      const skillBonus = Math.floor(skillFactor * player.level);
      base.bonusAttack += attackBonus;
      base.skillPower += skillBonus;
    }
    if(passive.type === "archer_flat_reduction_level"){
      base.flatReduction += Math.floor(0.2 * player.level);
    }
    if(passive.type === "archer_enemy_skip_chance"){
      base.enemySkipChance += 0.07;
    }
    if(passive.type === "coin_bonus"){
      base.coinBonus += tier30 === "cacador" && player.level >= 42 ? 0.15 : 0;
    }
  }
  for(const subclass of getChosenSubclassDefs()){
    base.bonusHp += subclass.bonusHp || 0;
    base.bonusMp += subclass.bonusMp || 0;
    base.bonusAttack += subclass.bonusAttack || 0;
    base.skillPower += subclass.skillPower || 0;
  }
  for(const slot of equipmentSlots){
    const item = player.equipment?.[slot];
    if(!item){ continue; }
    base.bonusHp += item.bonusHp || 0;
    base.bonusMp += item.bonusMp || 0;
    base.bonusAttack += item.bonusAttack || 0;
    base.skillPower += item.skillPower || 0;
    base.reflectPercent += item.reflectPercent || 0;
    base.coinBonus += item.coinBonus || 0;
    base.xpBonus += item.xpBonus || 0;
    base.turnHealPercent += item.turnHealPercent || 0;
    base.burnDamageReductionPercent += item.burnDamageReductionPercent || 0;
    base.flatReduction += item.flatReduction || 0;
    base.bonusMpPercentAccessory += item.bonusMpPercent || 0;
    base.bonusHpPercentAccessory += item.bonusHpPercent || 0;
    base.totalDamagePercent += item.totalDamagePercent || 0;
    base.fatalSaveHealPercent = Math.max(base.fatalSaveHealPercent, item.fatalSaveHealPercent || 0);
    base.critChanceBonus += item.critChanceBonus || 0;
  }
  const activeSetBonuses = getActiveSetBonuses().bonuses;
  base.bonusHp += activeSetBonuses.bonusHp || 0;
  base.bonusMp += activeSetBonuses.bonusMp || 0;
  base.bonusAttack += activeSetBonuses.bonusAttack || 0;
  base.skillPower += activeSetBonuses.skillPower || 0;
  base.totalDamagePercent += activeSetBonuses.totalDamagePercent || 0;
  if(activeSetBonuses.bonusMpPercent > 0){
    base.bonusMp += Math.floor((player.maxMp + base.bonusMp + pendingGains.mpGain) * activeSetBonuses.bonusMpPercent);
  }
  if(base.bonusMpPercentAccessory > 0){
    base.bonusMp += Math.floor((player.maxMp + base.bonusMp + pendingGains.mpGain) * base.bonusMpPercentAccessory);
  }
  if(getUnlockedPassiveSkills().some(passive => passive.type === "mage_overflowing")){
    const damageFactor = tier60 === "arquimago" && player.level >= 60 ? 0.45 : 0.3;
    const costFactor = tier60 === "arquimago" && player.level >= 60 ? 0.2 : 0.1;
    base.totalDamageFlat += Math.floor((player.maxMp + base.bonusMp) * damageFactor);
    base.skillCostIncrease += Math.floor((player.maxMp + base.bonusMp) * costFactor);
  }
  if(getUnlockedPassiveSkills().some(passive => passive.type === "archer_mana_to_skill_bonus")){
    base.skillPower += Math.floor((player.maxMp + base.bonusMp) * 0.05);
  }
  if(getUnlockedPassiveSkills().some(passive => passive.type === "mage_mana_to_life") && tier60 === "mago_incendiario" && player.level >= 60){
    base.skillPower += Math.floor((player.maxMp + base.bonusMp) * 0.1);
  }
  if(base.manaToLifePercent > 0){
    base.bonusHp += Math.floor((player.maxMp + base.bonusMp + pendingGains.mpGain) * base.manaToLifePercent);
  }
  if(activeSetBonuses.bonusHpPercent > 0){
    base.bonusHp += Math.floor((player.maxHp + base.bonusHp + pendingGains.hpGain) * activeSetBonuses.bonusHpPercent);
  }
  if(base.bonusHpPercentAccessory > 0){
    base.bonusHp += Math.floor((player.maxHp + base.bonusHp + pendingGains.hpGain) * base.bonusHpPercentAccessory);
  }
  return base;
}

function needsSubclassChoice(){
  if(!player){ return false; }
  const subclassState = getPlayerSubclassState();
  return (player.level >= 30 && !subclassState.tier30) || (player.level >= 60 && !!subclassState.tier30 && !subclassState.tier60);
}
